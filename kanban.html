<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>派工行程與地圖導航 - AirBoss CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=MOPLUS+Rounded+1c:wght@500;700;800;900&family=Noto+Sans+TC:wght@500;700;900&display=swap" rel="stylesheet">
    <style> body { font-family: 'MOPLUS Rounded 1c', 'Noto Sans TC', sans-serif; } </style>
</head>
<body class="bg-[#FFFDF9] min-h-screen text-slate-700 pb-16">

    <!-- 頂部標頭 -->
    <header class="bg-gradient-to-r from-sky-400 to-indigo-300 text-white p-4 shadow-sm sticky top-0 z-40 flex justify-between items-center rounded-b-2xl">
        <div class="flex items-center gap-2">
            <a href="index.html" class="text-xl font-bold bg-white/20 p-1.5 rounded-xl">⬅️</a>
            <div>
                <h1 class="text-base font-black">📅 派工行程與地圖導航</h1>
                <p class="text-[10px] opacity-90 font-bold">點擊工單一鍵預覽地圖與完工回報</p>
            </div>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-4">

        <!-- 🗺️ 看板連動地圖預覽區塊 -->
        <div class="bg-white p-4 rounded-3xl border border-amber-100 shadow-sm space-y-3">
            <div class="flex justify-between items-center border-b border-slate-100 pb-2">
                <h2 class="font-black text-xs text-slate-800 flex items-center gap-1.5">
                    <span>🗺️</span> 派工目標即時地圖
                </h2>
                <span id="mapTargetName" class="text-[10px] bg-sky-100 text-sky-700 px-2 py-0.5 rounded-full font-bold">點擊下方工單載入地點</span>
            </div>

            <!-- 地圖元件 -->
            <div class="w-full h-48 rounded-2xl overflow-hidden border border-slate-200 bg-slate-100 relative">
                <iframe 
                    id="kanbanMap"
                    width="100%" 
                    height="100%" 
                    style="border:0;" 
                    loading="lazy" 
                    allowfullscreen
                    src="https://maps.google.com/maps?q=新北市三重區正義北路100號&t=&z=15&ie=UTF8&iwloc=&output=embed">
                </iframe>
            </div>

            <button id="btnGoogleNav" onclick="openDirectNav()" class="w-full bg-gradient-to-r from-sky-400 to-indigo-400 text-white font-black py-2.5 rounded-2xl text-xs shadow-sm hover:opacity-90 flex items-center justify-center gap-1.5">
                🚀 開啟 Google 地圖 App 語音導航
            </button>
        </div>

        <!-- 派工行程卡片列表 -->
        <div class="space-y-3">
            <h2 class="font-black text-xs text-slate-400 px-1">今日預約行程 (2 件)：</h2>

            <!-- 工單 1 -->
            <div class="bg-white p-4 rounded-3xl border border-amber-100 shadow-sm space-y-2">
                <div class="flex justify-between items-start">
                    <div>
                        <div class="flex items-center gap-2">
                            <span class="text-xs bg-amber-100 text-amber-800 font-bold px-2 py-0.5 rounded-full">10:30 上午</span>
                            <h3 class="font-black text-sm text-slate-800">張先生</h3>
                        </div>
                        <p class="text-xs text-slate-500 font-bold mt-1">📞 0933-123-456</p>
                    </div>
                    <span class="text-[10px] bg-sky-100 text-sky-700 font-bold px-2 py-0.5 rounded-full">施工中</span>
                </div>

                <div class="p-2.5 bg-slate-50 rounded-2xl text-xs space-y-1 text-slate-600">
                    <p>📍 <strong>地址：</strong>新北市三重區正義北路 100 號 5 樓</p>
                    <p>❄️ <strong>項目：</strong>分離式清洗保養 x 2 台</p>
                    <p>💰 <strong>預估金額：</strong>$5,000 元</p>
                </div>

                <div class="flex gap-2 pt-1">
                    <button onclick="loadMap('張先生', '新北市三重區正義北路 100 號')" class="flex-1 bg-sky-50 hover:bg-sky-100 text-sky-600 font-black py-2 rounded-xl text-xs">
                        🗺️ 切換地圖
                    </button>
                    <button onclick="openCompleteModal('張先生', '5000')" class="flex-1 bg-emerald-500 hover:bg-emerald-600 text-white font-black py-2 rounded-xl text-xs shadow-sm">
                        ✅ 完工與發送收據
                    </button>
                </div>
            </div>

            <!-- 工單 2 -->
            <div class="bg-white p-4 rounded-3xl border border-amber-100 shadow-sm space-y-2">
                <div class="flex justify-between items-start">
                    <div>
                        <div class="flex items-center gap-2">
                            <span class="text-xs bg-indigo-100 text-indigo-800 font-bold px-2 py-0.5 rounded-full">14:00 下午</span>
                            <h3 class="font-black text-sm text-slate-800">王小姐</h3>
                        </div>
                        <p class="text-xs text-slate-500 font-bold mt-1">📞 0955-666-777</p>
                    </div>
                    <span class="text-[10px] bg-amber-100 text-amber-700 font-bold px-2 py-0.5 rounded-full">等待前往</span>
                </div>

                <div class="p-2.5 bg-slate-50 rounded-2xl text-xs space-y-1 text-slate-600">
                    <p>📍 <strong>地址：</strong>台北市大安區忠孝東路四段 200 號</p>
                    <p>❄️ <strong>項目：</strong>冷氣不冷檢測 + 補冷媒 R32</p>
                    <p>💰 <strong>預估金額：</strong>$3,500 元</p>
                </div>

                <div class="flex gap-2 pt-1">
                    <button onclick="loadMap('王小姐', '台北市大安區忠孝東路四段 200 號')" class="flex-1 bg-sky-50 hover:bg-sky-100 text-sky-600 font-black py-2 rounded-xl text-xs">
                        🗺️ 切換地圖
                    </button>
                    <button onclick="openCompleteModal('王小姐', '3500')" class="flex-1 bg-emerald-500 hover:bg-emerald-600 text-white font-black py-2 rounded-xl text-xs shadow-sm">
                        ✅ 完工與發送收據
                    </button>
                </div>
            </div>

        </div>

    </main>

    <!-- 完工回報彈窗 (Completion Modal) -->
    <div id="completeModal" class="fixed inset-0 bg-slate-900/40 opacity-0 pointer-events-none transition-opacity duration-300 z-50 flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-xs rounded-3xl p-5 space-y-3 shadow-2xl">
            <h3 class="font-black text-sm text-slate-800">🎉 完工回報與發送收據</h3>
            <p class="text-xs text-slate-400">客戶：<span id="modalCustName" class="font-bold text-slate-700"></span></p>

            <div>
                <label class="block text-[11px] font-bold text-slate-400 mb-1">實際實收金額 ($)</label>
                <input type="number" id="finalPrice" class="w-full p-2 bg-slate-50 border border-slate-200 rounded-xl text-xs font-black text-emerald-600">
            </div>

            <button onclick="sendReceipt()" class="w-full bg-emerald-500 text-white font-black py-2.5 rounded-xl text-xs shadow-sm">
                💬 複製 LINE 電子收據並完成
            </button>
            <button onclick="closeCompleteModal()" class="w-full bg-slate-100 text-slate-600 font-bold py-2 rounded-xl text-xs">
                取消
            </button>
        </div>
    </div>

    <script>
        let currentNavAddress = "新北市三重區正義北路 100 號";

        // 動態更新看板地圖
        function loadMap(name, address) {
            currentNavAddress = address;
            document.getElementById('mapTargetName').innerText = `${name} (${address})`;
            document.getElementById('kanbanMap').src = `https://maps.google.com/maps?q=${encodeURIComponent(address)}&t=&z=15&ie=UTF8&iwloc=&output=embed`;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // 開啟 Google Maps 導航
        function openDirectNav() {
            window.open(`https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(currentNavAddress)}`, '_blank');
        }

        // 完工彈窗控制
        function openCompleteModal(name, price) {
            document.getElementById('modalCustName').innerText = name;
            document.getElementById('finalPrice').value = price;
            const modal = document.getElementById('completeModal');
            modal.classList.remove('opacity-0', 'pointer-events-none');
        }

        function closeCompleteModal() {
            const modal = document.getElementById('completeModal');
            modal.classList.add('opacity-0', 'pointer-events-none');
        }

        function sendReceipt() {
            const name = document.getElementById('modalCustName').innerText;
            const price = document.getElementById('finalPrice').value;
            const receiptText = `感謝使用 AirBoss！\n【電子服務收據】\n客戶：${name} 先生/小姐\n本次服務實收金額：NT$ ${price} 元\n施工項目已驗收完成，提供 90 天保固服務，有任何問題隨時聯繫我們！😊`;
            navigator.clipboard.writeText(receiptText);
            alert('✅ 已完成派工，並已自動複製 LINE 電子收據！文字可以直接貼給客戶。');
            closeCompleteModal();
        }
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCfy9ARrE9wp-bCrABsFVb-qM8_sp9_wqs",
            authDomain: "airboss-4f084.firebaseapp.com",
            projectId: "airboss-4f084",
            storageBucket: "airboss-4f084.firebasestorage.app",
            messagingSenderId: "1067344741307",
            appId: "1:1067344741307:web:15a54741a5bdb26e897a9e",
            measurementId: "G-P9ZGJH366L"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        onAuthStateChanged(auth, (user) => {
            if (!user) window.location.href = 'login.html';
        });
    </script>
</body>
</html>
