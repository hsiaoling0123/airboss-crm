<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>會員登入 - AirBoss CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=MOPLUS+Rounded+1c:wght@500;700;800;900&family=Noto+Sans+TC:wght@500;700;900&display=swap" rel="stylesheet">
    <style> body { font-family: 'MOPLUS Rounded 1c', 'Noto Sans TC', sans-serif; } </style>
</head>
<body class="bg-[#FFFDF9] min-h-screen text-slate-700 flex items-center justify-center p-4">

    <div class="w-full max-w-sm bg-white p-6 rounded-3xl shadow-md border border-amber-100 space-y-4">
        <div class="text-center space-y-1">
            <div class="text-4xl">🐻❄️</div>
            <h1 class="font-black text-lg text-slate-800">AirBoss CRM</h1>
            <p class="text-xs text-slate-400 font-bold">冷氣空調團隊管理系統登入</p>
        </div>

        <form id="loginForm" class="space-y-3 pt-2">
            <div>
                <label class="block text-[11px] font-bold text-slate-400 mb-1">電子郵件 Email</label>
                <input type="email" id="email" required placeholder="boss@airboss.com" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl text-xs focus:outline-none focus:border-sky-400">
            </div>

            <div>
                <label class="block text-[11px] font-bold text-slate-400 mb-1">密碼 Password</label>
                <input type="password" id="password" required placeholder="••••••••" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl text-xs focus:outline-none focus:border-sky-400">
            </div>

            <p id="errorMsg" class="text-[10px] text-rose-500 font-bold hidden text-center"></p>

            <button type="submit" id="btnSubmit" class="w-full bg-gradient-to-r from-sky-400 to-indigo-300 text-white font-black py-3 rounded-2xl text-xs shadow-sm hover:opacity-90 transition-all">
                🔐 登入系統
            </button>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCfy9ARrE9wp-bCrABsFVb-qM8_sp9_wqs",
            authDomain: "airboss-4f084.firebaseapp.com",
            projectId: "airboss-4f084",
            storageBucket: "airboss-4f084.firebasestorage.app",
            messagingSenderId: "1067344741307",
            appId: "1:1067344741307:web:15a54741a5bdb26e897a9e",
            measurementId: "G-P9ZGJH366L"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            const btnSubmit = document.getElementById('btnSubmit');

            errorMsg.classList.add('hidden');
            btnSubmit.innerText = '🔐 驗證登入中...';

            try {
                await signInWithEmailAndPassword(auth, email, password);
                window.location.href = 'index.html';
            } catch (error) {
                btnSubmit.innerText = '🔐 登入系統';
                errorMsg.innerText = '❌ 登入失敗：請確認 Firebase 後台已開啓 Email/Password 登入並已建立此帳號！';
                errorMsg.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
