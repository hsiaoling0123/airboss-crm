<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AirBoss CRM - 涼爽小管家</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=MOPLUS+Rounded+1c:wght@500;700;800;900&family=Noto+Sans+TC:wght@500;700;900&display=swap" rel="stylesheet">
    <style> 
        body { 
            font-family: 'MOPLUS Rounded 1c', 'Noto Sans TC', sans-serif; 
            letter-spacing: 0.02em;
        } 
    </style>
    <script>
        // 🔒 未登入檢查機制
        const user = localStorage.getItem('airboss_user');
        if (!user) {
            window.location.href = 'login.html';
        }
    </script>
</head>
<body class="bg-[#FFFDF9] min-h-screen text-slate-700 pb-12">

    <header class="bg-gradient-to-r from-sky-400 to-indigo-300 text-white p-5 shadow-sm rounded-b-[2rem] text-center relative">
        <button onclick="logout()" class="absolute top-4 right-4 text-[11px] bg-white/20 hover:bg-white/30 px-3 py-1 rounded-full font-bold transition-all">
            登出 🚪
        </button>
        <div class="inline-block bg-white/20 backdrop-blur-md px-4 py-1 rounded-full text-xs font-bold tracking-wider mb-1">
            ✨ 冷氣維修與保養小助手
        </div>
        <h1 class="text-2xl font-extrabold tracking-wide flex items-center justify-center gap-2">
            ❄️ AirBoss CRM 🐻
        </h1>
        <p id="userTag" class="text-[10px] text-white/80 font-bold mt-1"></p>
    </header>

    <main class="max-w-md mx-auto p-5 space-y-6">

        <div class="bg-gradient-to-br from-amber-100/80 via-orange-50 to-rose-100/60 p-5 rounded-3xl shadow-sm border border-amber-200/50 space-y-3">
            <div class="flex justify-between items-center">
                <span class="text-xs font-bold bg-amber-200/70 text-amber-900 px-3 py-1 rounded-full">
                    ☀️ 今天也是活力滿滿的一天！
                </span>
                <span id="todayDate" class="text-xs font-bold text-slate-500"></span>
            </div>
            <div class="grid grid-cols-3 gap-2 text-center pt-2">
                <div class="bg-white/80 backdrop-blur-sm p-3 rounded-2xl">
                    <p class="text-[11px] font-bold text-slate-400">總客戶</p>
                    <p id="stat-customers" class="text-lg font-black text-sky-600 mt-0.5">0</p>
                </div>
                <div class="bg-white/80 backdrop-blur-sm p-3 rounded-2xl">
                    <p class="text-[11px] font-bold text-slate-400">待排工單</p>
                    <p id="stat-pending" class="text-lg font-black text-rose-500 mt-0.5">0</p>
                </div>
                <div class="bg-white/80 backdrop-blur-sm p-3 rounded-2xl">
                    <p class="text-[11px] font-bold text-slate-400">本月預估</p>
                    <p id="stat-revenue" class="text-xs font-black text-emerald-600 mt-1.5">NT$0</p>
                </div>
            </div>
        </div>

        <div class="space-y-3">
            <p class="text-xs font-bold text-slate-400 px-2 flex items-center gap-1">
                <span>🌸</span> 常用功能選單
            </p>

            <div class="grid grid-cols-2 gap-3">
                <a href="kanban.html" class="bg-sky-50 border border-sky-100/80 hover:bg-sky-100 p-4 rounded-3xl transition-all shadow-sm flex flex-col items-center text-center space-y-2 group">
                    <div class="w-12 h-12 bg-sky-200/60 rounded-2xl flex items-center justify-center text-2xl group-hover:scale-110 transition-transform">
                        📅
                    </div>
                    <div>
                        <div class="font-bold text-sm text-sky-900">派工行程看板</div>
                        <div class="text-[10px] text-sky-600 font-bold">本日 / 本週 / 本月</div>
                    </div>
                </a>

                <a href="map.html" class="bg-indigo-50 border border-indigo-100/80 hover:bg-indigo-100 p-4 rounded-3xl transition-all shadow-sm flex flex-col items-center text-center space-y-2 group">
                    <div class="w-12 h-12 bg-indigo-200/60 rounded-2xl flex items-center justify-center text-2xl group-hover:scale-110 transition-transform">
                        🗺️
                    </div>
                    <div>
                        <div class="font-bold text-sm text-indigo-900">派工路線地圖</div>
                        <div class="text-[10px] text-indigo-600 font-bold">Google Maps 順路規劃</div>
                    </div>
                </a>

                <a href="quotation.html" class="bg-amber-50 border border-amber-100/80 hover:bg-amber-100 p-4 rounded-3xl transition-all shadow-sm flex flex-col items-center text-center space-y-2 group">
                    <div class="w-12 h-12 bg-amber-200/60 rounded-2xl flex items-center justify-center text-2xl group-hover:scale-110 transition-transform">
                        📄
                    </div>
                    <div>
                        <div class="font-bold text-sm text-amber-900">快速報價單</div>
                        <div class="text-[10px] text-amber-600 font-bold">PDF 下載 / LINE 傳送</div>
                    </div>
                </a>

                <a href="customers.html" class="bg-rose-50 border border-rose-100/80 hover:bg-rose-100 p-4 rounded-3xl transition-all shadow-sm flex flex-col items-center text-center space-y-2 group">
                    <div class="w-12 h-12 bg-rose-200/60 rounded-2xl flex items-center justify-center text-2xl group-hover:scale-110 transition-transform">
                        👥
                    </div>
                    <div>
                        <div class="font-bold text-sm text-rose-900">客戶名冊簿</div>
                        <div class="text-[10px] text-rose-600 font-bold">完整設備與導航</div>
                    </div>
                </a>
            </div>
        </div>

    </main>

    <script>
        const userData = JSON.parse(localStorage.getItem('airboss_user'));
        if (userData && userData.email) {
            document.getElementById('userTag').textContent = `使用者：${userData.email}`;
        }

        function logout() {
            if (confirm('確定要登出系統嗎？')) {
                localStorage.removeItem('airboss_user');
                window.location.href = 'login.html';
            }
        }

        document.getElementById('todayDate').textContent = new Date().toLocaleDateString('zh-TW', { month: 'short', day: 'numeric', weekday: 'short' });

        const customers = JSON.parse(localStorage.getItem('airboss_customers')) || [];
        const orders = JSON.parse(localStorage.getItem('airboss_orders')) || [];

        document.getElementById('stat-customers').textContent = customers.length;
        document.getElementById('stat-pending').textContent = orders.filter(o => o.status !== '已完工').length;

        const now = new Date();
        const monthPrefix = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
        const totalRev = orders.filter(o => o.date && o.date.startsWith(monthPrefix)).reduce((sum, o) => sum + Number(o.price || 0), 0);
        document.getElementById('stat-revenue').textContent = `NT$ ${totalRev.toLocaleString()}`;
    </script>
</body>
</html>
