<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>客戶目錄 - AirBoss CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen text-slate-800 pb-12">

    <!-- 頂部導覽列 -->
    <header class="bg-blue-600 text-white p-4 shadow-lg sticky top-0 z-50 flex justify-between items-center">
        <a href="index.html" class="text-sm bg-blue-700 px-3 py-1.5 rounded-lg font-medium flex items-center gap-1">
            ‹ 返回首頁
        </a>
        <h1 class="text-lg font-bold">👥 客戶目錄資料庫</h1>
        <a href="add-customer.html" class="text-sm bg-emerald-500 hover:bg-emerald-400 px-3 py-1.5 rounded-lg font-medium">
            + 新增客戶
        </a>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-4">
        
        <!-- 搜尋列 -->
        <input type="text" id="searchInput" oninput="renderCustomers()" placeholder="🔍 搜尋姓名、電話、地址、標籤..." class="w-full p-3 bg-white border border-slate-200 rounded-xl text-sm shadow-sm focus:outline-none focus:border-blue-500">

        <!-- 客戶卡片列表容器 -->
        <div id="customerList" class="space-y-4">
            <!-- 動態繪製客戶資料 -->
        </div>

    </main>

    <script>
        function renderCustomers() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const customers = JSON.parse(localStorage.getItem('airboss_customers')) || [];
            const container = document.getElementById('customerList');

            const filtered = customers.filter(c => 
                (c.name && c.name.toLowerCase().includes(query)) ||
                (c.phone && c.phone.includes(query)) ||
                (c.address && c.address.toLowerCase().includes(query)) ||
                (c.tags && c.tags.toLowerCase().includes(query))
            );

            if (filtered.length === 0) {
                container.innerHTML = `<div class="bg-white p-8 rounded-xl text-center text-slate-400 text-sm border">沒有找到符合的客戶資料～</div>`;
                return;
            }

            container.innerHTML = filtered.map(c => {
                // 自動組裝 Google Maps 導航與地圖連結
                const encodedAddr = encodeURIComponent(c.address || '');
                const googleMapUrl = `https://www.google.com/maps/search/?api=1&query=${encodedAddr}`;
                const googleNavUrl = `https://www.google.com/maps/dir/?api=1&destination=${encodedAddr}`;

                // 處理標籤
                const tagsList = c.tags ? c.tags.split(',').map(t => `<span class="bg-slate-100 text-slate-700 text-[10px] px-2 py-0.5 rounded font-bold">#${t.trim()}</span>`).join(' ') : '';

                // 處理冷氣設備顯示
                const acCount = c.acList ? c.acList.length : 0;
                const acDetails = (c.acList || []).map((ac, idx) => `
                    <div class="bg-slate-50 p-2.5 rounded-lg text-xs space-y-1 border border-slate-100">
                        <div class="font-bold text-blue-900 flex justify-between">
                            <span>❄️ 冷氣 ${idx + 1}：${ac.brand || '未指定品牌'} ${ac.model || ''}</span>
                            <span class="text-slate-500 font-normal">${ac.power || ''}</span>
                        </div>
                        <div class="text-[11px] text-slate-600 flex gap-3">
                            <span>冷媒: ${ac.gas || '未填'}</span>
                            <span>保固: ${ac.warranty || '無'}</span>
                        </div>
                        ${ac.maintenanceHistory ? `<div class="text-[11px] text-emerald-700">保養紀錄: ${ac.maintenanceHistory}</div>` : ''}
                        ${ac.repairHistory ? `<div class="text-[11px] text-amber-700">維修紀錄: ${ac.repairHistory}</div>` : ''}
                    </div>
                `).join('');

                return `
                    <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200 space-y-3">
                        <div class="flex justify-between items-start">
                            <div>
                                <h3 class="font-bold text-slate-900 text-base">${c.name}</h3>
                                <div class="flex items-center gap-2 mt-1">
                                    <a href="tel:${c.phone}" class="text-xs bg-emerald-50 text-emerald-700 font-bold px-2 py-0.5 rounded flex items-center gap-1">
                                        📞 ${c.phone}
                                    </a>
                                    ${c.lineId ? `<span class="text-xs bg-green-50 text-green-700 px-2 py-0.5 rounded">LINE: ${c.lineId}</span>` : ''}
                                </div>
                            </div>
                            <span class="text-[10px] bg-blue-50 text-blue-700 px-2 py-0.5 rounded font-bold">${c.source || '未設定來源'}</span>
                        </div>

                        ${tagsList ? `<div class="flex flex-wrap gap-1">${tagsList}</div>` : ''}

                        <!-- 地址與 Google 導航按鈕列 -->
                        <div class="bg-slate-50 p-2.5 rounded-xl space-y-2 border border-slate-100">
                            <p class="text-xs text-slate-700 font-medium">📍 ${c.address || '無地址'}</p>
                            <div class="flex gap-2 text-xs">
                                <a href="${googleNavUrl}" target="_blank" class="flex-1 bg-blue-600 text-white text-center py-1.5 rounded-lg font-bold hover:bg-blue-700 transition-colors">
                                    🚗 Google 導航
                                </a>
                                <a href="${googleMapUrl}" target="_blank" class="flex-1 bg-slate-200 text-slate-700 text-center py-1.5 rounded-lg font-bold hover:bg-slate-300 transition-colors">
                                    🗺️ 地圖查看
                                </a>
                            </div>
                        </div>

                        <!-- 停車與注意事項 -->
                        ${(c.parkingNote || c.guardPhone || c.notice) ? `
                            <div class="text-xs space-y-1 bg-amber-50/60 p-2.5 rounded-xl border border-amber-200/60 text-amber-900">
                                ${c.parkingNote ? `<div>🅿️ <b>停車：</b>${c.parkingNote}</div>` : ''}
                                ${c.guardPhone ? `<div>👮 <b>管理員：</b>${c.guardPhone}</div>` : ''}
                                ${c.notice ? `<div>⚠️ <b>注意：</b>${c.notice}</div>` : ''}
                            </div>
                        ` : ''}

                        <!-- 冷氣設備清單展開區 -->
                        <div class="space-y-2 pt-1 border-t border-slate-100">
                            <div class="flex justify-between items-center">
                                <span class="text-xs font-bold text-slate-700">冷氣設備 (共 ${acCount} 台)</span>
                            </div>
                            ${acDetails}
                        </div>
                    </div>
                `;
            }).join('');
        }

        document.addEventListener('DOMContentLoaded', renderCustomers);
    </script>

</body>
</html>
