<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>零組件與耗材庫存 - AirBoss CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=MOPLUS+Rounded+1c:wght@500;700;800;900&family=Noto+Sans+TC:wght@500;700;900&display=swap" rel="stylesheet">
    <style> 
        body { 
            font-family: 'MOPLUS Rounded 1c', 'Noto Sans TC', sans-serif; 
            letter-spacing: 0.02em;
        } 
    </style>
</head>
<body class="bg-[#FFFDF9] min-h-screen text-slate-700 pb-16">

    <!-- 頂部導覽列 -->
    <header class="bg-gradient-to-r from-sky-400 to-indigo-300 text-white p-4 shadow-sm sticky top-0 z-50 flex justify-between items-center rounded-b-2xl">
        <a href="index.html" class="text-xs bg-white/20 hover:bg-white/30 px-3 py-1.5 rounded-full font-bold transition-all">
            ‹ 首頁
        </a>
        <h1 class="text-base font-black">🧰 零組件與耗材庫存 🌸</h1>
        <div class="w-10"></div>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-4">

        <!-- 新增/補充耗材表單 -->
        <form id="itemForm" class="bg-white p-5 rounded-3xl shadow-sm border border-amber-100 space-y-3">
            <h2 class="font-black text-xs text-slate-800 flex items-center gap-1.5">
                <span>📦</span> 新增或補充零件庫存
            </h2>

            <div>
                <label class="block text-[11px] font-bold text-slate-400 mb-1">品名與規格</label>
                <input type="text" id="itemName" required placeholder="例：R32 冷媒 (kg) / 35uF 電容" class="w-full p-2.5 bg-amber-50/20 border border-amber-100 rounded-xl text-xs focus:outline-none focus:border-sky-400">
            </div>

            <div class="grid grid-cols-2 gap-2">
                <div>
                    <label class="block text-[11px] font-bold text-slate-400 mb-1">目前數量</label>
                    <input type="number" id="itemQty" required placeholder="10" class="w-full p-2.5 bg-amber-50/20 border border-amber-100 rounded-xl text-xs focus:outline-none focus:border-sky-400">
                </div>
                <div>
                    <label class="block text-[11px] font-bold text-slate-400 mb-1">單位進價 (NT$)</label>
                    <input type="number" id="itemCost" placeholder="150" class="w-full p-2.5 bg-amber-50/20 border border-amber-100 rounded-xl text-xs focus:outline-none focus:border-sky-400">
                </div>
            </div>

            <button type="submit" class="w-full bg-gradient-to-r from-sky-400 to-indigo-300 text-white font-black py-2.5 rounded-2xl text-xs shadow-sm hover:opacity-90 transition-all cursor-pointer">
                ✨ 入庫 / 新增材料
            </button>
        </form>

        <!-- 庫存清單與快速扣抵 -->
        <div class="space-y-3">
            <p class="text-xs font-bold text-slate-400 px-2 flex items-center gap-1">
                <span>📊</span> 現有車輛與倉庫備料
            </p>
            <div id="inventoryList" class="space-y-2">
                <!-- 動態載入庫存卡片 -->
            </div>
        </div>

    </main>

    <!-- ☁️ Firestore 雲端同步庫存 -->
    <script type="module">
        import { db } from "./firebase-config.js";
        import { collection, onSnapshot, addDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // 即時監聽庫存
        onSnapshot(collection(db, "inventory"), (snapshot) => {
            const items = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            renderInventory(items);
        });

        // 新增品項
        document.getElementById('itemForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('itemName').value;
            const qty = Number(document.getElementById('itemQty').value);
            const cost = Number(document.getElementById('itemCost').value || 0);

            await addDoc(collection(db, "inventory"), {
                name, qty, cost, updatedAt: new Date().toISOString()
            });

            document.getElementById('itemForm').reset();
            alert('✨ 耗材品項新增成功！');
        });

        function renderInventory(items) {
            const listEl = document.getElementById('inventoryList');
            if (items.length === 0) {
                listEl.innerHTML = `<div class="bg-white p-6 rounded-3xl text-center text-xs text-slate-400">目前庫存是空的，請先新增耗材吧 ☕</div>`;
                return;
            }

            listEl.innerHTML = items.map(item => `
                <div class="bg-white p-4 rounded-3xl shadow-sm border border-amber-100 flex justify-between items-center">
                    <div>
                        <div class="font-bold text-xs text-slate-800">⚙️ ${item.name}</div>
                        <div class="text-[10px] text-slate-400 font-bold mt-0.5">成本：NT$ ${item.cost} / 單位</div>
                    </div>

                    <div class="flex items-center gap-2">
                        <button onclick="changeQty('${item.id}', ${item.qty - 1})" class="w-7 h-7 bg-rose-100 text-rose-700 font-black rounded-xl text-xs cursor-pointer">-</button>
                        <span class="font-black text-sm text-sky-600 px-1">${item.qty}</span>
                        <button onclick="changeQty('${item.id}', ${item.qty + 1})" class="w-7 h-7 bg-emerald-100 text-emerald-700 font-black rounded-xl text-xs cursor-pointer">+</button>
                    </div>
                </div>
            `).join('');
        }

        window.changeQty = async function(id, newQty) {
            if (newQty < 0) return;
            await updateDoc(doc(db, "inventory", id), { qty: newQty });
        };
    </script>
</body>
</html>
