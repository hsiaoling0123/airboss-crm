<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>客戶列表 - AirBoss CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen text-slate-800">

    <!-- 頂部導覽列 -->
    <header class="bg-blue-600 text-white p-4 shadow-lg sticky top-0 z-50 flex items-center justify-between">
        <a href="index.html" class="text-sm bg-blue-700 px-3 py-1.5 rounded-lg flex items-center gap-1 font-medium">
            ‹ 返回首頁
        </a>
        <h1 class="text-lg font-bold">客戶管理目錄</h1>
        <a href="add-customer.html" class="text-sm bg-blue-500 hover:bg-blue-400 px-3 py-1.5 rounded-lg font-medium">
            + 新增
        </a>
    </header>

    <!-- 主要內容 -->
    <main class="max-w-md mx-auto p-4 space-y-4">
        
        <!-- 客戶卡片列表 -->
        <div id="customerList" class="space-y-3">
            <!-- JavaScript 會自動將 LocalStorage 的客戶資料繪製在這裡 -->
        </div>

    </main>

    <!-- 自動讀取資料的 JavaScript -->
    <script>
        function renderCustomers() {
            const listContainer = document.getElementById('customerList');
            const customers = JSON.parse(localStorage.getItem('airboss_customers')) || [];

            if (customers.length === 0) {
                listContainer.innerHTML = `
                    <div class="bg-white p-8 rounded-xl shadow-sm text-center border border-slate-200">
                        <p class="text-slate-500 text-sm font-medium mb-3">目前還沒有客戶資料喔！</p>
                        <a href="add-customer.html" class="inline-block bg-blue-600 text-white text-xs px-4 py-2 rounded-lg font-bold">
                            + 建立第一筆客戶
                        </a>
                    </div>
                `;
                return;
            }

            listContainer.innerHTML = customers.map(c => `
                <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200 space-y-2">
                    <div class="flex justify-between items-start">
                        <div>
                            <div class="flex items-center gap-2">
                                <h3 class="font-bold text-slate-900 text-base">${c.name}</h3>
                                <span class="bg-blue-100 text-blue-700 text-xs px-2 py-0.5 rounded font-medium">${c.category || '一般客戶'}</span>
                            </div>
                            <p class="text-xs text-slate-500 mt-1">📞 ${c.phone}</p>
                        </div>
                        <a href="tel:${c.phone}" class="bg-emerald-50 text-emerald-600 p-2 rounded-lg text-xs font-bold flex items-center gap-1 border border-emerald-200">
                            📞 打電話
                        </a>
                    </div>
                    
                    <p class="text-xs text-slate-600 flex items-start gap-1">
                        📍 <span>${c.address || '未填寫地址'}</span>
                    </p>

                    <div class="pt-2 border-t border-slate-100 flex justify-between items-center text-xs text-slate-500">
                        <span>建立時間：${c.date}</span>
                        <span class="text-slate-400 truncate max-w-[150px]">${c.note ? '備註: ' + c.note : ''}</span>
                    </div>
                </div>
            `).join('');
        }

        // 頁面載入時自動執行
        document.addEventListener('DOMContentLoaded', renderCustomers);
    </script>

</body>
</html>
