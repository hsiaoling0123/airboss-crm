<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>派工行程看板 - AirBoss CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=MOPLUS+Rounded+1c:wght@500;700;800;900&family=Noto+Sans+TC:wght@500;700;900&display=swap" rel="stylesheet">
    <style> 
        body { 
            font-family: 'MOPLUS Rounded 1c', 'Noto Sans TC', sans-serif; 
            letter-spacing: 0.02em;
        } 
    </style>
</head>
<body class="bg-[#FFFDF9] min-h-screen text-slate-700 pb-16">

    <!-- 頂部導覽列 -->
    <header class="bg-gradient-to-r from-sky-400 to-indigo-300 text-white p-4 shadow-sm sticky top-0 z-50 flex justify-between items-center rounded-b-2xl">
        <a href="index.html" class="text-xs bg-white/20 hover:bg-white/30 px-3 py-1.5 rounded-full font-bold transition-all">
            ‹ 首頁
        </a>
        <h1 class="text-base font-black">📅 派工行程看板 🌸</h1>
        <button onclick="requestNotificationPermission()" class="text-[10px] bg-amber-300 text-amber-900 px-2.5 py-1 rounded-full font-black animate-pulse shadow-sm">
            🔔 開啟推播
        </button>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-4">

        <!-- 狀態篩選頁籤 -->
        <div class="flex bg-slate-100 p-1 rounded-2xl text-xs font-bold text-slate-500">
            <button onclick="filterStatus('all')" id="btn-all" class="flex-1 py-2 rounded-xl bg-white text-sky-600 shadow-sm transition-all">全部</button>
            <button onclick="filterStatus('待處理')" id="btn-pending" class="flex-1 py-2 rounded-xl transition-all">待處理</button>
            <button onclick="filterStatus('已完工')" id="btn-done" class="flex-1 py-2 rounded-xl transition-all">已完工</button>
        </div>

        <!-- 派工清單區域 -->
        <div id="ordersContainer" class="space-y-3">
            <div class="text-center py-10 text-xs text-slate-400">
                ☁️ 正在即時同步雲端工單中...
            </div>
        </div>

    </main>

    <!-- ☁️ 載入 Firebase 雲端與即時通知 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCfy9ARrE9wp-bCrABsFVb-qM8_sp9_wqs",
            authDomain: "airboss-4f084.firebaseapp.com",
            projectId: "airboss-4f084",
            storageBucket: "airboss-4f084.firebasestorage.app",
            messagingSenderId: "1067344741307",
            appId: "1:1067344741307:web:15a54741a5bdb26e897a9e",
            measurementId: "G-P9ZGJH366L"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let currentFilter = 'all';
        let allOrders = [];
        let isFirstLoad = true;

        // 即時監聽工單變化
        onSnapshot(collection(db, "orders"), (snapshot) => {
            // 如果不是第一次載入，且有新增資料，就跳出推播通知
            if (!isFirstLoad && snapshot.docChanges().some(change => change.type === "added")) {
                showNotification("📌 新派工通知！", "系統剛剛新增了一張冷氣維修/保養工單喔！");
            }
            isFirstLoad = false;

            allOrders = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            renderOrders();
        });

        window.renderOrders = function() {
            const container = document.getElementById('ordersContainer');
            let filtered = allOrders;

            if (currentFilter !== 'all') {
                filtered = allOrders.filter(o => o.status === currentFilter);
            }

            if (filtered.length === 0) {
                container.innerHTML = `<div class="bg-white p-8 rounded-3xl text-center text-xs text-slate-400">目前沒有相關派工行程 ☕</div>`;
                return;
            }

            container.innerHTML = filtered.map(order => `
                <div class="bg-white p-4 rounded-3xl shadow-sm border border-amber-100 space-y-2">
                    <div class="flex justify-between items-center border-b border-slate-50 pb-2">
                        <span class="font-black text-sm text-slate-800">👤 ${order.customerName || '未名客戶'}</span>
                        <span class="text-[10px] font-bold px-2.5 py-1 rounded-full ${order.status === '已完工' ? 'bg-emerald-100 text-emerald-800' : 'bg-rose-100 text-rose-800'}">
                            ${order.status || '待處理'}
                        </span>
                    </div>

                    <div class="text-xs space-y-1 text-slate-600">
                        <p>🗓️ <strong>時間：</strong>${order.date || ''} ${order.time || ''}</p>
                        <p>📍 <strong>地址：</strong>${order.address || '未填寫'}</p>
                        <p>🛠️ <strong>項目：</strong>${order.serviceType || '保養'}</p>
                        <p>💰 <strong>預估：</strong>NT$ ${Number(order.price || 0).toLocaleString()}</p>
                    </div>

                    <div class="flex gap-2 pt-2 border-t border-slate-50">
                        <button onclick="toggleOrderStatus('${order.id}', '${order.status}')" class="flex-1 py-1.5 bg-sky-50 text-sky-700 hover:bg-sky-100 font-bold rounded-xl text-[11px] transition-all">
                            🔄 切換狀態
                        </button>
                        <a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(order.address || '')}" target="_blank" class="flex-1 text-center py-1.5 bg-emerald-50 text-emerald-700 hover:bg-emerald-100 font-bold rounded-xl text-[11px] transition-all">
                            🗺️ Google 導航
                        </a>
                    </div>
                </div>
            `).join('');
        };

        window.toggleOrderStatus = async function(id, currentStatus) {
            const newStatus = currentStatus === '已完工' ? '待處理' : '已完工';
            await updateDoc(doc(db, "orders", id), { status: newStatus });
        };

        window.filterStatus = function(status) {
            currentFilter = status;
            ['all', 'pending', 'done'].forEach(b => document.getElementById(`btn-${b}`).className = 'flex-1 py-2 rounded-xl transition-all text-slate-500');
            const activeMap = { 'all': 'btn-all', '待處理': 'btn-pending', '已完工': 'btn-done' };
            document.getElementById(activeMap[status]).className = 'flex-1 py-2 rounded-xl bg-white text-sky-600 shadow-sm font-bold';
            renderOrders();
        };
    </script>

    <script>
        // 請求權限開啟系統推播
        function requestNotificationPermission() {
            if (!("Notification" in window)) {
                alert("這個瀏覽器不支援推播通知喔！");
                return;
            }
            Notification.requestPermission().then(permission => {
                if (permission === "granted") {
                    alert("✨ 派工即時通知已開啟！有新工單時會自動提醒你喔！");
                    showNotification(" AirBoss 測試推播", "派工推播通知設定成功！");
                }
            });
        }

        function showNotification(title, body) {
            if (Notification.permission === "granted") {
                new Notification(title, { body: body, icon: '❄️' });
            }
        }
    </script>
</body>
</html>
