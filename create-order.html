<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AirBoss 智慧派工與報價</title>
  <!-- 載入 Tailwind CSS 樣式庫 -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800">

  <!-- 頂部導航列 -->
  <header class="bg-white border-b sticky top-0 z-40 shadow-sm">
    <div class="max-w-4xl mx-auto px-4 py-3 flex justify-between items-center">
      <a href="index.html" class="text-sm font-bold text-gray-600 hover:text-blue-600 flex items-center gap-1">
        ← 返回首頁
      </a>
      <h1 class="text-base font-bold text-gray-900">新增派工與報價單</h1>
      <span class="text-xs text-blue-600 bg-blue-50 px-2.5 py-1 rounded-full font-semibold">自動同步 CRM</span>
    </div>
  </header>

  <!-- 主容器 -->
  <main class="max-w-4xl mx-auto p-4 space-y-6">
    
    <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 space-y-6">
      <div class="border-b pb-3">
        <h2 class="text-lg font-bold text-gray-900">填寫派工單與客戶資訊</h2>
        <p class="text-xs text-gray-500 mt-1">送出後將自動同步至「客戶與資源管理」及「派工行程」中，實現資料互通。</p>
      </div>

      <div class="space-y-4 text-sm">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="block font-medium text-gray-700 mb-1">客戶姓名 / 稱呼 *</label>
            <input type="text" id="order-name" placeholder="例如：王小明" class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 outline-none">
          </div>
          <div>
            <label class="block font-medium text-gray-700 mb-1">主要電話 (CRM對應主鍵) *</label>
            <input type="text" id="order-phone" placeholder="例如：0912-345-678" class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 outline-none">
          </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="block font-medium text-gray-700 mb-1">預定施工日期 *</label>
            <input type="date" id="order-date" class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 outline-none">
          </div>
          <div>
            <label class="block font-medium text-gray-700 mb-1">指派施工技師</label>
            <input type="text" id="order-tech" placeholder="例如：大師傅" class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 outline-none">
          </div>
        </div>

        <div>
          <label class="block font-medium text-gray-700 mb-1">施工地址 *</label>
          <input type="text" id="order-address" placeholder="例如：新北市板橋區文化路一段 100 號" class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 outline-none">
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="block font-medium text-gray-700 mb-1">服務項目 / 派工主旨 *</label>
            <input type="text" id="order-title" placeholder="例如：日立冷氣定期深層清洗" class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 outline-none">
          </div>
          <div>
            <label class="block font-medium text-gray-700 mb-1">預估報價金額 (NTD)</label>
            <input type="number" id="order-amount" placeholder="例如：3500" class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 outline-none">
          </div>
        </div>

        <div>
          <label class="block font-medium text-gray-700 mb-1">現場備註與注意事項</label>
          <textarea id="order-desc" class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 outline-none" rows="3" placeholder="例如：進屋需穿鞋套，社區地下室可停訪客車位..."></textarea>
        </div>

        <div class="pt-4 flex justify-end gap-3 border-t">
          <a href="index.html" class="px-5 py-2.5 bg-gray-100 rounded-xl text-gray-600 hover:bg-gray-200 font-medium transition">取消返回</a>
          <button type="button" onclick="submitOrderAndSync()" class="px-6 py-2.5 bg-blue-600 text-white rounded-xl hover:bg-blue-700 font-medium shadow-sm transition cursor-pointer">確認送出並同步 CRM</button>
        </div>
      </div>
    </div>

  </main>

  <!-- 邏輯腳本：負責將派工單寫入 localStorage 供各模組串接 -->
  <script>
    window.addEventListener('DOMContentLoaded', () => {
      // 自動填入今天的日期
      document.getElementById('order-date').value = new Date().toISOString().split('T')[0];
    });

    function submitOrderAndSync() {
      const name = document.getElementById('order-name').value.trim();
      const phone = document.getElementById('order-phone').value.trim();
      const date = document.getElementById('order-date').value;
      const tech = document.getElementById('order-tech').value.trim();
      const address = document.getElementById('order-address').value.trim();
      const title = document.getElementById('order-title').value.trim();
      const amount = document.getElementById('order-amount').value.trim();
      const desc = document.getElementById('order-desc').value.trim();

      if (!name || !phone || !address || !title) {
        alert('請填寫必要的客戶姓名、電話、地址與服務項目！');
        return;
      }

      // 1. 讀取或初始化共用資料庫 (LocalStorage)
      let sharedCustomers = JSON.parse(localStorage.getItem('airboss_customers')) || [
        {
          id: 'cust_001',
          name: '王小明',
          phone: '0912-345-678',
          altPhone: '02-22501234',
          lineId: 'ming123',
          email: 'ming@example.com',
          birthday: '1988-08-16',
          source: '網路搜尋',
          customerType: 'VIP',
          address: '新北市板橋區文化路一段 100 號',
          parking: '社區地下室可停客訪車位',
          adminPhone: '02-22509999',
          notes: '進屋需穿鞋套，假日禁止施工',
          equipment: [
            { id: 'eq_01', location: '客廳 (AC-01)', model: '日立 RAS-63HK', capacity: '6.3 kW', date: '2023-05-15', warranty: '保固中', photos: [] }
          ],
          logs: [
            { id: 'log_01', date: '2026-06-10', title: '定期深層清洗', tech: '大師傅', desc: '濾網及風輪清洗完畢。', photos: [] }
          ]
        }
      ];

      // 2. 以電話號碼核對是否已存在於客戶名單中
      let existingCustomer = sharedCustomers.find(c => c.phone === phone);

      const newLogItem = {
        id: 'log_' + Date.now(),
        date: date,
        title: title + (amount ? ` (報價: $${amount})` : ''),
        tech: tech || '派工技師',
        desc: desc || '由派工單自動同步建立',
        photos: []
      };

      if (existingCustomer) {
        existingCustomer.logs.unshift(newLogItem);
        if (address && existingCustomer.address === '未填寫地址') {
          existingCustomer.address = address;
        }
      } else {
        const newCust = {
          id: 'cust_' + Date.now(),
          name,
          phone,
          altPhone: '',
          lineId: '',
          email: '',
          birthday: '',
          source: '派工單匯入',
          customerType: '一般',
          address: address,
          parking: '無',
          adminPhone: '無',
          notes: desc || '無',
          equipment: [],
          logs: [newLogItem]
        };
        sharedCustomers.push(newCust);
      }

      // 3. 儲存回 LocalStorage 供 customers.html 與其他頁面讀取
      localStorage.setItem('airboss_customers', JSON.stringify(sharedCustomers));

      alert('派工單已成功建立，並已自動同步至客戶與行程資料庫！');
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
