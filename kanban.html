<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>派工行程看板 - AirBoss CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5sortable/0.13.3/html5sortable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&display=swap" rel="stylesheet">
    <style> body { font-family: 'Zen Maru Gothic', sans-serif; } </style>
</head>
<body class="bg-[#FFFDF9] min-h-screen text-slate-700 pb-12">

    <!-- 頂部導覽列 -->
    <header class="bg-gradient-to-r from-sky-400 to-indigo-300 text-white p-4 shadow-sm sticky top-0 z-50 flex justify-between items-center rounded-b-2xl">
        <a href="index.html" class="text-xs bg-white/20 hover:bg-white/30 px-3 py-1.5 rounded-full font-bold transition-all">
            ‹ 首頁
        </a>
        <h1 class="text-base font-black">📅 派工行程小月曆</h1>
        <a href="create-order.html" class="text-xs bg-amber-300 text-amber-900 hover:bg-amber-200 px-3 py-1.5 rounded-full font-bold shadow-sm">
            + 開工單
        </a>
    </header>

    <!-- 控制列 -->
    <div class="bg-white/80 backdrop-blur-md border-b border-amber-100/60 px-4 py-2.5 flex flex-col gap-2 sticky top-[56px] z-40">
        <div class="flex bg-slate-100/80 p-1 rounded-2xl gap-1">
            <button onclick="switchView('day')" id="btn-day" class="flex-1 py-1.5 text-xs font-bold rounded-xl transition-all text-slate-500">本日焦點 🌟</button>
            <button onclick="switchView('week')" id="btn-week" class="flex-1 py-1.5 text-xs font-bold rounded-xl transition-all text-slate-500">本週看板 📑</button>
            <button onclick="switchView('month')" id="btn-month" class="flex-1 py-1.5 text-xs font-bold rounded-xl transition-all text-slate-500">本月總覽 📆</button>
        </div>

        <div class="flex justify-between items-center px-1">
            <button onclick="navigateDate(-1)" class="text-xs bg-amber-100/70 hover:bg-amber-200 text-amber-800 px-3 py-1 rounded-full font-bold">‹ 上一個</button>
            <span id="dateRangeText" class="text-xs font-black text-slate-700">載入中...</span>
            <button onclick="navigateDate(1)" class="text-xs bg-amber-100/70 hover:bg-amber-200 text-amber-800 px-3 py-1 rounded-full font-bold">下一個 ›</button>
        </div>
    </div>

    <main class="p-4 max-w-4xl mx-auto space-y-4">

        <!-- 營收與工單統計卡片區 -->
        <div class="bg-gradient-to-r from-sky-400 via-sky-300 to-indigo-300 text-white p-4.5 rounded-3xl shadow-sm flex justify-between items-center">
            <div>
                <p id="statLabel" class="text-xs text-sky-100 font-bold">✨ 今日預估總營收</p>
                <p id="statTotalRevenue" class="text-2xl font-black mt-0.5">NT$ 0</p>
            </div>
            <div class="text-right">
                <p class="text-xs text-sky-100 font-bold">工單總數</p>
                <p id="statTotalOrders" class="text-base font-black mt-0.5 bg-white/20 px-3 py-0.5 rounded-full">0 單</p>
            </div>
        </div>
        
        <!-- 視角 1：本日檢視 -->
        <div id="view-day" class="hidden space-y-3">
            <div id="dayOrdersList" class="space-y-3"></div>
        </div>

        <!-- 視角 2：本週拖曳看板 -->
        <div id="view-week" class="hidden overflow-x-auto">
            <div class="flex gap-4 min-w-[1400px] items-start">
                <div class="w-72 bg-slate-100/80 p-3.5 rounded-3xl flex-shrink-0 border border-slate-200/60">
                    <div class="flex justify-between items-center mb-3 px-1">
                        <h2 class="font-bold text-slate-600 text-xs flex items-center gap-1.5">
                            <span class="w-2.5 h-2.5 rounded-full bg-slate-400"></span> 待排程工單 📌
                        </h2>
                        <span id="count-unassigned" class="bg-slate-200 text-slate-700 text-[10px] px-2 py-0.5 rounded-full font-bold">0</span>
                    </div>
                    <div id="col-unassigned" data-date="待排程" class="kanban-col space-y-3 min-h-[380px] p-1"></div>
                </div>

                <div id="weekColumns" class="flex gap-4"></div>

                <div class="w-72 bg-emerald-50/80 p-3.5 rounded-3xl flex-shrink-0 border border-emerald-100">
                    <div class="flex justify-between items-center mb-3 px-1">
                        <h2 class="font-bold text-emerald-800 text-xs flex items-center gap-1.5">
                            <span class="w-2.5 h-2.5 rounded-full bg-emerald-400"></span> 已完成工單 🎉
                        </h2>
                        <span id="count-completed" class="bg-emerald-200 text-emerald-800 text-[10px] px-2 py-0.5 rounded-full font-bold">0</span>
                    </div>
                    <div id="col-completed" data-date="已完工" class="kanban-col space-y-3 min-h-[380px] p-1"></div>
                </div>
            </div>
        </div>

        <!-- 視角 3：本月月曆檢視 -->
        <div id="view-month" class="hidden bg-white p-4 rounded-3xl border border-amber-100 shadow-sm space-y-3">
            <div class="grid grid-cols-7 text-center font-bold text-xs text-slate-400 pb-2 border-b border-amber-50">
                <span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span>
            </div>
            <div id="monthGrid" class="grid grid-cols-7 gap-1 text-center"></div>
        </div>

    </main>

    <script>
        let currentMode = 'week';
        let currentDate = new Date();
        let orders = JSON.parse(localStorage.getItem('airboss_orders')) || [];

        function formatDate(d) {
            const year = d.getFullYear();
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const date = String(d.getDate()).padStart(2, '0');
            return `${year}-${month}-${date}`;
        }

        function getMonday(d) {
            d = new Date(d);
            const day = d.getDay();
            const diff = d.getDate() - day + (day === 0 ? -6 : 1);
            return new Date(d.setDate(diff));
        }

        function switchView(mode) {
            currentMode = mode;
            ['day', 'week', 'month'].forEach(m => {
                document.getElementById(`view-${m}`).classList.add('hidden');
                document.getElementById(`btn-${m}`).className = "flex-1 py-1.5 text-xs font-bold rounded-xl transition-all text-slate-500";
            });

            document.getElementById(`view-${mode}`).classList.remove('hidden');
            document.getElementById(`btn-${mode}`).className = "flex-1 py-1.5 text-xs font-bold rounded-xl transition-all bg-sky-400 text-white shadow-sm";

            render();
        }

        function navigateDate(offset) {
            if (currentMode === 'day') currentDate.setDate(currentDate.getDate() + offset);
            else if (currentMode === 'week') currentDate.setDate(currentDate.getDate() + (offset * 7));
            else if (currentMode === 'month') currentDate.setMonth(currentDate.getMonth() + offset);
            render();
        }

        function render() {
            orders = JSON.parse(localStorage.getItem('airboss_orders')) || [];
            if (currentMode === 'day') renderDayView();
            else if (currentMode === 'week') renderWeekView();
            else if (currentMode === 'month') renderMonthView();
        }

        function renderDayView() {
            const targetDateStr = formatDate(currentDate);
            document.getElementById('dateRangeText').textContent = `${currentDate.getMonth() + 1}月${currentDate.getDate()}日行程 ✨`;
            document.getElementById('statLabel').textContent = '✨ 今日預估總營收';

            const dayOrders = orders.filter(o => o.date === targetDateStr);
            const totalRev = dayOrders.reduce((sum, o) => sum + Number(o.price || 0), 0);
            
            document.getElementById('statTotalRevenue').textContent = `NT$ ${totalRev.toLocaleString()}`;
            document.getElementById('statTotalOrders').textContent = `${dayOrders.length} 單`;

            const listEl = document.getElementById('dayOrdersList');
            if (dayOrders.length === 0) {
                listEl.innerHTML = `<div class="bg-white p-8 rounded-3xl text-center text-slate-400 text-xs border border-amber-100">今天沒有排定任何行程，好好休息一下吧 ☕</div>`;
                return;
            }

            dayOrders.sort((a,b) => (a.time || '00:00').localeCompare(b.time || '00:00'));

            listEl.innerHTML = dayOrders.map(o => `
                <div class="bg-white p-4 rounded-3xl shadow-sm border-l-4 border-l-sky-400 border border-amber-100/60 space-y-2">
                    <div class="flex justify-between items-start">
                        <div>
                            <span class="bg-amber-100 text-amber-800 text-[10px] font-bold px-2.5 py-0.5 rounded-full">⏰ ${o.time || '全天'}</span>
                            <h3 class="font-bold text-slate-800 text-sm mt-1.5">${o.customerName}</h3>
                        </div>
                        <span class="text-emerald-600 font-black text-sm">NT$ ${Number(o.price).toLocaleString()}</span>
                    </div>
                    <p class="text-xs text-sky-600 font-bold">🔧 ${o.serviceType}</p>
                    ${o.note ? `<p class="text-xs text-slate-400">📝 ${o.note}</p>` : ''}
                </div>
            `).join('');
        }

        function renderWeekView() {
            const monday = getMonday(currentDate);
            const sunday = new Date(monday);
            sunday.setDate(monday.getDate() + 6);

            document.getElementById('dateRangeText').textContent = `${monday.getMonth() + 1}/${monday.getDate()} ~ ${sunday.getMonth() + 1}/${sunday.getDate()}`;
            document.getElementById('statLabel').textContent = '✨ 本週預估總營收';

            const mondayStr = formatDate(monday);
            const sundayStr = formatDate(sunday);
            const weekOrders = orders.filter(o => o.date >= mondayStr && o.date <= sundayStr);
            const totalRev = weekOrders.reduce((sum, o) => sum + Number(o.price || 0), 0);

            document.getElementById('statTotalRevenue').textContent = `NT$ ${totalRev.toLocaleString()}`;
            document.getElementById('statTotalOrders').textContent = `${weekOrders.length} 單`;

            const weekContainer = document.getElementById('weekColumns');
            weekContainer.innerHTML = '';
            const dayNames = ['一', '二', '三', '四', '五', '六', '日'];

            for (let i = 0; i < 7; i++) {
                const dateObj = new Date(monday);
                dateObj.setDate(monday.getDate() + i);
                const dateStr = formatDate(dateObj);
                const isToday = formatDate(new Date()) === dateStr;
                const headerBg = isToday ? 'bg-sky-400 text-white shadow-sm' : 'bg-sky-100/60 text-sky-900';

                weekContainer.innerHTML += `
                    <div class="w-72 border border-sky-100 bg-sky-50/40 p-3.5 rounded-3xl flex-shrink-0">
                        <div class="flex justify-between items-center mb-3 px-3 py-1.5 rounded-2xl ${headerBg}">
                            <span class="font-bold text-xs">${dateObj.getMonth() + 1}/${dateObj.getDate()} (${dayNames[i]})</span>
                            <span id="count-${dateStr}" class="bg-white/40 text-[10px] px-2 py-0.5 rounded-full font-bold">0</span>
                        </div>
                        <div id="col-${dateStr}" data-date="${dateStr}" class="kanban-col space-y-3 min-h-[380px] p-1"></div>
                    </div>
                `;
            }

            document.getElementById('col-unassigned').innerHTML = '';
            document.getElementById('col-completed').innerHTML = '';

            orders.forEach(order => {
                let targetCol = order.status === '已完工' ? document.getElementById('col-completed') : (document.getElementById(`col-${order.date}`) || document.getElementById('col-unassigned'));
                if (targetCol) {
                    targetCol.insertAdjacentHTML('beforeend', `
                        <div data-id="${order.id}" class="kanban-card bg-white p-3.5 rounded-2xl shadow-sm border border-slate-100 cursor-grab space-y-2">
                            <div class="flex justify-between items-start">
                                <h3 class="font-bold text-slate-800 text-xs">${order.customerName}</h3>
                                <span class="text-xs font-bold text-emerald-600">NT$ ${Number(order.price || 0).toLocaleString()}</span>
                            </div>
                            <p class="text-[11px] text-sky-600 font-bold">🔧 ${order.serviceType}</p>
                            <div class="flex justify-between items-center pt-1.5 border-t border-slate-50 text-[10px]">
                                <span class="bg-amber-100 text-amber-800 px-2 py-0.5 rounded-full font-bold">⏰ ${order.time || '全天'}</span>
                            </div>
                        </div>
                    `);
                }
            });

            updateCounts();
            initSortable();
        }

        function renderMonthView() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            document.getElementById('dateRangeText').textContent = `${year} 年 ${month + 1} 月 🌸`;
            document.getElementById('statLabel').textContent = '✨ 本月預估總營收';

            const monthPrefix = `${year}-${String(month + 1).padStart(2, '0')}`;
            const monthOrders = orders.filter(o => o.date && o.date.startsWith(monthPrefix));
            const totalRev = monthOrders.reduce((sum, o) => sum + Number(o.price || 0), 0);

            document.getElementById('statTotalRevenue').textContent = `NT$ ${totalRev.toLocaleString()}`;
            document.getElementById('statTotalOrders').textContent = `${monthOrders.length} 單`;

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const gridEl = document.getElementById('monthGrid');
            gridEl.innerHTML = '';

            for (let i = 0; i < firstDay; i++) gridEl.innerHTML += `<div class="h-14 bg-slate-50/50 rounded-2xl"></div>`;

            for (let day = 1; day <= daysInMonth; day++) {
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const count = orders.filter(o => o.date === dateStr).length;
                const isToday = formatDate(new Date()) === dateStr;

                gridEl.innerHTML += `
                    <div class="h-14 p-1 rounded-2xl border ${isToday ? 'border-sky-400 bg-sky-50' : 'border-slate-100 bg-slate-50/30'} flex flex-col justify-between items-center">
                        <span class="text-[11px] font-bold ${isToday ? 'text-sky-600' : 'text-slate-600'}">${day}</span>
                        ${count > 0 ? `<span class="bg-sky-400 text-white text-[9px] px-1.5 py-0.5 rounded-full font-bold">${count}單</span>` : ''}
                    </div>
                `;
            }
        }

        function updateCounts() {
            document.querySelectorAll('.kanban-col').forEach(col => {
                const dateKey = col.getAttribute('data-date');
                const countEl = document.getElementById(`count-${dateKey}`);
                if (countEl) countEl.textContent = col.children.length;
            });
        }

        function initSortable() {
            sortable('.kanban-col', { acceptFrom: '.kanban-col', items: '.kanban-card', placeholderClass: 'bg-sky-100 border-2 border-dashed border-sky-300 rounded-2xl mb-2' });
            document.querySelectorAll('.kanban-col').forEach(col => {
                col.addEventListener('sortupdate', function(e) {
                    const targetDate = e.target.getAttribute('data-date');
                    const orderId = Number(e.detail.item.getAttribute('data-id'));
                    let order = orders.find(o => o.id === orderId);
                    if (order) {
                        if (targetDate === '已完工') order.status = '已完工';
                        else if (targetDate === '待排程') { order.status = '待處理'; order.date = ''; }
                        else { order.status = '待處理'; order.date = targetDate; }
                        localStorage.setItem('airboss_orders', JSON.stringify(orders));
                    }
                    updateCounts();
                    render();
                });
            });
        }

        document.addEventListener('DOMContentLoaded', () => switchView('week'));
    </script>
</body>
</html>
