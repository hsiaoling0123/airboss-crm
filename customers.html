<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>客戶目錄 - AirBoss CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&display=swap" rel="stylesheet">
    <style> body { font-family: 'Zen Maru Gothic', sans-serif; } </style>
</head>
<body class="bg-[#FFFDF9] min-h-screen text-slate-700 pb-12">

    <!-- 頂部導覽列 -->
    <header class="bg-gradient-to-r from-sky-400 to-indigo-300 text-white p-4 shadow-sm sticky top-0 z-50 flex justify-between items-center rounded-b-2xl">
        <a href="index.html" class="text-xs bg-white/20 hover:bg-white/30 px-3 py-1.5 rounded-full font-bold transition-all">
            ‹ 首頁
        </a>
        <h1 class="text-base font-black">👥 客戶名冊寶典</h1>
        <a href="add-customer.html" class="text-xs bg-amber-300 text-amber-900 hover:bg-amber-200 px-3 py-1.5 rounded-full font-bold shadow-sm">
            + 新增客戶
        </a>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-4">
        
        <!-- 搜尋列 -->
        <input type="text" id="searchInput" oninput="renderCustomers()" placeholder="🔍 搜尋姓名、電話、地址、標籤..." class="w-full p-3.5 bg-white border border-amber-100 rounded-2xl text-xs shadow-sm focus:outline-none focus:border-sky-400">

        <!-- 客戶卡片列表 -->
        <div id="customerList" class="space-y-4"></div>

    </main>

    <script>
        function renderCustomers() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const customers = JSON.parse(localStorage.getItem('airboss_customers')) || [];
            const container = document.getElementById('customerList');

            const filtered = customers.filter(c => 
                (c.name && c.name.toLowerCase().includes(query)) ||
                (c.phone && c.phone.includes(query)) ||
                (c.address && c.address.toLowerCase().includes(query)) ||
                (c.tags && c.tags.toLowerCase().includes(query))
            );

            if (filtered.length === 0) {
                container.innerHTML = `<div class="bg-white p-8 rounded-3xl text-center text-slate-400 text-xs border border-amber-100">還沒有找到這個客戶耶 🐱</div>`;
                return;
            }

            container.innerHTML = filtered.map(c => {
                const encodedAddr = encodeURIComponent(c.address || '');
                const googleMapUrl = `https://www.google.com/maps/search/?api=1&query=${encodedAddr}`;
                const googleNavUrl = `https://www.google.com/maps/dir/?api=1&destination=${encodedAddr}`;

                const tagsList = c.tags ? c.tags.split(',').map(t => `<span class="bg-rose-50 text-rose-600 text-[10px] px-2.5 py-0.5 rounded-full font-bold">#${t.trim()}</span>`).join(' ') : '';
                const acCount = c.acList ? c.acList.length : 0;

                const acDetails = (c.acList || []).map((ac, idx) => `
                    <div class="bg-sky-50/50 p-2.5 rounded-2xl text-xs space-y-1 border border-sky-100">
                        <div class="font-bold text-sky-900 flex justify-between">
                            <span>❄️ 冷氣 ${idx + 1}：${ac.brand || '未填品牌'} ${ac.model || ''}</span>
                            <span class="text-slate-400 font-medium">${ac.power || ''}</span>
                        </div>
                        <div class="text-[11px] text-slate-500 flex gap-3">
                            <span>冷媒: ${ac.gas || '未填'}</span>
                            <span>保固: ${ac.warranty || '無'}</span>
                        </div>
                    </div>
                `).join('');

                return `
                    <div class="bg-white p-4.5 rounded-3xl shadow-sm border border-amber-100 space-y-3">
                        <div class="flex justify-between items-start">
                            <div>
                                <h3 class="font-bold text-slate-800 text-base">${c.name}</h3>
                                <div class="flex items-center gap-2 mt-1">
                                    <a href="tel:${c.phone}" class="text-xs bg-emerald-100/70 text-emerald-800 font-bold px-2.5 py-0.5 rounded-full">
                                        📞 ${c.phone}
                                    </a>
                                    ${c.lineId ? `<span class="text-xs bg-green-100/70 text-green-800 px-2.5 py-0.5 rounded-full font-bold">LINE: ${c.lineId}</span>` : ''}
                                </div>
                            </div>
                            <span class="text-[10px] bg-amber-100 text-amber-800 px-2.5 py-0.5 rounded-full font-bold">${c.source || '一般來源'}</span>
                        </div>

                        ${tagsList ? `<div class="flex flex-wrap gap-1">${tagsList}</div>` : ''}

                        <!-- 地址與一鍵導航 -->
                        <div class="bg-amber-50/40 p-3 rounded-2xl space-y-2 border border-amber-100/60">
                            <p class="text-xs text-slate-600 font-bold">📍 ${c.address || '未填地址'}</p>
                            <div class="flex gap-2 text-xs">
                                <a href="${googleNavUrl}" target="_blank" class="flex-1 bg-sky-400 text-white text-center py-2 rounded-xl font-bold hover:bg-sky-500 transition-colors shadow-sm">
                                    🚗 開啟 Google 導航
                                </a>
                                <a href="${googleMapUrl}" target="_blank" class="flex-1 bg-slate-100 text-slate-600 text-center py-2 rounded-xl font-bold hover:bg-slate-200 transition-colors">
                                    🗺️ 地圖查看
                                </a>
                            </div>
                        </div>

                        ${(c.parkingNote || c.guardPhone || c.notice) ? `
                            <div class="text-xs space-y-1 bg-rose-50/50 p-2.5 rounded-2xl border border-rose-100 text-rose-900">
                                ${c.parkingNote ? `<div>🅿️ <b>停車：</b>${c.parkingNote}</div>` : ''}
                                ${c.guardPhone ? `<div>👮 <b>管理員：</b>${c.guardPhone}</div>` : ''}
                                ${c.notice ? `<div>⚠️ <b>注意事項：</b>${c.notice}</div>` : ''}
                            </div>
                        ` : ''}

                        <div class="space-y-2 pt-1">
                            <span class="text-xs font-bold text-slate-500">冷氣設備 (共 ${acCount} 台)</span>
                            ${acDetails}
                        </div>
                    </div>
                `;
            }).join('');
        }

        document.addEventListener('DOMContentLoaded', renderCustomers);
    </script>
</body>
</html>
