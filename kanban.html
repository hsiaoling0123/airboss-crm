<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>拖曳派工看板 - AirBoss CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5sortable/0.13.3/html5sortable.min.js"></script>
</head>
<body class="bg-slate-100 min-h-screen text-slate-800 pb-12">

    <!-- 頂部導覽列 -->
    <header class="bg-blue-600 text-white p-4 shadow-lg sticky top-0 z-50 flex justify-between items-center">
        <a href="index.html" class="text-sm bg-blue-700 px-3 py-1.5 rounded-lg font-medium flex items-center gap-1">
            ‹ 返回首頁
        </a>
        <h1 class="text-lg font-bold">📅 日期拖曳派工看板</h1>
        <a href="create-order.html" class="text-sm bg-emerald-500 hover:bg-emerald-400 px-3 py-1.5 rounded-lg font-medium">
            + 開單
        </a>
    </header>

    <!-- 週別切換控制列 -->
    <div class="bg-white border-b border-slate-200 px-4 py-2.5 flex justify-between items-center shadow-sm">
        <button onclick="changeWeek(-1)" class="text-xs bg-slate-100 hover:bg-slate-200 text-slate-700 px-3 py-1.5 rounded-lg font-bold flex items-center gap-1">
            ‹ 上一週
        </button>
        <span id="currentWeekRange" class="text-sm font-bold text-slate-800">2026/07/20 - 2026/07/26</span>
        <button onclick="changeWeek(1)" class="text-xs bg-slate-100 hover:bg-slate-200 text-slate-700 px-3 py-1.5 rounded-lg font-bold flex items-center gap-1">
            下一週 ›
        </button>
    </div>

    <!-- 看板主要內容區（橫向滾動容器） -->
    <main class="p-4 overflow-x-auto">
        <div class="flex gap-4 min-w-[1400px] items-start" id="kanbanContainer">
            
            <!-- 未排程欄位 -->
            <div class="w-72 bg-slate-200/80 p-3 rounded-2xl flex-shrink-0 border border-slate-300">
                <div class="flex justify-between items-center mb-3 px-1">
                    <h2 class="font-bold text-slate-700 text-sm flex items-center gap-1.5">
                        <span class="w-2.5 h-2.5 rounded-full bg-slate-500"></span> 待排程工單
                    </h2>
                    <span id="count-unassigned" class="bg-slate-300 text-slate-700 text-xs px-2 py-0.5 rounded-full font-bold">0</span>
                </div>
                <div id="col-unassigned" data-date="待排程" class="kanban-col space-y-3 min-h-[380px] p-1 transition-colors">
                </div>
            </div>

            <!-- 週一至週日動態生成欄位區 -->
            <div id="weekColumns" class="flex gap-4"></div>

            <!-- 已完成欄位 -->
            <div class="w-72 bg-emerald-50/80 p-3 rounded-2xl flex-shrink-0 border border-emerald-200">
                <div class="flex justify-between items-center mb-3 px-1">
                    <h2 class="font-bold text-emerald-800 text-sm flex items-center gap-1.5">
                        <span class="w-2.5 h-2.5 rounded-full bg-emerald-500"></span> 已完工
                    </h2>
                    <span id="count-completed" class="bg-emerald-200 text-emerald-800 text-xs px-2 py-0.5 rounded-full font-bold">0</span>
                </div>
                <div id="col-completed" data-date="已完工" class="kanban-col space-y-3 min-h-[380px] p-1 transition-colors">
                </div>
            </div>

        </div>
    </main>

    <script>
        let currentMonday = getMonday(new Date());
        let orders = JSON.parse(localStorage.getItem('airboss_orders')) || [];

        // 取得指定日期所在週的週一
        function getMonday(d) {
            d = new Date(d);
            const day = d.getDay();
            const diff = d.getDate() - day + (day === 0 ? -6 : 1);
            return new Date(d.setDate(diff));
        }

        // 格式化日期 YYYY-MM-DD
        function formatDate(d) {
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const date = String(d.getDate()).padStart(2, '0');
            return `${d.getFullYear()}-${month}-${date}`;
        }

        // 格式化顯示 MM/DD
        function formatShortDate(d) {
            return `${d.getMonth() + 1}/${d.getDate()}`;
        }

        function renderKanban() {
            const weekContainer = document.getElementById('weekColumns');
            weekContainer.innerHTML = '';

            const dayNames = ['週一', '週二', '週三', '週四', '週五', '週六', '週日'];
            const weekDates = [];

            // 生成本週 7 天欄位
            for (let i = 0; i < 7; i++) {
                const dateObj = new Date(currentMonday);
                dateObj.setDate(currentMonday.getDate() + i);
                const dateStr = formatDate(dateObj);
                const displayDate = formatShortDate(dateObj);
                const dayName = dayNames[i];
                
                // 判斷是否為今天
                const isToday = formatDate(new Date()) === dateStr;
                const headerBg = isToday ? 'bg-blue-600 text-white' : 'bg-blue-100/70 text-blue-900';
                const cardBorder = isToday ? 'border-2 border-blue-500 bg-blue-50/40' : 'border border-blue-200/60 bg-blue-50/30';

                weekDates.push(dateStr);

                weekContainer.innerHTML += `
                    <div class="w-72 ${cardBorder} p-3 rounded-2xl flex-shrink-0">
                        <div class="flex justify-between items-center mb-3 px-2 py-1.5 rounded-xl ${headerBg}">
                            <div class="flex items-center gap-1.5">
                                <span class="font-bold text-sm">${dayName}</span>
                                <span class="text-xs opacity-90">(${displayDate})</span>
                            </div>
                            <span id="count-${dateStr}" class="bg-white/30 text-xs px-2 py-0.5 rounded-full font-bold">0</span>
                        </div>
                        <div id="col-${dateStr}" data-date="${dateStr}" class="kanban-col space-y-3 min-h-[380px] p-1 transition-colors">
                        </div>
                    </div>
                `;
            }

            // 更新日期範圍顯示
            const sundayObj = new Date(currentMonday);
            sundayObj.setDate(currentMonday.getDate() + 6);
            document.getElementById('currentWeekRange').textContent = `${formatDate(currentMonday)} ~ ${formatDate(sundayObj)}`;

            // 清空待排程與已完工欄位
            document.getElementById('col-unassigned').innerHTML = '';
            document.getElementById('col-completed').innerHTML = '';

            // 將工單填入對應日期欄位
            orders.forEach(order => {
                let targetCol = null;

                if (order.status === '已完工') {
                    targetCol = document.getElementById('col-completed');
                } else if (order.date && document.getElementById(`col-${order.date}`)) {
                    targetCol = document.getElementById(`col-${order.date}`);
                } else {
                    targetCol = document.getElementById('col-unassigned');
                }

                if (targetCol) {
                    const cardHtml = `
                        <div data-id="${order.id}" class="kanban-card bg-white p-3.5 rounded-xl shadow-sm border border-slate-200 cursor-grab active:cursor-grabbing hover:shadow-md transition-all space-y-2">
                            <div class="flex justify-between items-start">
                                <h3 class="font-bold text-slate-900 text-sm">${order.customerName}</h3>
                                <span class="text-xs font-bold text-emerald-600">NT$ ${Number(order.price || 0).toLocaleString()}</span>
                            </div>
                            <p class="text-xs text-blue-600 font-medium">🔧 ${order.serviceType}</p>
                            
                            <div class="flex justify-between items-center pt-2 border-t border-slate-100 text-xs">
                                <span class="bg-amber-100 text-amber-800 px-2 py-0.5 rounded-md font-bold flex items-center gap-1">
                                    ⏰ ${order.time || '全天'}
                                </span>
                                <span class="text-slate-400 text-[11px]">${order.date || '無日期'}</span>
                            </div>
                        </div>
                    `;
                    targetCol.insertAdjacentHTML('beforeend', cardHtml);
                }
            });

            updateCounts();
            initSortable();
        }

        function updateCounts() {
            document.querySelectorAll('.kanban-col').forEach(col => {
                const dateKey = col.getAttribute('data-date');
                const count = col.children.length;
                const countEl = document.getElementById(`count-${dateKey}`);
                if (countEl) countEl.textContent = count;
            });
        }

        function initSortable() {
            sortable('.kanban-col', {
                acceptFrom: '.kanban-col',
                items: '.kanban-card',
                placeholderClass: 'bg-blue-100/60 border-2 border-dashed border-blue-400 rounded-xl mb-3'
            });

            document.querySelectorAll('.kanban-col').forEach(col => {
                col.addEventListener('sortupdate', function(e) {
                    const targetDate = e.target.getAttribute('data-date');
                    const cardEl = e.detail.item;
                    const orderId = Number(cardEl.getAttribute('data-id'));

                    let order = orders.find(o => o.id === orderId);
                    if (order) {
                        if (targetDate === '已完工') {
                            order.status = '已完工';
                        } else if (targetDate === '待排程') {
                            order.status = '待處理';
                            order.date = '';
                        } else {
                            order.status = '待處理';
                            order.date = targetDate; // 拖動到該日期，自動更新工單預約日期！
                        }
                        localStorage.setItem('airboss_orders', JSON.stringify(orders));
                    }
                    updateCounts();
                });
            });
        }

        function changeWeek(offset) {
            currentMonday.setDate(currentMonday.getDate() + (offset * 7));
            renderKanban();
        }

        document.addEventListener('DOMContentLoaded', renderKanban);
    </script>

</body>
</html>
