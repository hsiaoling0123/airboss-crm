<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>派工行程看板 - AirBoss CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=MOPLUS+Rounded+1c:wght@500;700;800;900&family=Noto+Sans+TC:wght@500;700;900&display=swap" rel="stylesheet">
    <style> 
        body { 
            font-family: 'MOPLUS Rounded 1c', 'Noto Sans TC', sans-serif; 
            letter-spacing: 0.02em;
        } 
        .kanban-col { min-height: 250px; }
        .dragging { opacity: 0.5; border: 2px dashed #38bdf8; }
    </style>
</head>
<body class="bg-[#FFFDF9] min-h-screen text-slate-700 pb-16">

    <!-- 頂部導覽列 -->
    <header class="bg-gradient-to-r from-sky-400 to-indigo-300 text-white p-4 shadow-sm sticky top-0 z-50 flex justify-between items-center rounded-b-2xl">
        <a href="index.html" class="text-xs bg-white/20 hover:bg-white/30 px-3 py-1.5 rounded-full font-bold transition-all">
            ‹ 首頁
        </a>
        <h1 class="text-base font-black">📅 派工行程與分析 🌸</h1>
        <button onclick="requestNotificationPermission()" class="text-[10px] bg-amber-300 text-amber-900 px-2.5 py-1 rounded-full font-black animate-pulse shadow-sm">
            🔔 推播
        </button>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-4">

        <!-- 📊 營業額與統計分析面板 -->
        <div class="bg-white p-4 rounded-3xl shadow-sm border border-amber-100 space-y-3">
            <h2 class="font-black text-xs text-slate-800 flex items-center justify-between">
                <span>📈 營業額統計分析</span>
                <span id="rangeLabel" class="text-[10px] bg-sky-100 text-sky-700 px-2 py-0.5 rounded-full">全部期間</span>
            </h2>

            <div class="grid grid-cols-3 gap-2 text-center">
                <div class="bg-amber-50/50 p-2.5 rounded-2xl border border-amber-100/50">
                    <p class="text-[10px] text-slate-400 font-bold">工單總數</p>
                    <p id="statTotalOrders" class="text-base font-black text-slate-800 mt-0.5">0</p>
                </div>
                <div class="bg-sky-50/50 p-2.5 rounded-2xl border border-sky-100/50">
                    <p class="text-[10px] text-slate-400 font-bold">預估總營收</p>
                    <p id="statTotalRev" class="text-xs font-black text-sky-600 mt-1">$0</p>
                </div>
                <div class="bg-emerald-50/50 p-2.5 rounded-2xl border border-emerald-100/50">
                    <p class="text-[10px] text-slate-400 font-bold">實收完工額</p>
                    <p id="statDoneRev" class="text-xs font-black text-emerald-600 mt-1">$0</p>
                </div>
            </div>
        </div>

        <!-- 🗓️ 時間範圍切換 (每日/每週/每月/全部) -->
        <div class="flex bg-slate-100 p-1 rounded-2xl text-[11px] font-bold text-slate-500">
            <button onclick="setTimeFilter('today')" id="time-today" class="flex-1 py-1.5 rounded-xl transition-all">今日</button>
            <button onclick="setTimeFilter('week')" id="time-week" class="flex-1 py-1.5 rounded-xl transition-all">本週</button>
            <button onclick="setTimeFilter('month')" id="time-month" class="flex-1 py-1.5 rounded-xl transition-all">本月</button>
            <button onclick="setTimeFilter('all')" id="time-all" class="flex-1 py-1.5 rounded-xl bg-white text-sky-600 shadow-sm transition-all">全部</button>
        </div>

        <!-- 🖐️ 拖曳 Kanban 看板區域 (待處理 / 已完工) -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            
            <!-- 待處理欄位 -->
            <div class="space-y-2">
                <div class="flex justify-between items-center px-2">
                    <span class="font-black text-xs text-rose-600 flex items-center gap-1">
                        <span>⏳</span> 待處理工單
                    </span>
                    <span id="countPending" class="text-[10px] bg-rose-100 text-rose-800 font-bold px-2 py-0.5 rounded-full">0</span>
                </div>
                <div id="colPending" ondrop="drop(event, '待處理')" ondragover="allowDrop(event)" class="kanban-col bg-slate-50/80 p-3 rounded-3xl border-2 border-dashed border-slate-200 space-y-3 transition-all">
                    <!-- 動態帶入待處理卡片 -->
                </div>
            </div>

            <!-- 已完工欄位 -->
            <div class="space-y-2">
                <div class="flex justify-between items-center px-2">
                    <span class="font-black text-xs text-emerald-600 flex items-center gap-1">
                        <span>✅</span> 已完工結案
                    </span>
                    <span id="countDone" class="text-[10px] bg-emerald-100 text-emerald-800 font-bold px-2 py-0.5 rounded-full">0</span>
                </div>
                <div id="colDone" ondrop="drop(event, '已完工')" ondragover="allowDrop(event)" class="kanban-col bg-slate-50/80 p-3 rounded-3xl border-2 border-dashed border-slate-200 space-y-3 transition-all">
                    <!-- 動態帶入已完工卡片 -->
                </div>
            </div>

        </div>

    </main>

    <!-- ☁️ 載入 Firebase 雲端與看板邏輯 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCfy9ARrE9wp-bCrABsFVb-qM8_sp9_wqs",
            authDomain: "airboss-4f084.firebaseapp.com",
            projectId: "airboss-4f084",
            storageBucket: "airboss-4f084.firebasestorage.app",
            messagingSenderId: "1067344741307",
            appId: "1:1067344741307:web:15a54741a5bdb26e897a9e",
            measurementId: "G-P9ZGJH366L"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let currentTimeFilter = 'all';
        let allOrders = [];
        let isFirstLoad = true;

        // 即時監聽工單變化
        onSnapshot(collection(db, "orders"), (snapshot) => {
            if (!isFirstLoad && snapshot.docChanges().some(change => change.type === "added")) {
                showNotification("📌 新派工通知！", "系統剛剛新增了一張派工單喔！");
            }
            isFirstLoad = false;

            allOrders = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            renderKanban();
        });

        // 渲染看板與計算統計
        window.renderKanban = function() {
            const now = new Date();
            let filtered = allOrders.filter(order => {
                if (!order.date) return true;
                const orderDate = new Date(order.date);
                
                if (currentTimeFilter === 'today') {
                    return orderDate.toDateString() === now.toDateString();
                } else if (currentTimeFilter === 'week') {
                    const oneWeekAgo = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);
                    return orderDate >= oneWeekAgo && orderDate <= now;
                } else if (currentTimeFilter === 'month') {
                    return orderDate.getMonth() === now.getMonth() && orderDate.getFullYear() === now.getFullYear();
                }
                return true;
            });

            // 計算營收統計
            let totalRev = 0;
            let doneRev = 0;
            filtered.forEach(o => {
                const price = Number(o.price || 0);
                totalRev += price;
                if (o.status === '已完工') doneRev += price;
            });

            document.getElementById('statTotalOrders').innerText = filtered.length;
            document.getElementById('statTotalRev').innerText = `$${totalRev.toLocaleString()}`;
            document.getElementById('statDoneRev').innerText = `$${doneRev.toLocaleString()}`;

            // 渲染欄位
            const pendingOrders = filtered.filter(o => o.status !== '已完工');
            const doneOrders = filtered.filter(o => o.status === '已完工');

            document.getElementById('countPending').innerText = pendingOrders.length;
            document.getElementById('countDone').innerText = doneOrders.length;

            document.getElementById('colPending').innerHTML = pendingOrders.length === 0 ? 
                `<div class="text-center py-8 text-xs text-slate-300 font-bold">沒有待處理工單 ☕</div>` : 
                pendingOrders.map(o => createCardHtml(o)).join('');

            document.getElementById('colDone').innerHTML = doneOrders.length === 0 ? 
                `<div class="text-center py-8 text-xs text-slate-300 font-bold">沒有已完工工單 🌸</div>` : 
                doneOrders.map(o => createCardHtml(o)).join('');
        };

        function createCardHtml(order) {
            return `
                <div id="card-${order.id}" draggable="true" ondragstart="drag(event, '${order.id}')" class="bg-white p-3.5 rounded-2xl shadow-sm border border-amber-100/80 space-y-2 cursor-grab active:cursor-grabbing hover:shadow-md transition-all">
                    <div class="flex justify-between items-center border-b border-slate-50 pb-1.5">
                        <span class="font-black text-xs text-slate-800">👤 ${order.customerName || '未名客戶'}</span>
                        <span class="text-[9px] font-bold px-2 py-0.5 rounded-full ${order.status === '已完工' ? 'bg-emerald-100 text-emerald-800' : 'bg-rose-100 text-rose-800'}">
                            ${order.status || '待處理'}
                        </span>
                    </div>

                    <div class="text-[11px] space-y-0.5 text-slate-600">
                        <p>🗓️ <strong>時間：</strong>${order.date || ''} ${order.time || ''}</p>
                        <p>📍 <strong>地址：</strong>${order.address || '未填寫'}</p>
                        <p>🛠️ <strong>項目：</strong>${order.serviceType || '保養'}</p>
                        <p>💰 <strong>預估：</strong>NT$ ${Number(order.price || 0).toLocaleString()}</p>
                    </div>

                    <div class="flex gap-1.5 pt-1 border-t border-slate-50">
                        <button onclick="toggleStatus('${order.id}', '${order.status}')" class="flex-1 py-1 bg-sky-50 text-sky-700 font-bold rounded-xl text-[10px] transition-all">
                            🔄 切換
                        </button>
                        <a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(order.address || '')}" target="_blank" class="flex-1 text-center py-1 bg-emerald-50 text-emerald-700 font-bold rounded-xl text-[10px] transition-all">
                            🗺️ 導航
                        </a>
                    </div>
                </div>
            `;
        }

        // 時間切換
        window.setTimeFilter = function(time) {
            currentTimeFilter = time;
            ['today', 'week', 'month', 'all'].forEach(t => {
                document.getElementById(`time-${t}`).className = 'flex-1 py-1.5 rounded-xl transition-all text-slate-500';
            });
            document.getElementById(`time-${time}`).className = 'flex-1 py-1.5 rounded-xl bg-white text-sky-600 shadow-sm font-bold';
            
            const labels = { 'today': '今日工單', 'week': '本週工單', 'month': '本月工單', 'all': '全部期間' };
            document.getElementById('rangeLabel').innerText = labels[time];
            
            renderKanban();
        };

        // 狀態按鈕切換
        window.toggleStatus = async function(id, currentStatus) {
            const newStatus = currentStatus === '已完工' ? '待處理' : '已完工';
            await updateDoc(doc(db, "orders", id), { status: newStatus });
        };

        // 拖曳 (Drag & Drop) 邏輯
        window.allowDrop = function(ev) {
            ev.preventDefault();
        };

        window.drag = function(ev, id) {
            ev.dataTransfer.setData("text/plain", id);
        };

        window.drop = async function(ev, targetStatus) {
            ev.preventDefault();
            const id = ev.dataTransfer.getData("text/plain");
            if (id) {
                await updateDoc(doc(db, "orders", id), { status: targetStatus });
            }
        };
    </script>

    <script>
        function requestNotificationPermission() {
            if (!("Notification" in window)) {
                alert("這個瀏覽器不支援推播通知喔！");
                return;
            }
            Notification.requestPermission().then(permission => {
                if (permission === "granted") {
                    alert("✨ 派工即時通知已開啟！");
                    showNotification(" AirBoss 測試推播", "派工推播通知設定成功！");
                }
            });
        }

        function showNotification(title, body) {
            if (Notification.permission === "granted") {
                new Notification(title, { body: body, icon: '❄️' });
            }
        }
    </script>
</body>
</html>
