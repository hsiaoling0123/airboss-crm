<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AirBoss 客戶管理</title>
  <!-- 載入 Tailwind CSS 樣式庫 -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800">

  <!-- 客戶管理主容器 -->
  <div id="customer-module" class="p-4 max-w-7xl mx-auto">

    <!-- ==================== 1. 客戶列表檢視 (List View) ==================== -->
    <div id="customer-list-view" class="space-y-4">
      <div class="flex flex-col sm:flex-row justify-between items-center gap-4 bg-white p-4 rounded-xl shadow-sm border border-gray-100">
        <h2 class="text-xl font-bold text-gray-800">客戶資料管理</h2>
        <div class="flex items-center gap-2 w-full sm:w-auto">
          <input type="text" id="search-customer" placeholder="搜尋姓名、電話、地址..." class="px-4 py-2 border rounded-lg w-full sm:w-64 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
          <button type="button" onclick="openAddCustomerModal()" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 text-sm font-medium whitespace-nowrap cursor-pointer">+ 新增客戶</button>
        </div>
      </div>

      <!-- 客戶列表表格 -->
      <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
        <div class="overflow-x-auto">
          <table class="w-full text-left border-collapse">
            <thead>
              <tr class="bg-gray-50 border-b border-gray-100 text-gray-600 text-sm">
                <th class="p-4 font-semibold">客戶姓名</th>
                <th class="p-4 font-semibold">聯絡電話</th>
                <th class="p-4 font-semibold">施工地址</th>
                <th class="p-4 font-semibold">標籤</th>
                <th class="p-4 font-semibold text-center">操作</th>
              </tr>
            </thead>
            <tbody id="customer-table-body" class="divide-y divide-gray-100 text-sm text-gray-700">
              <!-- 動態渲染客戶列表 -->
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- ==================== 2. 客戶詳細資料頁面 (Detail View - 預設隱藏) ==================== -->
    <div id="customer-detail-view" class="hidden space-y-6">
      
      <!-- 頂部返回與操作列 -->
      <div class="flex items-center justify-between bg-white p-4 rounded-xl shadow-sm border border-gray-100">
        <button type="button" onclick="backToCustomerList()" class="flex items-center gap-2 text-gray-600 hover:text-blue-600 font-medium text-sm cursor-pointer">
          ← 返回客戶列表
        </button>
        <div class="flex gap-2">
          <button type="button" onclick="openEditCustomerModal()" class="bg-emerald-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-emerald-700 transition cursor-pointer">編輯基本資料</button>
          <button type="button" onclick="deleteCurrentCustomer()" class="bg-red-50 text-red-600 hover:bg-red-600 hover:text-white px-4 py-2 rounded-lg text-sm font-medium transition cursor-pointer">刪除客戶</button>
        </div>
      </div>

      <!-- 分頁籤切換按鈕 -->
      <div class="flex border-b border-gray-200 gap-8 text-sm font-medium bg-white px-4 rounded-xl shadow-sm border border-gray-100">
        <button type="button" onclick="switchTab('info')" id="tab-btn-info" class="py-3 border-b-2 border-blue-600 text-blue-600 transition cursor-pointer">基本與現場資訊</button>
        <button type="button" onclick="switchTab('equipment')" id="tab-btn-equipment" class="py-3 border-b-2 border-transparent text-gray-500 hover:text-gray-700 transition cursor-pointer">冷氣設備履歷</button>
        <button type="button" onclick="switchTab('history')" id="tab-btn-history" class="py-3 border-b-2 border-transparent text-gray-500 hover:text-gray-700 transition cursor-pointer">施工歷程與照片</button>
      </div>

      <!-- 標籤內容區塊 1：基本與現場資訊 -->
      <div id="tab-content-info" class="space-y-4">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 space-y-4">
            <h3 class="font-bold text-gray-800 border-b pb-2 text-base">聯絡資訊</h3>
            <div class="space-y-2 text-sm">
              <p><strong>姓名：</strong> <span id="detail-name" class="text-gray-900 font-medium"></span></p>
              <p><strong>電話：</strong> <span id="detail-phone" class="text-blue-600 font-medium"></span></p>
              <p><strong>備用電話：</strong> <span id="detail-alt-phone" class="text-gray-600">02-22501234</span></p>
              <p><strong>LINE ID：</strong> <span id="detail-line" class="text-gray-600">ming123</span></p>
            </div>
          </div>
          <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 space-y-4">
            <h3 class="font-bold text-gray-800 border-b pb-2 text-base">現場施工作業資訊</h3>
            <div class="space-y-2 text-sm">
              <p><strong>地址：</strong> <span id="detail-address" class="text-gray-900"></span> <a href="#" class="text-blue-600 text-xs ml-1 underline hover:text-blue-800 font-medium">Google 導航</a></p>
              <p><strong>停車資訊：</strong> <span id="detail-parking" class="text-gray-600">社區地下室可停客訪車位</span></p>
              <p><strong>管理員電話：</strong> <span id="detail-admin-phone" class="text-gray-600">02-22509999</span></p>
              <p><strong>注意事項：</strong> <span id="detail-notes" class="text-red-600 font-semibold bg-red-50 px-2 py-1 rounded inline-block mt-1">進屋需穿鞋套，假日禁止施工</span></p>
            </div>
          </div>
        </div>
      </div>

      <!-- 標籤內容區塊 2：冷氣設備履歷 (一對多) -->
      <div id="tab-content-equipment" class="hidden space-y-4">
        <div class="flex justify-between items-center bg-white p-4 rounded-xl shadow-sm border border-gray-100">
          <h3 class="font-bold text-gray-800 text-base">設備清單管理</h3>
          <button type="button" onclick="openAddEquipmentModal()" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-blue-700 transition cursor-pointer">+ 新增冷氣設備</button>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4" id="equipment-grid">
          <!-- 動態渲染設備 -->
        </div>
      </div>

      <!-- 標籤內容區塊 3：施工歷程與照片 -->
      <div id="tab-content-history" class="hidden space-y-4">
        <div class="flex justify-between items-center bg-white p-4 rounded-xl shadow-sm border border-gray-100">
          <h3 class="font-bold text-gray-800 text-base">歷次服務與施工照片</h3>
          <button type="button" onclick="openAddServiceLogModal()" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-blue-700 transition cursor-pointer">+ 新增施工紀錄</button>
        </div>
        
        <div class="space-y-4" id="service-history-list">
          <!-- 動態渲染施工紀錄 -->
        </div>
      </div>

    </div>
  </div>

  <!-- ==================== 3. 互動表單 Modal 容器 ==================== -->
  <div id="action-modal" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center p-4 z-50">
    <div class="bg-white rounded-2xl max-w-lg w-full p-6 shadow-xl space-y-4 relative max-h-[90vh] overflow-y-auto">
      <div class="flex justify-between items-center border-b pb-3">
        <h3 id="modal-title" class="text-lg font-bold text-gray-900">視窗標題</h3>
        <button type="button" onclick="closeActionModal()" class="text-gray-400 hover:text-gray-600 text-xl font-bold cursor-pointer">&times;</button>
      </div>
      
      <div id="modal-body" class="space-y-4 text-sm">
        <!-- 動態表單內容 -->
      </div>
    </div>
  </div>

  <!-- ==================== JavaScript 資料管理與互動邏輯 ==================== -->
  <script>
    // 模擬資料庫
    let customersData = [
      {
        id: 'cust_001',
        name: '王小明',
        phone: '0912-345-678',
        address: '新北市板橋區文化路一段 100 號',
        tag: 'VIP',
        equipment: [
          { id: 'eq_01', location: '客廳 (AC-01)', model: '日立 RAS-63HK', capacity: '6.3 kW (2.8 匹 / R32)', date: '2023-05-15' }
        ],
        logs: [
          { id: 'log_01', date: '2026-06-10', title: '定期深層清洗', tech: '大師傅', desc: '濾網及風輪清洗完畢，風量恢復正常，排水管測試順暢。' }
        ]
      }
    ];

    let currentActiveCustomerId = null;

    // 頁面載入時渲染列表
    window.addEventListener('DOMContentLoaded', () => {
      renderCustomerTable();
    });

    // 渲染客戶列表
    function renderCustomerTable() {
      const tbody = document.getElementById('customer-table-body');
      tbody.innerHTML = '';

      customersData.forEach(cust => {
        const tr = document.createElement('tr');
        tr.className = 'hover:bg-gray-50 transition';
        tr.innerHTML = `
          <td class="p-4 font-medium text-gray-900">${cust.name}</td>
          <td class="p-4">${cust.phone}</td>
          <td class="p-4">${cust.address}</td>
          <td class="p-4"><span class="bg-blue-100 text-blue-700 px-2.5 py-1 rounded-full text-xs font-semibold">${cust.tag || '一般'}</span></td>
          <td class="p-4 text-center">
            <button type="button" onclick="viewCustomerDetail('${cust.id}')" class="bg-gray-100 hover:bg-blue-600 hover:text-white px-3 py-1.5 rounded-lg transition text-xs font-medium cursor-pointer">查看詳情</button>
          </td>
        `;
        tbody.appendChild(tr);
      });
    }

    // 切換至詳細資料頁
    function viewCustomerDetail(customerId) {
      currentActiveCustomerId = customerId;
      const cust = customersData.find(c => c.id === customerId);
      if (!cust) return;

      // 填入基本資料
      document.getElementById('detail-name').innerText = cust.name;
      document.getElementById('detail-phone').innerText = cust.phone;
      document.getElementById('detail-address').innerText = cust.address;

      // 渲染設備列表
      renderEquipmentList(cust.equipment);
      // 渲染施工紀錄
      renderServiceLogs(cust.logs);

      document.getElementById('customer-list-view').classList.add('hidden');
      document.getElementById('customer-detail-view').classList.remove('hidden');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // 渲染設備
    function renderEquipmentList(equipmentArray) {
      const grid = document.getElementById('equipment-grid');
      grid.innerHTML = '';
      if (equipmentArray.length === 0) {
        grid.innerHTML = '<p class="text-gray-500 text-sm col-span-full">目前尚無冷氣設備紀錄。</p>';
        return;
      }
      equipmentArray.forEach(eq => {
        const card = document.createElement('div');
        card.className = 'bg-white p-5 rounded-xl shadow-sm border border-gray-100 space-y-3';
        card.innerHTML = `
          <div class="flex justify-between items-center font-bold text-gray-800">
            <span class="text-base">${eq.location}</span>
            <span class="text-xs bg-emerald-100 text-emerald-700 px-2.5 py-1 rounded-full font-semibold">保固中</span>
          </div>
          <div class="text-sm text-gray-600 space-y-1">
            <p>品牌型號：${eq.model}</p>
            <p>冷房能力：${eq.capacity}</p>
          </div>
          <p class="text-xs text-gray-400 pt-2 border-t">安裝日期：${eq.date}</p>
        `;
        grid.appendChild(card);
      });
    }

    // 渲染施工紀錄
    function renderServiceLogs(logsArray) {
      const list = document.getElementById('service-history-list');
      list.innerHTML = '';
      if (logsArray.length === 0) {
        list.innerHTML = '<p class="text-gray-500 text-sm">目前尚無施工歷程紀錄。</p>';
        return;
      }
      logsArray.forEach(log => {
        const item = document.createElement('div');
        item.className = 'bg-white p-6 rounded-xl shadow-sm border border-gray-100 space-y-4';
        item.innerHTML = `
          <div class="flex justify-between items-center border-b pb-3">
            <span class="font-bold text-gray-900 text-base">${log.date} - ${log.title}</span>
            <span class="text-sm text-gray-600 bg-gray-100 px-3 py-1 rounded-full font-medium">技師：${log.tech}</span>
          </div>
          <p class="text-sm text-gray-700 leading-relaxed"><strong>施工備註：</strong>${log.desc}</p>
        `;
        list.appendChild(item);
      });
    }

    // 返回列表頁
    function backToCustomerList() {
      document.getElementById('customer-detail-view').classList.add('hidden');
      document.getElementById('customer-list-view').classList.remove('hidden');
      renderCustomerTable();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // 分頁籤切換
    function switchTab(tabName) {
      ['info', 'equipment', 'history'].forEach(t => {
        const content = document.getElementById(`tab-content-${t}`);
        const btn = document.getElementById(`tab-btn-${t}`);
        if (content && btn) {
          if (t === tabName) {
            content.classList.remove('hidden');
            btn.className = "py-3 border-b-2 border-blue-600 text-blue-600 font-medium transition cursor-pointer";
          } else {
            content.classList.add('hidden');
            btn.className = "py-3 border-b-2 border-transparent text-gray-500 hover:text-gray-700 transition cursor-pointer";
          }
        }
      });
    }

    // 關閉 Modal
    function closeActionModal() {
      document.getElementById('action-modal').classList.add('hidden');
    }

    // 1. 開啟新增客戶 Modal
    function openAddCustomerModal() {
      document.getElementById('modal-title').innerText = '新增客戶資料';
      document.getElementById('modal-body').innerHTML = `
        <div class="space-y-3">
          <div>
            <label class="block font-medium text-gray-700 mb-1">客戶姓名</label>
            <input type="text" id="input-c-name" placeholder="請輸入姓名" class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 outline-none">
          </div>
          <div>
            <label class="block font-medium text-gray-700 mb-1">聯絡電話</label>
            <input type="text" id="input-c-phone" placeholder="請輸入電話" class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 outline-none">
          </div>
          <div>
            <label class="block font-medium text-gray-700 mb-1">施工地址</label>
            <input type="text" id="input-c-address" placeholder="請輸入施工地址" class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 outline-none">
          </div>
          <div class="flex justify-end gap-2 pt-2">
            <button type="button" onclick="closeActionModal()" class="px-4 py-2 bg-gray-100 rounded-lg text-gray-600 hover:bg-gray-200 cursor-pointer">取消</button>
            <button type="button" onclick="saveNewCustomer()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 cursor-pointer">儲存客戶</button>
          </div>
        </div>
      `;
      document.getElementById('action-modal').classList.remove('hidden');
    }

    function saveNewCustomer() {
      const name = document.getElementById('input-c-name').value.trim();
      const phone = document.getElementById('input-c-phone').value.trim();
      const address = document.getElementById('input-c-address').value.trim();

      if (!name || !phone) {
        alert('請填寫客戶姓名與聯絡電話！');
        return;
      }

      const newCust = {
        id: 'cust_' + Date.now(),
        name,
        phone,
        address: address || '未填寫地址',
        tag: '一般',
        equipment: [],
        logs: []
      };

      customersData.push(newCust);
      renderCustomerTable();
      closeActionModal();
      alert('成功新增客戶！');
    }

    // 2. 開啟編輯客戶 Modal
    function openEditCustomerModal() {
      const cust = customersData.find(c => c.id === currentActiveCustomerId);
      if (!cust) return;

      document.getElementById('modal-title').innerText = '編輯客戶基本資料';
      document.getElementById('modal-body').innerHTML = `
        <div class="space-y-3">
          <div>
            <label class="block font-medium text-gray-700 mb-1">客戶姓名</label>
            <input type="text" id="edit-c-name" value="${cust.name}" class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 outline-none">
          </div>
          <div>
            <label class="block font-medium text-gray-700 mb-1">聯絡電話</label>
            <input type="text" id="edit-c-phone" value="${cust.phone}" class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 outline-none">
          </div>
          <div>
            <label class="block font-medium text-gray-700 mb-1">施工地址</label>
            <input type="text" id="edit-c-address" value="${cust.address}" class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 outline-none">
          </div>
          <div class="flex justify-end gap-2 pt-2">
            <button type="button" onclick="closeActionModal()" class="px-4 py-2 bg-gray-100 rounded-lg text-gray-600 hover:bg-gray-200 cursor-pointer">取消</button>
            <button type="button" onclick="saveEditCustomer()" class="px-4 py-2 bg-emerald-600 text-white rounded-lg hover:bg-emerald-700 cursor-pointer">儲存變更</button>
          </div>
        </div>
      `;
      document.getElementById('action-modal').classList.remove('hidden');
    }

    function saveEditCustomer() {
      const cust = customersData.find(c => c.id === currentActiveCustomerId);
      if (!cust) return;

      cust.name = document.getElementById('edit-c-name').value.trim();
      cust.phone = document.getElementById('edit-c-phone').value.trim();
      cust.address = document.getElementById('edit-c-address').value.trim();

      // 更新畫面上顯示的文字
      document.getElementById('detail-name').innerText = cust.name;
      document.getElementById('detail-phone').innerText = cust.phone;
      document.getElementById('detail-address').innerText = cust.address;

      closeActionModal();
      alert('客戶資料已更新！');
    }

    // 3. 開啟新增冷氣設備 Modal
    function openAddEquipmentModal() {
      document.getElementById('modal-title').innerText = '新增冷氣設備';
      document.getElementById('modal-body').innerHTML = `
        <div class="space-y-3">
          <div>
            <label class="block font-medium text-gray-700 mb-1">安裝位置 (例如：主臥)</label>
            <input type="text" id="eq-location" placeholder="例如：主臥 (AC-02)" class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 outline-none">
          </div>
          <div>
            <label class="block font-medium text-gray-700 mb-1">品牌型號</label>
            <input type="text" id="eq-model" placeholder="例如：大關 RAS-28NK" class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 outline-none">
          </div>
          <div>
            <label class="block font-medium text-gray-700 mb-1">冷房能力 / 規格</label>
            <input type="text" id="eq-capacity" placeholder="例如：2.8 kW (1.2 匹)" class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 outline-none">
          </div>
          <div>
            <label class="block font-medium text-gray-700 mb-1">安裝日期</label>
            <input type="date" id="eq-date" class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 outline-none">
          </div>
          <div class="flex justify-end gap-2 pt-2">
            <button type="button" onclick="closeActionModal()" class="px-4 py-2 bg-gray-100 rounded-lg text-gray-600 hover:bg-gray-200 cursor-pointer">取消</button>
            <button type="button" onclick="saveNewEquipment()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 cursor-pointer">新增設備</button>
          </div>
        </div>
      `;
      document.getElementById('action-modal').classList.remove('hidden');
    }

    function saveNewEquipment() {
      const location = document.getElementById('eq-location').value.trim();
      const model = document.getElementById('eq-model').value.trim();
      const capacity = document.getElementById('eq-capacity').value.trim();
      const date = document.getElementById('eq-date').value;

      if (!location) {
        alert('請填寫安裝位置！');
        return;
      }

      const cust = customersData.find(c => c.id === currentActiveCustomerId);
      if (cust) {
        cust.equipment.push({
          id: 'eq_' + Date.now(),
          location,
          model: model || '未填寫型號',
          capacity: capacity || '未填寫規格',
          date: date || new Date().toISOString().split('T')[0]
        });
        renderEquipmentList(cust.equipment);
      }

      closeActionModal();
      alert('成功新增冷氣設備！');
    }

    // 4. 開啟新增施工紀錄 Modal
    function openAddServiceLogModal() {
      document.getElementById('modal-title').innerText = '新增施工與服務紀錄';
      document.getElementById('modal-body').innerHTML = `
        <div class="space-y-3">
          <div>
            <label class="block font-medium text-gray-700 mb-1">服務日期</label>
            <input type="date" id="log-date" class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 outline-none">
          </div>
          <div>
            <label class="block font-medium text-gray-700 mb-1">服務項目主題</label>
            <input type="text" id="log-title" placeholder="例如：定期深層清洗、冷媒補漏" class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 outline-none">
          </div>
          <div>
            <label class="block font-medium text-gray-700 mb-1">施工技師</label>
            <input type="text" id="log-tech" placeholder="例如：大師傅" class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 outline-none">
          </div>
          <div>
            <label class="block font-medium text-gray-700 mb-1">施工備註說明</label>
            <textarea id="log-desc" class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 outline-none" rows="3" placeholder="記錄清洗狀況、更換零件或測試數值..."></textarea>
          </div>
          <div class="flex justify-end gap-2 pt-2">
            <button type="button" onclick="closeActionModal()" class="px-4 py-2 bg-gray-100 rounded-lg text-gray-600 hover:bg-gray-200 cursor-pointer">取消</button>
            <button type="button" onclick="saveNewServiceLog()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 cursor-pointer">儲存紀錄</button>
          </div>
        </div>
      `;
      document.getElementById('action-modal').classList.remove('hidden');
    }

    function saveNewServiceLog() {
      const date = document.getElementById('log-date').value;
      const title = document.getElementById('log-title').value.trim();
      const tech = document.getElementById('log-tech').value.trim();
      const desc = document.getElementById('log-desc').value.trim();

      if (!title) {
        alert('請填寫服務項目主題！');
        return;
      }

      const cust = customersData.find(c => c.id === currentActiveCustomerId);
      if (cust) {
        cust.logs.unshift({
          id: 'log_' + Date.now(),
          date: date || new Date().toISOString().split('T')[0],
          title,
          tech: tech || '派工技師',
          desc: desc || '無備註說明'
        });
        renderServiceLogs(cust.logs);
      }

      closeActionModal();
      alert('成功新增施工紀錄！');
    }

    // 刪除當前客戶
    function deleteCurrentCustomer() {
      if (!confirm("確定要刪除這位客戶嗎？此操作將會一併移除該客戶底下的設備與施工履歷紀錄！")) {
        return;
      }
      customersData = customersData.filter(c => c.id !== currentActiveCustomerId);
      alert("客戶資料已成功刪除！");
      backToCustomerList();
    }
  </script>
</body>
</html>
