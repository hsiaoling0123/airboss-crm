<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新增派工與報價 - AirBoss CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- PDF 匯出庫 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=MOPLUS+Rounded+1c:wght@500;700;800;900&family=Noto+Sans+TC:wght@500;700;900&display=swap" rel="stylesheet">
    <style> body { font-family: 'MOPLUS Rounded 1c', 'Noto Sans TC', sans-serif; } </style>
</head>
<body class="bg-[#FFFDF9] min-h-screen text-slate-700 pb-16">

    <header class="bg-gradient-to-r from-sky-400 to-indigo-300 text-white p-4 shadow-sm sticky top-0 z-40 flex justify-between items-center rounded-b-2xl">
        <div class="flex items-center gap-2">
            <a href="index.html" class="text-xl font-bold bg-white/20 p-1.5 rounded-xl">⬅️</a>
            <div>
                <h1 class="text-base font-black">✍️ 新增派工與報價單</h1>
                <p class="text-[10px] opacity-90 font-bold">記錄客戶資料、客源並下載 PDF 報價單</p>
            </div>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-4">

        <form id="orderForm" class="bg-white p-5 rounded-3xl border border-amber-100 shadow-sm space-y-3">
            
            <h2 class="font-black text-xs text-sky-600 border-b border-slate-100 pb-2">👤 基本客戶資料</h2>

            <div class="grid grid-cols-2 gap-2">
                <div>
                    <label class="block text-[11px] font-bold text-slate-400 mb-1">客戶姓名 *</label>
                    <input type="text" id="custName" value="張先生" required class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl text-xs">
                </div>
                <div>
                    <label class="block text-[11px] font-bold text-slate-400 mb-1">聯絡電話 *</label>
                    <input type="tel" id="custPhone" value="0933-123-456" required class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl text-xs">
                </div>
            </div>

            <div>
                <label class="block text-[11px] font-bold text-slate-400 mb-1">施工/服務地址 *</label>
                <input type="text" id="custAddress" value="新北市三重區正義北路 100 號 5 樓" required class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl text-xs">
            </div>

            <!-- 客源管道選擇 -->
            <div>
                <label class="block text-[11px] font-bold text-slate-400 mb-1">📍 客源管道 (行銷來源分析)</label>
                <select id="custSource" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl text-xs font-bold text-slate-700">
                    <option value="Google 搜尋/地圖">Google 搜尋 / 地圖商家</option>
                    <option value="LINE 官方帳號">LINE 官方帳號諮詢</option>
                    <option value="FB / IG 廣告">FB / IG 社群廣告</option>
                    <option value="親友/街坊介紹">舊客介紹 / 街坊推薦</option>
                    <option value="過路客/傳單">過路客 / 紙本傳單</option>
                </select>
            </div>

            <h2 class="font-black text-xs text-sky-600 border-b border-slate-100 pb-2 pt-2">❄️ 項目與預估金額</h2>

            <div>
                <label class="block text-[11px] font-bold text-slate-400 mb-1">服務項目與冷氣數量</label>
                <input type="text" id="serviceItem" value="分離式冷氣深層清洗保養 x 2 台" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl text-xs">
            </div>

            <div class="grid grid-cols-2 gap-2">
                <div>
                    <label class="block text-[11px] font-bold text-slate-400 mb-1">預估報價金額 ($)</label>
                    <input type="number" id="price" value="5000" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl text-xs font-black text-emerald-600">
                </div>
                <div>
                    <label class="block text-[11px] font-bold text-slate-400 mb-1">預定施工日期</label>
                    <input type="date" id="serviceDate" value="2026-07-25" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl text-xs">
                </div>
            </div>

            <div class="pt-3 space-y-2">
                <button type="button" onclick="generatePDF()" class="w-full bg-gradient-to-r from-sky-400 to-indigo-400 text-white font-black py-3 rounded-2xl text-xs shadow-sm hover:opacity-90">
                    📄 產生並下載 PDF 報價單
                </button>
                <button type="button" onclick="copyLineMsg()" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-black py-2.5 rounded-2xl text-xs">
                    💬 複製 LINE 報價文字給客戶
                </button>
            </div>
        </form>

        <!-- PDF 預覽隱藏樣式區塊 -->
        <div class="hidden">
            <div id="pdfContent" class="p-8 bg-white text-slate-800 space-y-6" style="width: 600px;">
                <div class="border-b-2 border-sky-400 pb-4 flex justify-between items-center">
                    <div>
                        <h1 class="text-2xl font-black text-sky-600">AirBoss 冷氣空調服務報價單</h1>
                        <p class="text-xs text-slate-400">專業冷氣深層清洗、維修、安裝與保養</p>
                    </div>
                    <div class="text-right text-xs text-slate-500">
                        <p>日期：<span id="pdfDate"></span></p>
                        <p>報價單號：#AB<span id="pdfNo"></span></p>
                    </div>
                </div>

                <div class="bg-slate-50 p-4 rounded-xl space-y-1 text-xs">
                    <p><strong>客戶姓名：</strong><span id="pdfCustName"></span></p>
                    <p><strong>聯絡電話：</strong><span id="pdfCustPhone"></span></p>
                    <p><strong>施工地址：</strong><span id="pdfCustAddress"></span></p>
                </div>

                <table class="w-full text-xs border-collapse">
                    <thead>
                        <tr class="bg-sky-100 text-sky-800">
                            <th class="p-2 text-left">服務內容項目</th>
                            <th class="p-2 text-right">預估金額</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr class="border-b border-slate-100">
                            <td class="p-2" id="pdfItem"></td>
                            <td class="p-2 text-right font-bold text-emerald-600" id="pdfPrice"></td>
                        </tr>
                    </tbody>
                </table>

                <div class="border-t pt-4 text-[10px] text-slate-400 space-y-1">
                    <p>感謝您的預約！本報價單有效期限為 14 天。</p>
                    <p>聯絡電話：0912-345-678 | AirBoss 團隊關心您</p>
                </div>
            </div>
        </div>

    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCfy9ARrE9wp-bCrABsFVb-qM8_sp9_wqs",
            authDomain: "airboss-4f084.firebaseapp.com",
            projectId: "airboss-4f084",
            storageBucket: "airboss-4f084.firebasestorage.app",
            messagingSenderId: "1067344741307",
            appId: "1:1067344741307:web:15a54741a5bdb26e897a9e",
            measurementId: "G-P9ZGJH366L"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        onAuthStateChanged(auth, (user) => {
            if (!user) window.location.href = 'login.html';
        });

        // 產生 PDF 函數
        window.generatePDF = function() {
            const name = document.getElementById('custName').value;
            const phone = document.getElementById('custPhone').value;
            const address = document.getElementById('custAddress').value;
            const item = document.getElementById('serviceItem').value;
            const price = document.getElementById('price').value;

            document.getElementById('pdfCustName').innerText = name;
            document.getElementById('pdfCustPhone').innerText = phone;
            document.getElementById('pdfCustAddress').innerText = address;
            document.getElementById('pdfItem').innerText = item;
            document.getElementById('pdfPrice').innerText = '$' + price;
            document.getElementById('pdfDate').innerText = new Date().toLocaleDateString();
            document.getElementById('pdfNo').innerText = Math.floor(Math.random() * 89999 + 10000);

            const element = document.getElementById('pdfContent');
            element.parentElement.classList.remove('hidden');

            const opt = {
                margin:       0.5,
                filename:     `AirBoss報價單_${name}.pdf`,
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2 },
                jsPDF:        { unit: 'in', format: 'letter', orientation: 'portrait' }
            };

            html2pdf().set(opt).from(element).save().then(() => {
                element.parentElement.classList.add('hidden');
            });
        };

        // 複製 LINE 文字
        window.copyLineMsg = function() {
            const name = document.getElementById('custName').value;
            const item = document.getElementById('serviceItem').value;
            const price = document.getElementById('price').value;
            const msg = `您好 ${name}！這是 AirBoss 為您說明的保養報價：\n項目：${item}\n預估金額：$${price} 元\n若確認無誤請回覆此訊息，我們將為您安排施工行程！😊`;
            navigator.clipboard.writeText(msg);
            alert('✅ 已成功複製 LINE 報價文字！可以直接貼給客戶。');
        };
    </script>
</body>
</html>
