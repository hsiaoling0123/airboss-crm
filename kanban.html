<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>派工行程看板 - AirBoss CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=MOPLUS+Rounded+1c:wght@500;700;800;900&family=Noto+Sans+TC:wght@500;700;900&display=swap" rel="stylesheet">
    <style> 
        body { font-family: 'MOPLUS Rounded 1c', 'Noto Sans TC', sans-serif; letter-spacing: 0.02em; } 
        .kanban-col { min-height: 250px; }
    </style>
</head>
<body class="bg-[#FFFDF9] min-h-screen text-slate-700 pb-16">

    <header class="bg-gradient-to-r from-sky-400 to-indigo-300 text-white p-4 shadow-sm sticky top-0 z-50 flex justify-between items-center rounded-b-2xl">
        <a href="index.html" class="text-xs bg-white/20 hover:bg-white/30 px-3 py-1.5 rounded-full font-bold transition-all">‹ 首頁</a>
        <h1 class="text-base font-black">📅 派工行程與完工回報 🌸</h1>
        <button onclick="requestNotificationPermission()" class="text-[10px] bg-amber-300 text-amber-900 px-2.5 py-1 rounded-full font-black shadow-sm">🔔 推播</button>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-4">
        <!-- 統計面板 -->
        <div class="bg-white p-4 rounded-3xl shadow-sm border border-amber-100 space-y-2">
            <div class="flex justify-between items-center">
                <span class="font-black text-xs text-slate-800">📈 營收統計</span>
                <span id="rangeLabel" class="text-[10px] bg-sky-100 text-sky-700 px-2 py-0.5 rounded-full font-bold">全部期間</span>
            </div>
            <div class="grid grid-cols-3 gap-2 text-center">
                <div class="bg-amber-50/50 p-2 rounded-2xl"><p class="text-[9px] text-slate-400 font-bold">總工單</p><p id="statTotalOrders" class="text-sm font-black text-slate-800">0</p></div>
                <div class="bg-sky-50/50 p-2 rounded-2xl"><p class="text-[9px] text-slate-400 font-bold">預估營收</p><p id="statTotalRev" class="text-xs font-black text-sky-600 mt-0.5">$0</p></div>
                <div class="bg-emerald-50/50 p-2 rounded-2xl"><p class="text-[9px] text-slate-400 font-bold">實收金額</p><p id="statDoneRev" class="text-xs font-black text-emerald-600 mt-0.5">$0</p></div>
            </div>
        </div>

        <!-- 時間過濾 -->
        <div class="flex bg-slate-100 p-1 rounded-2xl text-[11px] font-bold text-slate-500">
            <button onclick="setTimeFilter('today')" id="time-today" class="flex-1 py-1 rounded-xl">今日</button>
            <button onclick="setTimeFilter('week')" id="time-week" class="flex-1 py-1 rounded-xl">本週</button>
            <button onclick="setTimeFilter('month')" id="time-month" class="flex-1 py-1 rounded-xl">本月</button>
            <button onclick="setTimeFilter('all')" id="time-all" class="flex-1 py-1 rounded-xl bg-white text-sky-600 shadow-sm">全部</button>
        </div>

        <!-- 看板雙欄 (點擊卡片填寫完工) -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="space-y-2">
                <div class="flex justify-between px-2 font-black text-xs text-rose-600">
                    <span>⏳ 待處理工單 (點擊進入回報完工)</span>
                    <span id="countPending" class="bg-rose-100 text-rose-800 text-[10px] px-2 py-0.5 rounded-full">0</span>
                </div>
                <div id="colPending" class="kanban-col bg-slate-50 p-3 rounded-3xl border-2 border-dashed border-slate-200 space-y-3"></div>
            </div>

            <div class="space-y-2">
                <div class="flex justify-between px-2 font-black text-xs text-emerald-600">
                    <span>✅ 已完工結案</span>
                    <span id="countDone" class="bg-emerald-100 text-emerald-800 text-[10px] px-2 py-0.5 rounded-full">0</span>
                </div>
                <div id="colDone" class="kanban-col bg-slate-50 p-3 rounded-3xl border-2 border-dashed border-slate-200 space-y-3"></div>
            </div>
        </div>
    </main>

    <!-- 師傅完工資訊填寫彈窗 (Modal) -->
    <div id="finishModal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-3xl p-5 space-y-3 shadow-2xl">
            <div class="flex justify-between items-center border-b pb-2">
                <h3 class="font-black text-xs text-slate-800">🛠️ 師傅完工資訊填寫</h3>
                <button onclick="closeModal()" class="text-slate-400 font-bold text-xs">✕</button>
            </div>

            <div class="space-y-2 text-xs">
                <p>👤 <strong>客戶：</strong><span id="modalCustomer"></span></p>
                <div>
                    <label class="block font-bold text-slate-400 mb-1">實際實收金額 (NT$)</label>
                    <input type="number" id="finalPrice" class="w-full p-2 bg-slate-50 border border-slate-200 rounded-xl font-bold text-emerald-600">
                </div>
                <div>
                    <label class="block font-bold text-slate-400 mb-1">施工備註 / 現場狀況</label>
                    <textarea id="workNotes" rows="2" placeholder="例：散熱片清洗完畢、更換 35uF 電容" class="w-full p-2 bg-slate-50 border border-slate-200 rounded-xl"></textarea>
                </div>
            </div>

            <div class="space-y-2 pt-2">
                <button onclick="submitFinish()" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-black py-2.5 rounded-xl text-xs shadow-sm transition-all">
                    ✅ 完工結案並移動至已完工
                </button>
                <button onclick="sendLineReceipt()" class="w-full bg-sky-50 text-sky-700 font-bold py-2 rounded-xl text-xs hover:bg-sky-100 transition-all flex justify-center items-center gap-1">
                    💬 發送 LINE 完工收據與維護提醒
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCfy9ARrE9wp-bCrABsFVb-qM8_sp9_wqs",
            authDomain: "airboss-4f084.firebaseapp.com",
            projectId: "airboss-4f084",
            storageBucket: "airboss-4f084.firebasestorage.app",
            messagingSenderId: "1067344741307",
            appId: "1:1067344741307:web:15a54741a5bdb26e897a9e",
            measurementId: "G-P9ZGJH366L"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let currentTimeFilter = 'all';
        let allOrders = [];
        let currentActiveOrder = null;

        onSnapshot(collection(db, "orders"), (snapshot) => {
            allOrders = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            renderKanban();
        });

        window.renderKanban = function() {
            const now = new Date();
            let filtered = allOrders.filter(order => {
                if (!order.date) return true;
                const orderDate = new Date(order.date);
                if (currentTimeFilter === 'today') return orderDate.toDateString() === now.toDateString();
                if (currentTimeFilter === 'week') return (now - orderDate) <= (7 * 24 * 60 * 60 * 1000);
                if (currentTimeFilter === 'month') return orderDate.getMonth() === now.getMonth() && orderDate.getFullYear() === now.getFullYear();
                return true;
            });

            let totalRev = 0, doneRev = 0;
            filtered.forEach(o => {
                totalRev += Number(o.price || 0);
                if (o.status === '已完工') doneRev += Number(o.finalPrice || o.price || 0);
            });

            document.getElementById('statTotalOrders').innerText = filtered.length;
            document.getElementById('statTotalRev').innerText = `$${totalRev.toLocaleString()}`;
            document.getElementById('statDoneRev').innerText = `$${doneRev.toLocaleString()}`;

            const pending = filtered.filter(o => o.status !== '已完工');
            const done = filtered.filter(o => o.status === '已完工');

            document.getElementById('countPending').innerText = pending.length;
            document.getElementById('countDone').innerText = done.length;

            document.getElementById('colPending').innerHTML = pending.map(o => createCardHtml(o)).join('');
            document.getElementById('colDone').innerHTML = done.map(o => createCardHtml(o)).join('');
        };

        function createCardHtml(order) {
            return `
                <div onclick="openFinishModal('${order.id}')" class="bg-white p-3.5 rounded-2xl shadow-sm border border-amber-100/80 space-y-2 cursor-pointer hover:border-sky-400 transition-all">
                    <div class="flex justify-between items-center border-b border-slate-50 pb-1.5">
                        <span class="font-black text-xs text-slate-800">👤 ${order.customerName || '未名客戶'}</span>
                        <span class="text-[9px] font-bold px-2 py-0.5 rounded-full ${order.status === '已完工' ? 'bg-emerald-100 text-emerald-800' : 'bg-rose-100 text-rose-800'}">
                            ${order.status || '待處理'}
                        </span>
                    </div>

                    <div class="text-[11px] space-y-0.5 text-slate-600">
                        <p>🗓️ <strong>時間：</strong>${order.date || ''} ${order.time || ''}</p>
                        <p>📍 <strong>地址：</strong>${order.address || '未填寫'}</p>
                        <p>🛠️ <strong>項目：</strong>${order.serviceType || '保養'}</p>
                        <p>💰 <strong>預估/實收：</strong>NT$ ${Number(order.finalPrice || order.price || 0).toLocaleString()}</p>
                    </div>

                    <div class="pt-1 text-[10px] text-sky-600 font-bold text-right">
                        ${order.status === '已完工' ? '✅ 已結案 (點擊查看)' : '👉 點擊開啟完工回報 modal'}
                    </div>
                </div>
            `;
        }

        window.openFinishModal = function(id) {
            currentActiveOrder = allOrders.find(o => o.id === id);
            if (!currentActiveOrder) return;

            document.getElementById('modalCustomer').innerText = currentActiveOrder.customerName;
            document.getElementById('finalPrice').value = currentActiveOrder.finalPrice || currentActiveOrder.price || 0;
            document.getElementById('workNotes').value = currentActiveOrder.workNotes || '';
            document.getElementById('finishModal').classList.remove('hidden');
        };

        window.closeModal = function() {
            document.getElementById('finishModal').classList.add('hidden');
        };

        window.submitFinish = async function() {
            if (!currentActiveOrder) return;
            const finalPrice = Number(document.getElementById('finalPrice').value || 0);
            const workNotes = document.getElementById('workNotes').value;

            await updateDoc(doc(db, "orders", currentActiveOrder.id), {
                status: '已完工',
                finalPrice: finalPrice,
                workNotes: workNotes,
                finishedAt: new Date().toISOString()
            });

            alert('🎉 已完成結案並移至已完工區！');
            closeModal();
        };

        window.sendLineReceipt = function() {
            if (!currentActiveOrder) return;
            const finalPrice = document.getElementById('finalPrice').value || 0;
            const workNotes = document.getElementById('workNotes').value || '無';

            const msg = `🌸 AirBoss 冷氣保養/維修完工收據 🌸\n------------------\n${currentActiveOrder.customerName} 先生/小姐您好：\n今日冷氣保養維護服務已順利完成！\n\n🛠️ 服務項目：${currentActiveOrder.serviceType}\n📝 施工狀況：${workNotes}\n💰 實收金額：NT$ ${Number(finalPrice).toLocaleString()} 元\n\n💡 貼心提醒：定期清洗冷氣能維持良好冷房效果與省電！感謝您的支持，祝您有舒適愉快的一天！🐻❄️`;
            window.open(`https://line.me/R/msg/text/?${encodeURIComponent(msg)}`, '_blank');
        };

        window.setTimeFilter = function(time) {
            currentTimeFilter = time;
            ['today', 'week', 'month', 'all'].forEach(t => document.getElementById(`time-${t}`).className = 'flex-1 py-1 rounded-xl text-slate-500');
            document.getElementById(`time-${time}`).className = 'flex-1 py-1 rounded-xl bg-white text-sky-600 shadow-sm font-bold';
            renderKanban();
        };
    </script>
</body>
</html>
