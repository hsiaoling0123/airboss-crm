<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AirBoss CRM - 涼爽小管家</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Zen Maru Gothic', sans-serif; }
    </style>
</head>
<body class="bg-[#FFFDF9] min-h-screen text-slate-700 pb-12">

    <!-- 頂部卡哇伊標題列 -->
    <header class="bg-gradient-to-r from-sky-400 to-indigo-300 text-white p-5 shadow-sm rounded-b-[2rem] text-center relative">
        <div class="inline-block bg-white/20 backdrop-blur-md px-4 py-1 rounded-full text-xs font-bold tracking-wider mb-1">
            ✨ 冷氣維修與保養小助手
        </div>
        <h1 class="text-2xl font-black tracking-wide flex items-center justify-center gap-2">
            ❄️ AirBoss CRM 🐻
        </h1>
    </header>

    <main class="max-w-md mx-auto p-5 space-y-6">

        <!-- 今日概況卡片 -->
        <div class="bg-gradient-to-br from-amber-100/80 via-orange-50 to-rose-100/60 p-5 rounded-3xl shadow-sm border border-amber-200/50 space-y-3">
            <div class="flex justify-between items-center">
                <span class="text-xs font-bold bg-amber-200/70 text-amber-900 px-3 py-1 rounded-full">
                    ☀️ 今天也是活力滿滿的一天！
                </span>
                <span id="todayDate" class="text-xs font-bold text-slate-500"></span>
            </div>
            <div class="grid grid-cols-3 gap-2 text-center pt-2">
                <div class="bg-white/80 backdrop-blur-sm p-3 rounded-2xl">
                    <p class="text-[11px] font-bold text-slate-400">總客戶</p>
                    <p id="stat-customers" class="text-lg font-black text-sky-600 mt-0.5">0</p>
                </div>
                <div class="bg-white/80 backdrop-blur-sm p-3 rounded-2xl">
                    <p class="text-[11px] font-bold text-slate-400">待排工單</p>
                    <p id="stat-pending" class="text-lg font-black text-rose-500 mt-0.5">0</p>
                </div>
                <div class="bg-white/80 backdrop-blur-sm p-3 rounded-2xl">
                    <p class="text-[11px] font-bold text-slate-400">本月預估</p>
                    <p id="stat-revenue" class="text-xs font-black text-emerald-600 mt-1.5">NT$0</p>
                </div>
            </div>
        </div>

        <!-- 捷徑選單 -->
        <div class="space-y-3">
            <p class="text-xs font-bold text-slate-400 px-2 flex items-center gap-1">
                <span>🌸</span> 常用功能選單
            </p>

            <div class="grid grid-cols-2 gap-3">
                <a href="kanban.html" class="bg-sky-50 border border-sky-100 hover:bg-sky-100 p-4 rounded-3xl transition-all shadow-sm flex flex-col items-center text-center space-y-2 group">
                    <div class="w-12 h-12 bg-sky-200/60 rounded-2xl flex items-center justify-center text-2xl group-hover:scale-110 transition-transform">
                        📅
                    </div>
                    <div>
                        <div class="font-bold text-sm text-sky-900">派工行程看板</div>
                        <div class="text-[10px] text-sky-600 font-medium">本日/本週/本月拖曳</div>
                    </div>
                </a>

                <a href="customers.html" class="bg-rose-50 border border-rose-100 hover:bg-rose-100 p-4 rounded-3xl transition-all shadow-sm flex flex-col items-center text-center space-y-2 group">
                    <div class="w-12 h-12 bg-rose-200/60 rounded-2xl flex items-center justify-center text-2xl group-hover:scale-110 transition-transform">
                        👥
                    </div>
                    <div>
                        <div class="font-bold text-sm text-rose-900">客戶名冊簿</div>
                        <div class="text-[10px] text-rose-600 font-medium">完整設備與導航</div>
                    </div>
                </a>

                <a href="create-order.html" class="bg-emerald-50 border border-emerald-100 hover:bg-emerald-100 p-4 rounded-3xl transition-all shadow-sm flex flex-col items-center text-center space-y-2 group">
                    <div class="w-12 h-12 bg-emerald-200/60 rounded-2xl flex items-center justify-center text-2xl group-hover:scale-110 transition-transform">
                        📝
                    </div>
                    <div>
                        <div class="font-bold text-sm text-emerald-900">快速新增工單</div>
                        <div class="text-[10px] text-emerald-600 font-medium">指派日期與服務項目</div>
                    </div>
                </a>

                <a href="add-customer.html" class="bg-amber-50 border border-amber-100 hover:bg-amber-100 p-4 rounded-3xl transition-all shadow-sm flex flex-col items-center text-center space-y-2 group">
                    <div class="w-12 h-12 bg-amber-200/60 rounded-2xl flex items-center justify-center text-2xl group-hover:scale-110 transition-transform">
                        🏡
                    </div>
                    <div>
                        <div class="font-bold text-sm text-amber-900">建立新客戶</div>
                        <div class="text-[10px] text-amber-600 font-medium">登錄冷氣台數與備註</div>
                    </div>
                </a>
            </div>
        </div>

    </main>

    <script>
        document.getElementById('todayDate').textContent = new Date().toLocaleDateString('zh-TW', { month: 'short', day: 'numeric', weekday: 'short' });

        const customers = JSON.parse(localStorage.getItem('airboss_customers')) || [];
        const orders = JSON.parse(localStorage.getItem('airboss_orders')) || [];

        document.getElementById('stat-customers').textContent = customers.length;
        document.getElementById('stat-pending').textContent = orders.filter(o => o.status !== '已完工').length;

        // 計算本月總金額
        const now = new Date();
        const monthPrefix = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
        const totalRev = orders.filter(o => o.date && o.date.startsWith(monthPrefix)).reduce((sum, o) => sum + Number(o.price || 0), 0);
        document.getElementById('stat-revenue').textContent = `NT$ ${totalRev.toLocaleString()}`;
    </script>
</body>
</html>
