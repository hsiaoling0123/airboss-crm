<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工單現場作業 - AirBoss CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=MOPLUS+Rounded+1c:wght@500;700;800;900&family=Noto+Sans+TC:wght@500;700;900&display=swap" rel="stylesheet">
    <style> 
        body { 
            font-family: 'MOPLUS Rounded 1c', 'Noto Sans TC', sans-serif; 
            letter-spacing: 0.02em;
        } 
    </style>
</head>
<body class="bg-[#FFFDF9] min-h-screen text-slate-700 pb-16">

    <header class="bg-gradient-to-r from-sky-400 to-indigo-300 text-white p-4 shadow-sm sticky top-0 z-50 flex justify-between items-center rounded-b-2xl">
        <a href="kanban.html" class="text-xs bg-white/20 hover:bg-white/30 px-3 py-1.5 rounded-full font-bold transition-all">
            ‹ 看板
        </a>
        <h1 class="text-base font-black">🛠️ 現場施工與完工簽收 🌸</h1>
        <div class="w-10"></div>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-4">

        <div class="bg-white p-4 rounded-3xl shadow-sm border border-amber-100 space-y-2">
            <div class="flex justify-between items-center">
                <span class="text-[10px] bg-sky-100 text-sky-800 font-bold px-2.5 py-0.5 rounded-full" id="orderIdText">工單 #001</span>
                <span class="text-xs font-bold text-amber-600" id="orderStatusText">施工中</span>
            </div>
            <h2 class="text-base font-black text-slate-800" id="custNameText">王先生</h2>
            <p class="text-xs text-slate-500 font-medium" id="custPhoneAddress">📞 0912-345-678 | 📍 台北市中山區民生東路二段88號</p>
            <p class="text-xs text-sky-700 font-bold bg-sky-50 p-2 rounded-xl mt-1" id="serviceTypeText">🔧 服務項目：分離式冷氣清洗 x2 + 補冷媒</p>
        </div>

        <div class="bg-white p-4 rounded-3xl shadow-sm border border-amber-100 space-y-3">
            <div class="flex justify-between items-center">
                <h3 class="font-bold text-xs text-slate-800 flex items-center gap-1.5">
                    <span class="text-sky-500">📸</span> 施工前後照片 / 影片記錄
                </h3>
                <label class="cursor-pointer bg-sky-400 hover:bg-sky-500 text-white text-[11px] font-bold px-3 py-1 rounded-full shadow-sm transition-all">
                    + 拍攝/上傳
                    <input type="file" accept="image/*,video/*" multiple onchange="handleMediaUpload(event)" class="hidden">
                </label>
            </div>
            <div id="mediaGrid" class="grid grid-cols-3 gap-2">
                </div>
        </div>

        <div class="bg-white p-4 rounded-3xl shadow-sm border border-amber-100 space-y-3">
            <h3 class="font-bold text-xs text-slate-800 flex items-center gap-1.5">
                <span class="text-emerald-500">💵</span> 現場收款與結帳
            </h3>
            <div class="grid grid-cols-2 gap-2">
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 mb-1">應收金額</label>
                    <input type="number" id="payAmount" value="5700" class="w-full p-2 bg-amber-50/30 border border-amber-100 rounded-xl text-xs font-black text-slate-800">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 mb-1">付款方式</label>
                    <select id="payMethod" class="w-full p-2 bg-amber-50/30 border border-amber-100 rounded-xl text-xs font-bold text-slate-700">
                        <option>現金付款</option>
                        <option>LINE Pay / 轉帳</option>
                        <option>刷卡</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="bg-white p-4 rounded-3xl shadow-sm border border-amber-100 space-y-2">
            <div class="flex justify-between items-center">
                <h3 class="font-bold text-xs text-slate-800 flex items-center gap-1.5">
                    <span class="text-indigo-500">✍️</span> 客戶完工簽名
                </h3>
                <button type="button" onclick="clearSignature()" class="text-[10px] text-rose-500 font-bold">清除重簽</button>
            </div>
            <div class="border border-slate-200 rounded-2xl bg-slate-50 overflow-hidden">
                <canvas id="signatureCanvas" class="w-full h-32 touch-none"></canvas>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-2 pt-2">
            <button onclick="generateCompletionPDF()" class="bg-gradient-to-r from-sky-400 to-indigo-400 text-white font-black py-3 rounded-2xl text-xs shadow-sm flex items-center justify-center gap-1">
                <span>📄 生成 PDF 完工單</span>
            </button>
            <button onclick="sendCompletionToLine()" class="bg-gradient-to-r from-emerald-400 to-teal-400 text-white font-black py-3 rounded-2xl text-xs shadow-sm flex items-center justify-center gap-1">
                <span>💬 完工證明 LINE 給客戶</span>
            </button>
        </div>

        <div class="hidden">
            <div id="completionPaper" class="p-6 bg-white space-y-4 text-xs">
                <div class="border-b-2 border-sky-400 pb-2 flex justify-between items-end">
                    <h1 class="text-base font-black text-sky-900">❄️ AirBoss 冷氣服務完工確認單</h1>
                    <span id="pdfDate" class="text-[10px] text-slate-400"></span>
                </div>
                <div class="space-y-1">
                    <p><b>客戶姓名：</b><span id="pdfCustName"></span></p>
                    <p><b>服務地址：</b><span id="pdfCustAddress"></span></p>
                    <p><b>施工項目：</b><span id="pdfService"></span></p>
                    <p><b>實收金額：</b><span id="pdfAmount" class="text-emerald-600 font-black"></span> (<span id="pdfMethod"></span>)</p>
                </div>
                <div class="border-t border-slate-200 pt-2 space-y-1">
                    <p class="font-bold">客戶簽名確認：</p>
                    <img id="pdfSigImage" class="h-16 border border-slate-200 rounded-lg">
                </div>
            </div>
        </div>

    </main>

    <script>
        let signaturePad;

        document.addEventListener('DOMContentLoaded', () => {
            const canvas = document.getElementById('signatureCanvas');
            // 自適應寬度
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = 128;
            signaturePad = new SignaturePad(canvas, { backgroundColor: 'rgb(248, 250, 252)' });

            document.getElementById('pdfDate').textContent = new Date().toLocaleDateString('zh-TW');
        });

        function clearSignature() {
            if (signaturePad) signaturePad.clear();
        }

        // 處理照片與影片上傳
        function handleMediaUpload(event) {
            const files = event.target.files;
            const grid = document.getElementById('mediaGrid');

            Array.from(files).forEach(file => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const isVideo = file.type.startsWith('video/');
                    const item = document.createElement('div');
                    item.className = "relative aspect-square rounded-2xl overflow-hidden bg-slate-100 border border-slate-200 shadow-sm";

                    if (isVideo) {
                        item.innerHTML = `<video src="${e.target.result}" class="w-full h-full object-cover"></video><span class="absolute top-1 left-1 bg-black/60 text-white text-[8px] px-1 rounded">🎥 影片</span>`;
                    } else {
                        item.innerHTML = `<img src="${e.target.result}" class="w-full h-full object-cover">`;
                    }
                    grid.appendChild(item);
                };
                reader.readAsDataURL(file);
            });
        }

        // 生成完工 PDF
        function generateCompletionPDF() {
            if (signaturePad.isEmpty()) {
                alert('請先請客戶在下方簽名喔！✍️');
                return;
            }

            document.getElementById('pdfCustName').textContent = document.getElementById('custNameText').textContent;
            document.getElementById('pdfCustAddress').textContent = document.getElementById('custPhoneAddress').textContent;
            document.getElementById('pdfService').textContent = document.getElementById('serviceTypeText').textContent;
            document.getElementById('pdfAmount').textContent = `NT$ ${document.getElementById('payAmount').value}`;
            document.getElementById('pdfMethod').textContent = document.getElementById('payMethod').value;
            
            // 帶入電子簽名圖檔
            document.getElementById('pdfSigImage').src = signaturePad.toDataURL();

            const element = document.getElementById('completionPaper');
            element.parentElement.classList.remove('hidden');

            const opt = {
                margin: 10,
                filename: `AirBoss完工證明_${document.getElementById('custNameText').textContent}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2 },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            html2pdf().set(opt).from(element).save().then(() => {
                element.parentElement.classList.add('hidden');
            });
        }

        // LINE 傳送完工通知
        function sendCompletionToLine() {
            const name = document.getElementById('custNameText').textContent;
            const amount = document.getElementById('payAmount').value;
            const method = document.getElementById('payMethod').value;
            const service = document.getElementById('serviceTypeText').textContent;

            const msg = `🌸 AirBoss 冷氣服務完工收據 🌸\n------------------\n👤 客戶：${name} 先生/小姐\n${service}\n\n💰 實收金額：NT$ ${Number(amount).toLocaleString()} (${method})\n✍️ 電子簽名：已確認完工\n------------------\n感謝您的支持！如有任何問題歡迎隨時聯繫我們！😊`;

            window.open(`https://line.me/R/msg/text/?${encodeURIComponent(msg)}`, '_blank');
        }
    </script>
</body>
</html>
