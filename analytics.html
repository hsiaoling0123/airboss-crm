<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>營業與客源分析 - AirBoss CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=MOPLUS+Rounded+1c:wght@500;700;800;900&family=Noto+Sans+TC:wght@500;700;900&display=swap" rel="stylesheet">
    <style> body { font-family: 'MOPLUS Rounded 1c', 'Noto Sans TC', sans-serif; } </style>
</head>
<body class="bg-[#FFFDF9] min-h-screen text-slate-700 pb-16">

    <!-- 頂部標頭 -->
    <header class="bg-gradient-to-r from-sky-400 to-indigo-300 text-white p-4 shadow-sm sticky top-0 z-40 flex justify-between items-center rounded-b-2xl">
        <div class="flex items-center gap-2">
            <a href="index.html" class="text-xl font-bold bg-white/20 p-1.5 rounded-xl">⬅️</a>
            <div>
                <h1 class="text-base font-black">📊 營業與客源分析</h1>
                <p class="text-[10px] opacity-90 font-bold">CRM 資料庫即時連動計算</p>
            </div>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-4">

        <!-- 1. 💰 營收與總覽卡片 -->
        <div class="bg-gradient-to-br from-blue-600 to-indigo-600 text-white p-5 rounded-3xl shadow-lg space-y-4">
            <div class="flex justify-between items-center text-xs opacity-90 font-bold border-b border-white/20 pb-2">
                <span>📅 2026 年 7 月份即時統計</span>
                <span class="bg-white/20 px-2 py-0.5 rounded-full">動態同步</span>
            </div>
            <div>
                <p class="text-xs opacity-80 font-bold">本月實收總營業額</p>
                <h2 id="totalRevenue" class="text-3xl font-black mt-1">$0</h2>
            </div>
            <div class="grid grid-cols-3 gap-2 pt-2 border-t border-white/20 text-center">
                <div>
                    <p class="text-[10px] opacity-80 font-bold">完工件數</p>
                    <p id="totalCount" class="text-base font-black">0 件</p>
                </div>
                <div>
                    <p class="text-[10px] opacity-80 font-bold">平均客單價</p>
                    <p id="avgPrice" class="text-base font-black">$0</p>
                </div>
                <div>
                    <p class="text-[10px] opacity-80 font-bold">狀態</p>
                    <p class="text-base font-black text-emerald-300">正常營運</p>
                </div>
            </div>
        </div>

        <!-- 2. 🎯 客源管道來源與佔比分析 -->
        <div class="bg-white p-4 rounded-3xl border border-amber-100 shadow-sm space-y-3">
            <div class="flex justify-between items-center border-b pb-2">
                <h3 class="font-black text-xs text-slate-800">🎯 客源管道來源與佔比分析</h3>
                <span class="text-[10px] bg-sky-100 text-sky-700 font-bold px-2 py-0.5 rounded-full">即時統計</span>
            </div>

            <div id="sourceAnalysisList" class="space-y-3 pt-1">
                <!-- 動態載入客源數據 -->
            </div>
        </div>

        <!-- 3. 🛠️ 服務項目營收佔比 -->
        <div class="bg-white p-4 rounded-3xl border border-amber-100 shadow-sm space-y-3">
            <div class="flex justify-between items-center border-b pb-2">
                <h3 class="font-black text-xs text-slate-800">🛠️ 服務項目營收佔比</h3>
                <span class="text-[10px] bg-indigo-100 text-indigo-700 font-bold px-2 py-0.5 rounded-full">即時統計</span>
            </div>

            <div id="serviceAnalysisList" class="grid grid-cols-2 gap-2 pt-1">
                <!-- 動態載入服務項目數據 -->
            </div>
        </div>

    </main>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            renderAnalytics();
        });

        function renderAnalytics() {
            const customers = JSON.parse(localStorage.getItem('airboss_customers')) || [];

            let totalRevenue = 0;
            let totalCount = 0;
            let sourceStats = {};
            let serviceStats = {};

            customers.forEach(cust => {
                const src = cust.source || '其他';
                if (!sourceStats[src]) sourceStats[src] = { count: 0, revenue: 0 };

                if (cust.logs && cust.logs.length > 0) {
                    cust.logs.forEach(log => {
                        // 檢查是否已完工結案
                        const isCompleted = log.desc && log.desc.includes('[已完工結案]');
                        
                        // 解析金額
                        let priceVal = 3500;
                        const matchPrice = log.title.match(/\$(\d+)/);
                        if (matchPrice) priceVal = parseInt(matchPrice[1]);
                        const matchDescPrice = log.desc && log.desc.match(/實收 \$(\d+)/);
                        if (matchDescPrice) priceVal = parseInt(matchDescPrice[1]);

                        if (isCompleted) {
                            totalRevenue += priceVal;
                            totalCount++;
                            sourceStats[src].count++;
                            sourceStats[src].revenue += priceVal;

                            // 解析服務項目分類
                            let serviceName = log.title.split('[')[0].trim();
                            if (!serviceName) serviceName = '標準清洗服務';
                            serviceStats[serviceName] = (serviceStats[serviceName] || 0) + priceVal;
                        }
                    });
                }
            });

            // 1. 更新頂部營收總覽
            document.getElementById('totalRevenue').innerText = '$' + totalRevenue.toLocaleString();
            document.getElementById('totalCount').innerText = totalCount + ' 件';
            const avg = totalCount > 0 ? Math.round(totalRevenue / totalCount) : 0;
            document.getElementById('avgPrice').innerText = '$' + avg.toLocaleString();

            // 2. 渲染客源管道分析
            const sourceEl = document.getElementById('sourceAnalysisList');
            sourceEl.innerHTML = '';

            if (Object.keys(sourceStats).length === 0 || totalRevenue === 0) {
                sourceEl.innerHTML = `<p class="text-xs text-slate-400 font-bold text-center py-4">目前尚無已結案的派工資料可供分析</p>`;
            } else {
                for (const [source, data] of Object.entries(sourceStats)) {
                    if (data.count > 0) {
                        const percent = Math.round((data.revenue / totalRevenue) * 100);
                        sourceEl.innerHTML += `
                            <div class="space-y-1">
                                <div class="flex justify-between text-xs font-black">
                                    <span class="text-slate-700">📌 ${source}</span>
                                    <span class="text-sky-600">${percent}% (${data.count} 件 / $${data.revenue.toLocaleString()})</span>
                                </div>
                                <div class="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                                    <div class="bg-sky-400 h-full rounded-full" style="width: ${percent}%"></div>
                                </div>
                            </div>
                        `;
                    }
                }
            }

            // 3. 渲染服務項目營收佔比
            const serviceEl = document.getElementById('serviceAnalysisList');
            serviceEl.innerHTML = '';

            if (Object.keys(serviceStats).length === 0 || totalRevenue === 0) {
                serviceEl.innerHTML = `<div class="col-span-2 text-center text-xs text-slate-400 font-bold py-4">尚無服務項目數據</div>`;
            } else {
                for (const [svcName, svcRev] of Object.entries(serviceStats)) {
                    const svcPercent = Math.round((svcRev / totalRevenue) * 100);
                    serviceEl.innerHTML += `
                        <div class="bg-slate-50 p-3 rounded-2xl border border-slate-100 space-y-1">
                            <p class="text-[11px] font-black text-slate-700 truncate">❄️ ${svcName}</p>
                            <p class="text-sm font-black text-indigo-600">${svcPercent}%</p>
                            <p class="text-[10px] text-slate-400 font-bold">營收：$${svcRev.toLocaleString()}</p>
                        </div>
                    `;
                }
            }
        }
    </script>
</body>
</html>
