<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>客戶資料管理 - AirBoss CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=MOPLUS+Rounded+1c:wght@500;700;800;900&family=Noto+Sans+TC:wght@500;700;900&display=swap" rel="stylesheet">
    <style> body { font-family: 'MOPLUS Rounded 1c', 'Noto Sans TC', sans-serif; } </style>
</head>
<body class="bg-[#FFFDF9] min-h-screen text-slate-700 pb-16">

    <header class="bg-gradient-to-r from-sky-400 to-indigo-300 text-white p-4 shadow-sm sticky top-0 z-40 flex justify-between items-center rounded-b-2xl">
        <div class="flex items-center gap-2">
            <a href="index.html" class="text-xl font-bold bg-white/20 p-1.5 rounded-xl">⬅️</a>
            <h1 class="text-base font-black">👥 客戶資料與設備履歷</h1>
        </div>
        <button onclick="openAddCustomerModal()" class="bg-white text-sky-600 px-3 py-1.5 rounded-xl font-black text-xs shadow-sm">
            ➕ 新增客戶
        </button>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-4">

        <div class="relative">
            <input type="text" id="searchInput" oninput="filterCustomers()" placeholder="🔍 搜尋客戶姓名、電話、地址..." class="w-full pl-10 pr-4 py-3 bg-white border border-amber-200 rounded-2xl text-xs font-bold shadow-sm focus:outline-sky-400">
            <span class="absolute left-3.5 top-3 text-sm">🔍</span>
        </div>

        <div id="customerList" class="space-y-3">
            </div>

    </main>

    <div id="customerModal" class="fixed inset-0 bg-slate-900/50 opacity-0 pointer-events-none transition-opacity duration-300 z-50 flex items-center justify-center p-4 overflow-y-auto">
        <div class="bg-white w-full max-w-sm rounded-3xl p-5 space-y-4 shadow-2xl my-auto">
            <div class="flex justify-between items-center border-b pb-2">
                <h3 id="modalTitle" class="font-black text-base text-slate-800">新增客戶資料</h3>
                <button onclick="closeCustomerModal()" class="text-slate-400 font-black text-lg p-1">✕</button>
            </div>

            <input type="hidden" id="editIndex" value="-1">

            <div class="space-y-3 text-xs">
                <div>
                    <label class="block font-bold text-slate-600 mb-1">客戶姓名 *</label>
                    <input type="text" id="inputName" placeholder="例如：王小明" class="w-full p-2.5 bg-slate-50 border rounded-xl font-bold">
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block font-bold text-slate-600 mb-1">主要電話 *</label>
                        <input type="text" id="inputPhone" placeholder="0912-345-678" class="w-full p-2.5 bg-slate-50 border rounded-xl font-bold">
                    </div>
                    <div>
                        <label class="block font-bold text-slate-600 mb-1">客戶來源</label>
                        <select id="inputSource" class="w-full p-2.5 bg-slate-50 border rounded-xl font-bold text-slate-700">
                            <option value="FB 粉絲團">🌐 FB 粉絲團</option>
                            <option value="Google 搜尋">🔍 Google 搜尋</option>
                            <option value="老客戶介紹">🤝 老客戶介紹</option>
                            <option value="LINE 官方帳號">💬 LINE 官方帳號</option>
                            <option value="路過看到 / 實體廣告">🏢 路過看到 / 實體廣告</option>
                            <option value="其他">📌 其他</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label class="block font-bold text-slate-600 mb-1">施工地址 *</label>
                    <input type="text" id="inputAddress" placeholder="新北市板橋區..." class="w-full p-2.5 bg-slate-50 border rounded-xl font-bold">
                </div>
                <div>
                    <label class="block font-bold text-slate-600 mb-1">備註 / 現場注意事項</label>
                    <textarea id="inputNotes" rows="2" placeholder="例如：需穿鞋套..." class="w-full p-2.5 bg-slate-50 border rounded-xl font-bold"></textarea>
                </div>
            </div>

            <div class="flex gap-2 pt-2">
                <button onclick="saveCustomerData()" class="flex-1 bg-sky-500 hover:bg-sky-600 text-white font-black py-2.5 rounded-xl text-xs shadow-md">
                    💾 儲存客戶
                </button>
                <button onclick="closeCustomerModal()" class="flex-1 bg-slate-100 text-slate-600
