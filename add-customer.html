<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新增客戶 - AirBoss CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen text-slate-800">

    <!-- 頂部導覽列 -->
    <header class="bg-blue-600 text-white p-4 shadow-lg sticky top-0 z-50 flex items-center justify-between">
        <a href="index.html" class="text-sm bg-blue-700 px-3 py-1.5 rounded-lg flex items-center gap-1 font-medium">
            ‹ 返回首頁
        </a>
        <h1 class="text-lg font-bold">新增客戶資料</h1>
        <div class="w-16"></div> <!-- 保持標題置中用的空區塊 -->
    </header>

    <!-- 主要表單內容 -->
    <main class="max-w-md mx-auto p-4">
        <form class="bg-white p-5 rounded-xl shadow-sm border border-slate-200 space-y-4">
            
            <!-- 客戶姓名 -->
            <div>
                <label class="block text-xs font-bold text-slate-700 mb-1">客戶姓名 *</label>
                <input type="text" placeholder="例：張先生 / 鼎泰豐板橋店" class="w-full p-2.5 bg-slate-50 border border-slate-300 rounded-lg text-sm focus:outline-none focus:border-blue-500">
            </div>

            <!-- 聯絡電話 -->
            <div>
                <label class="block text-xs font-bold text-slate-700 mb-1">聯絡電話 *</label>
                <input type="tel" placeholder="例：0912345678" class="w-full p-2.5 bg-slate-50 border border-slate-300 rounded-lg text-sm focus:outline-none focus:border-blue-500">
            </div>

            <!-- 地址 -->
            <div>
                <label class="block text-xs font-bold text-slate-700 mb-1">服務地址</label>
                <input type="text" placeholder="例：新北市板橋區文化路..." class="w-full p-2.5 bg-slate-50 border border-slate-300 rounded-lg text-sm focus:outline-none focus:border-blue-500">
            </div>

            <!-- 客戶分類標籤 -->
            <div>
                <label class="block text-xs font-bold text-slate-700 mb-1">客戶分類</label>
                <select class="w-full p-2.5 bg-slate-50 border border-slate-300 rounded-lg text-sm text-slate-700 focus:outline-none focus:border-blue-500">
                    <option value="一般客戶">一般客戶 (住宅)</option>
                    <option value="VIP客戶">VIP 客戶</option>
                    <option value="商業客戶">商業客戶 (餐廳/辦公室)</option>
                    <option value="社區大樓">社區大樓</option>
                </select>
            </div>

            <!-- 備註說明 -->
            <div>
                <label class="block text-xs font-bold text-slate-700 mb-1">重要備註 (如：停車資訊、怕狗等)</label>
                <textarea rows="3" placeholder="例：地下室可免費停車，室內有貓需注意關門..." class="w-full p-2.5 bg-slate-50 border border-slate-300 rounded-lg text-sm focus:outline-none focus:border-blue-500"></textarea>
            </div>

            <!-- 儲存按鈕 -->
            <button type="button" onclick="alert('客戶資料已成功預覽儲存！')" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg text-sm transition-colors shadow-md mt-2">
                💾 儲存客戶資料
            </button>

        </form>
    </main>

</body>
</html>
