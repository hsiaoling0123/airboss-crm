<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>行銷中心 - AirBoss CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=MOPLUS+Rounded+1c:wght@500;700;800;900&family=Noto+Sans+TC:wght@500;700;900&display=swap" rel="stylesheet">
    <style> 
        body { 
            font-family: 'MOPLUS Rounded 1c', 'Noto Sans TC', sans-serif; 
            letter-spacing: 0.02em;
        } 
    </style>
</head>
<body class="bg-[#FFFDF9] min-h-screen text-slate-700 pb-16">

    <header class="bg-gradient-to-r from-sky-400 to-indigo-300 text-white p-4 shadow-sm sticky top-0 z-50 flex justify-between items-center rounded-b-2xl">
        <a href="index.html" class="text-xs bg-white/20 hover:bg-white/30 px-3 py-1.5 rounded-full font-bold transition-all">
            ‹ 首頁
        </a>
        <h1 class="text-base font-black">📢 每日行銷中心 🌸</h1>
        <div class="w-10"></div>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-4">

        <div class="bg-white p-4 rounded-3xl shadow-sm border border-amber-100 space-y-3">
            <div class="flex justify-between items-center">
                <h2 class="font-black text-xs text-slate-800 flex items-center gap-1.5">
                    <span>📈</span> 行銷執行度追蹤
                </h2>
                <span id="statRangeLabel" class="text-[10px] bg-sky-100 text-sky-700 px-2.5 py-0.5 rounded-full font-bold">今日統計</span>
            </div>

            <div class="flex bg-slate-100 p-1 rounded-2xl text-[11px] font-bold text-slate-500">
                <button onclick="setRange('today')" id="range-today" class="flex-1 py-1.5 rounded-xl bg-white text-sky-600 shadow-sm transition-all">每日</button>
                <button onclick="setRange('week')" id="range-week" class="flex-1 py-1.5 rounded-xl transition-all">每週</button>
                <button onclick="setRange('month')" id="range-month" class="flex-1 py-1.5 rounded-xl transition-all">每月</button>
            </div>

            <div class="grid grid-cols-2 gap-2 text-center pt-1">
                <div class="bg-amber-50/50 p-3 rounded-2xl border border-amber-100/50">
                    <p class="text-[10px] text-slate-400 font-bold">已完成行銷任務</p>
                    <p id="completedTasksCount" class="text-base font-black text-amber-600 mt-0.5">0 / 7</p>
                </div>
                <div class="bg-sky-50/50 p-3 rounded-2xl border border-sky-100/50">
                    <p class="text-[10px] text-slate-400 font-bold">總達成率</p>
                    <p id="completionRate" class="text-base font-black text-sky-600 mt-0.5">0%</p>
                </div>
            </div>
        </div>

        <div class="bg-white p-4 rounded-3xl shadow-sm border border-amber-100 space-y-3">
            <div class="flex justify-between items-center border-b border-slate-50 pb-2">
                <h3 class="font-black text-xs text-slate-800 flex items-center gap-1.5">
                    <span>⏰</span> 每天提醒：今日行銷打勾清單
                </h3>
                <span id="todayDateStr" class="text-[10px] font-bold text-slate-400"></span>
            </div>

            <p class="text-[10px] text-slate-400 font-bold">每天花 10 分鐘完成以下曝光，讓客戶源源不絕！完成請打勾：</p>

            <div id="marketingChecklist" class="space-y-2 text-xs font-bold">
                </div>
        </div>

    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCfy9ARrE9wp-bCrABsFVb-qM8_sp9_wqs",
            authDomain: "airboss-4f084.firebaseapp.com",
            projectId: "airboss-4f084",
            storageBucket: "airboss-4f084.firebasestorage.app",
            messagingSenderId: "1067344741307",
            appId: "1:1067344741307:web:15a54741a5bdb26e897a9e",
            measurementId: "G-P9ZGJH366L"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 社群與行銷平台清單
        const platforms = [
            { id: 'ig', name: '📸 IG (Instagram) 動態 / 限動發佈', color: 'text-pink-600 bg-pink-50 border-pink-100' },
            { id: 'fb', name: '藍色 FB 粉專 / 社團貼文更新', color: 'text-blue-600 bg-blue-50 border-blue-100' },
            { id: 'line', name: '💬 LINE 官方帳號群發 / 貼文串', color: 'text-emerald-600 bg-emerald-50 border-emerald-100' },
            { id: 'threads', name: '🧵 Threads 串文討論與互動', color: 'text-slate-800 bg-slate-100 border-slate-200' },
            { id: 'google', name: '⭐ Google 商家評論回覆與更新', color: 'text-amber-600 bg-amber-50 border-amber-100' },
            { id: 'reels', name: '🎥 短影片 (Reels / TikTok / Shorts)', color: 'text-purple-600 bg-purple-50 border-purple-100' },
            { id: 'crm', name: '💌 舊客保養關懷與訊息發送', color: 'text-sky-600 bg-sky-50 border-sky-100' }
        ];

        const today = new Date().toISOString().split('T')[0];
        document.getElementById('todayDateStr').innerText = `📅 ${today}`;

        let currentRange = 'today';
        let marketingData = {};

        // 即時同步雲端的行銷紀錄
        onSnapshot(doc(db, "marketing_logs", "daily_records"), (snapshot) => {
            if (snapshot.exists()) {
                marketingData = snapshot.data();
            } else {
                marketingData = {};
            }
            renderChecklist();
            calculateStats();
        });

        // 渲染打勾清單
        function renderChecklist() {
            const listEl = document.getElementById('marketingChecklist');
            const todayRecord = marketingData[today] || {};

            listEl.innerHTML = platforms.map(p => {
                const isChecked = !!todayRecord[p.id];
                return `
                    <label class="flex items-center justify-between p-3 rounded-2xl border transition-all cursor-pointer ${p.color} ${isChecked ? 'opacity-50 line-through' : ''}">
                        <div class="flex items-center gap-2.5">
                            <input type="checkbox" onchange="toggleTask('${p.id}')" ${isChecked ? 'checked' : ''} class="w-4 h-4 rounded-md border-slate-300 text-sky-500 focus:ring-sky-400">
                            <span>${p.name}</span>
                        </div>
                        <span class="text-[10px] font-bold px-2 py-0.5 rounded-full ${isChecked ? 'bg-emerald-500 text-white' : 'bg-white/80 text-slate-400'}">
                            ${isChecked ? '✓ 已完成' : '待執行'}
                        </span>
                    </label>
                `;
            }).join('');
        }

        // 切換勾選狀態並儲存到 Firebase
        window.toggleTask = async function(platformId) {
            if (!marketingData[today]) {
                marketingData[today] = {};
            }
            marketingData[today][platformId] = !marketingData[today][platformId];

            await setDoc(doc(db, "marketing_logs", "daily_records"), marketingData, { merge: true });
        };

        // 計算每日 / 每週 / 每月完成度
        function calculateStats() {
            const now = new Date();
            let targetDates = [today];

            if (currentRange === 'week') {
                targetDates = [];
                for (let i = 0; i < 7; i++) {
                    const d = new Date(now.getTime() - i * 24 * 60 * 60 * 1000);
                    targetDates.push(d.toISOString().split('T')[0]);
                }
            } else if (currentRange === 'month') {
                targetDates = [];
                for (let i = 0; i < 30; i++) {
                    const d = new Date(now.getTime() - i * 24 * 60 * 60 * 1000);
                    targetDates.push(d.toISOString().split('T')[0]);
                }
            }

            let totalPossibleTasks = targetDates.length * platforms.length;
            let totalCompletedTasks = 0;

            targetDates.forEach(dateStr => {
                const record = marketingData[dateStr] || {};
                platforms.forEach(p => {
                    if (record[p.id]) totalCompletedTasks++;
                });
            });

            const rate = totalPossibleTasks > 0 ? Math.round((totalCompletedTasks / totalPossibleTasks) * 100) : 0;

            document.getElementById('completedTasksCount').innerText = `${totalCompletedTasks} / ${totalPossibleTasks}`;
            document.getElementById('completionRate').innerText = `${rate}%`;
        }

        // 時間範圍切換
        window.setRange = function(range) {
            currentRange = range;
            ['today', 'week', 'month'].forEach(r => {
                document.getElementById(`range-${r}`).className = 'flex-1 py-1.5 rounded-xl transition-all text-slate-500';
            });
            document.getElementById(`range-${range}`).className = 'flex-1 py-1.5 rounded-xl bg-white text-sky-600 shadow-sm font-bold';

            const labels = { 'today': '今日統計', 'week': '近 7 天統計', 'month': '近 30 天統計' };
            document.getElementById('statRangeLabel').innerText = labels[range];

            calculateStats();
        };
    </script>
</body>
</html>
