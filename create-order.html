<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>開立工單 - AirBoss CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen text-slate-800">

    <!-- 頂部導覽列 -->
    <header class="bg-blue-600 text-white p-4 shadow-lg sticky top-0 z-50 flex items-center justify-between">
        <a href="index.html" class="text-sm bg-blue-700 px-3 py-1.5 rounded-lg flex items-center gap-1 font-medium">
            ‹ 返回首頁
        </a>
        <h1 class="text-lg font-bold">新增服務工單</h1>
        <div class="w-16"></div>
    </header>

    <!-- 主要表單內容 -->
    <main class="max-w-md mx-auto p-4">
        <form id="orderForm" class="bg-white p-5 rounded-xl shadow-sm border border-slate-200 space-y-4">
            
            <!-- 選擇客戶 -->
            <div>
                <label class="block text-xs font-bold text-slate-700 mb-1">選擇客戶 *</label>
                <select id="customerSelect" required class="w-full p-2.5 bg-slate-50 border border-slate-300 rounded-lg text-sm text-slate-700 focus:outline-none focus:border-blue-500">
                    <option value="">載入客戶名單中...</option>
                </select>
            </div>

            <!-- 服務項目 -->
            <div>
                <label class="block text-xs font-bold text-slate-700 mb-1">服務項目 *</label>
                <select id="serviceType" required class="w-full p-2.5 bg-slate-50 border border-slate-300 rounded-lg text-sm text-slate-700 focus:outline-none focus:border-blue-500">
                    <option value="分離式冷氣清洗">分離式冷氣清洗</option>
                    <option value="吊隱式冷氣清洗">吊隱式冷氣清洗</option>
                    <option value="冷氣維修檢測">冷氣維修檢測</option>
                    <option value="新機安裝">新機安裝</option>
                    <option value="冷媒充填">冷媒充填</option>
                </select>
            </div>

            <!-- 日期與時間 (並排) -->
            <div class="grid grid-cols-2 gap-2">
                <div>
                    <label class="block text-xs font-bold text-slate-700 mb-1">預約日期 *</label>
                    <input type="date" id="orderDate" required class="w-full p-2.5 bg-slate-50 border border-slate-300 rounded-lg text-sm focus:outline-none focus:border-blue-500">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-700 mb-1">預約時間</label>
                    <input type="time" id="orderTime" value="09:00" class="w-full p-2.5 bg-slate-50 border border-slate-300 rounded-lg text-sm focus:outline-none focus:border-blue-500">
                </div>
            </div>

            <!-- 預估金額 -->
            <div>
                <label class="block text-xs font-bold text-slate-700 mb-1">預估金額 (NT$)</label>
                <input type="number" id="price" placeholder="例：2500" class="w-full p-2.5 bg-slate-50 border border-slate-300 rounded-lg text-sm focus:outline-none focus:border-blue-500">
            </div>

            <!-- 工單備註 -->
            <div>
                <label class="block text-xs font-bold text-slate-700 mb-1">工單備註 / 現場狀況</label>
                <textarea id="orderNote" rows="3" placeholder="例：客廳 1 台滴水、二樓加洗一台" class="w-full p-2.5 bg-slate-50 border border-slate-300 rounded-lg text-sm focus:outline-none focus:border-blue-500"></textarea>
            </div>

            <!-- 提交按鈕 -->
            <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 rounded-lg text-sm transition-colors shadow-md mt-2 flex justify-center items-center gap-1">
                📝 建立工單
            </button>

        </form>
    </main>

    <!-- JavaScript 邏輯 -->
    <script>
        document.getElementById('orderDate').valueAsDate = new Date();

        function loadCustomerOptions() {
            const selectEl = document.getElementById('customerSelect');
            const customers = JSON.parse(localStorage.getItem('airboss_customers')) || [];

            if (customers.length === 0) {
                selectEl.innerHTML = '<option value="">(無客戶資料，請先新增客戶)</option>';
                return;
            }

            selectEl.innerHTML = '<option value="">-- 請選擇客戶 --</option>' + 
                customers.map(c => `<option value="${c.name}">${c.name} (${c.phone})</option>`).join('');
        }

        document.getElementById('orderForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const customerName = document.getElementById('customerSelect').value;
            if (!customerName) {
                alert('請先選擇客戶喔！');
                return;
            }

            const newOrder = {
                id: Date.now(),
                customerName: customerName,
                serviceType: document.getElementById('serviceType').value,
                date: document.getElementById('orderDate').value,
                time: document.getElementById('orderTime').value || '全天',
                price: document.getElementById('price').value || '0',
                note: document.getElementById('orderNote').value || '',
                status: '待處理'
            };

            let orders = JSON.parse(localStorage.getItem('airboss_orders')) || [];
            orders.unshift(newOrder);
            localStorage.setItem('airboss_orders', JSON.stringify(orders));

            alert('🎉 工單建立成功！');
            window.location.href = 'kanban.html'; // 建立完成跳轉到派工看板
        });

        document.addEventListener('DOMContentLoaded', loadCustomerOptions);
    </script>

</body>
</html>
