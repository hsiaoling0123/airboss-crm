<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>派工行程看板 - AirBoss CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=MOPLUS+Rounded+1c:wght@500;700;800;900&family=Noto+Sans+TC:wght@500;700;900&display=swap" rel="stylesheet">
    <style> 
        body { font-family: 'MOPLUS Rounded 1c', 'Noto Sans TC', sans-serif; } 
        .locked-card { cursor: not-allowed !important; }
        .sortable-drag {
            opacity: 0.9;
            transform: scale(1.03);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.2);
        }
        .no-drag { touch-action: manipulation; }
    </style>
</head>
<body class="bg-[#FFFDF9] min-h-screen text-slate-700 pb-16">

    <!-- 頂部標頭 -->
    <header class="bg-gradient-to-r from-sky-400 to-indigo-300 text-white p-4 shadow-sm sticky top-0 z-40 flex justify-between items-center rounded-b-2xl">
        <div class="flex items-center gap-2">
            <a href="index.html" class="text-xl font-bold bg-white/20 p-1.5 rounded-xl">⬅️</a>
            <div>
                <h1 class="text-base font-black">📅 派工行程看板 (CRM 即時同步)</h1>
                <p class="text-[10px] opacity-90 font-bold">點卡片開單結案、長按 0.3 秒可拖曳改期</p>
            </div>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-4">

        <!-- 1. 💰 營業額統計面板 -->
        <div class="bg-white p-4 rounded-3xl border border-amber-100 shadow-sm space-y-2">
            <div class="flex justify-between items-center border-b border-slate-100 pb-2">
                <span class="text-xs font-black text-slate-800">💵 派工營業額統計</span>
                <span class="text-[10px] bg-emerald-100 text-emerald-700 px-2 py-0.5 rounded-full font-bold">即時聯動</span>
            </div>
            <div class="grid grid-cols-3 gap-2 text-center pt-1">
                <div class="p-2 bg-slate-50 rounded-2xl">
                    <p class="text-[10px] text-slate-400 font-bold">今日預估</p>
                    <p id="statToday" class="text-sm font-black text-sky-600">$0</p>
                </div>
                <div class="p-2 bg-slate-50 rounded-2xl">
                    <p class="text-[10px] text-slate-400 font-bold">本週累積</p>
                    <p id="statWeek" class="text-sm font-black text-indigo-600">$0</p>
                </div>
                <div class="p-2 bg-slate-50 rounded-2xl">
                    <p class="text-[10px] text-slate-400 font-bold">本月實收</p>
                    <p id="statMonth" class="text-sm font-black text-emerald-600">$0</p>
                </div>
            </div>
        </div>

        <!-- 2. 📆 三大視角切換頁籤 -->
        <div class="flex bg-slate-100 p-1 rounded-2xl text-xs font-black">
            <button onclick="switchPeriod('day')" id="btnPeriodDay" class="flex-1 py-2 rounded-xl bg-white text-sky-600 shadow-sm transition-all">📅 每日視角</button>
            <button onclick="switchPeriod('week')" id="btnPeriodWeek" class="flex-1 py-2 rounded-xl text-slate-500 hover:text-slate-800 transition-all">🗓️ 每週總覽</button>
            <button onclick="switchPeriod('month')" id="btnPeriodMonth" class="flex-1 py-2 rounded-xl text-slate-500 hover:text-slate-800 transition-all">📊 每月月曆</button>
        </div>

        <!-- 3. 🗺️ 派工地圖導航區塊 (可折疊) -->
        <div class="bg-white rounded-3xl border border-amber-100 shadow-sm overflow-hidden">
            <button onclick="toggleMap()" class="w-full p-3 bg-sky-50 flex justify-between items-center text-xs font-black text-sky-700">
                <span>🗺️ 點擊展開/收合客戶地點地圖導航</span>
                <span id="mapIcon">▼</span>
            </button>
            <div id="mapContainer" class="hidden p-3 space-y-2 border-t border-sky-100">
                <div class="w-full h-44 rounded-2xl overflow-hidden border border-slate-200">
                    <iframe id="kanbanMap" width="100%" height="100%" style="border:0;" loading="lazy" src="https://maps.google.com/maps?q=台北市&t=&z=13&ie=UTF8&iwloc=&output=embed"></iframe>
                </div>
                <button onclick="openDirectNav()" class="w-full bg-sky-400 text-white font-black py-2 rounded-xl text-xs shadow-sm hover:bg-sky-500">
                    🚀 一鍵開啟 Google 地圖 App 語音導航
                </button>
            </div>
        </div>

        <!-- ==================== 檢視內容區 1：每日視角 ==================== -->
        <div id="viewDay" class="space-y-4">
            <!-- 今天 -->
            <div class="bg-sky-50/60 p-3 rounded-3xl border border-sky-100">
                <div class="flex justify-between items-center mb-2 px-1">
                    <span class="font-black text-xs text-sky-800 flex items-center gap-1">📌 今日行程 (<span id="countToday">0</span>)</span>
                    <span class="text-[10px] text-sky-600 font-bold">👆 長按卡片可拖曳改期</span>
                </div>
                <div id="colToday" class="space-y-2.5 min-h-[90px]"></div>
            </div>

            <!-- 明天 -->
            <div class="bg-indigo-50/60 p-3 rounded-3xl border border-indigo-100">
                <div class="flex justify-between items-center mb-2 px-1">
                    <span class="font-black text-xs text-indigo-800 flex items-center gap-1">🗓️ 明天行程 (<span id="countTomorrow">0</span>)</span>
                </div>
                <div id="colTomorrow" class="space-y-2.5 min-h-[90px]"></div>
            </div>

            <!-- 本週其他預約 / 未來行程 -->
            <div class="bg-amber-50/60 p-3 rounded-3xl border border-amber-100">
                <div class="flex justify-between items-center mb-2 px-1">
                    <span class="font-black text-xs text-amber-800 flex items-center gap-1">📅 本週其他預約 (<span id="countFuture">0</span>)</span>
                </div>
                <div id="colFuture" class="space-y-2.5 min-h-[80px]"></div>
            </div>
        </div>

        <!-- ==================== 檢視內容區 2：每週總覽 ==================== -->
        <div id="viewWeek" class="hidden space-y-3">
            <div class="bg-white p-4 rounded-3xl border border-amber-100 shadow-sm space-y-3">
                <div class="flex justify-between items-center border-b pb-2">
                    <h3 class="font-black text-xs text-slate-800">🗓️ 本週派工總覽 (長按可跨日拖曳)</h3>
                </div>
                
                <div class="bg-slate-50 p-2.5 rounded-2xl space-y-1.5">
                    <p class="text-xs font-black text-slate-700">週一</p>
                    <div id="weekMon" class="space-y-1.5 min-h-[40px]"></div>
                </div>
                <div class="bg-slate-50 p-2.5 rounded-2xl space-y-1.5">
                    <p class="text-xs font-black text-slate-700">週二</p>
                    <div id="weekTue" class="space-y-1.5 min-h-[40px]"></div>
                </div>
                <div class="bg-sky-50/70 p-2.5 rounded-2xl border border-sky-100 space-y-1.5">
                    <p class="text-xs font-black text-sky-800">週三 (今天)</p>
                    <div id="weekWed" class="space-y-1.5 min-h-[40px]"></div>
                </div>
                <div class="bg-slate-50 p-2.5 rounded-2xl space-y-1.5">
                    <p class="text-xs font-black text-slate-700">週四 (明天)</p>
                    <div id="weekThu" class="space-y-1.5 min-h-[40px]"></div>
                </div>
                <div class="bg-slate-50 p-2.5 rounded-2xl space-y-1.5">
                    <p class="text-xs font-black text-slate-700">週五 / 其他</p>
                    <div id="weekFri" class="space-y-1.5 min-h-[40px]"></div>
                </div>
            </div>
        </div>

        <!-- ==================== 檢視內容區 3：每月月曆 ==================== -->
        <div id="viewMonth" class="hidden space-y-3">
            <div class="bg-white p-4 rounded-3xl border border-amber-100 shadow-sm space-y-3">
                <div class="flex justify-between items-center border-b pb-2">
                    <h3 class="font-black text-xs text-slate-800">📊 2026 年 7 月份完整日曆</h3>
                    <span id="monthTotalBadge" class="text-[10px] bg-indigo-100 text-indigo-700 font-bold px-2 py-0.5 rounded-full">動態同步</span>
                </div>

                <div class="grid grid-cols-7 text-center font-black text-[10px] text-slate-400 py-1 border-b">
                    <span class="text-red-400">日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span class="text-sky-500">六</span>
                </div>

                <div id="monthGrid" class="grid grid-cols-7 gap-1 text-center text-xs font-bold pt-1">
                    <!-- 動態渲染 7 月日曆格 -->
                </div>
            </div>
        </div>

    </main>

    <!-- 📋 派工單詳細與完工填寫 Modal -->
    <div id="orderDetailModal" class="fixed inset-0 bg-slate-900/50 opacity-0 pointer-events-none transition-opacity duration-300 z-50 flex items-center justify-center p-4 overflow-y-auto">
        <div class="bg-white w-full max-w-sm rounded-3xl p-5 space-y-4 shadow-2xl my-auto">
            
            <div class="flex justify-between items-center border-b pb-2">
                <div>
                    <span class="text-[10px] bg-sky-100 text-sky-700 px-2 py-0.5 rounded-full font-bold">📋 現場派工維修單</span>
                    <h3 class="font-black text-base text-slate-800 mt-1" id="detailCustName">客戶姓名</h3>
                </div>
                <button onclick="closeOrderDetailModal()" class="text-slate-400 font-black text-lg p-1">✕</button>
            </div>

            <div class="space-y-2 text-xs text-slate-600 bg-slate-50 p-3 rounded-2xl">
                <p>📞 <strong>電話：</strong><a id="detailPhoneCall" href="#" class="text-sky-600 font-bold underline"></a></p>
                <p>📍 <strong>施工地址：</strong><span id="detailAddress" class="font-bold text-slate-800"></span></p>
                <p>❄️ <strong>派工主旨：</strong><span id="detailDevice" class="font-bold text-indigo-700"></span></p>
            </div>

            <hr class="border-slate-100">

            <div class="space-y-3">
                <h4 class="font-black text-xs text-slate-800 flex items-center gap-1">
                    <span>🔧</span> 師傅現場完工紀錄與報銷
                </h4>
                <div>
                    <label class="block text-[11px] font-bold text-slate-500 mb-1">施工與更換零件備註</label>
                    <textarea id="workNotes" rows="2" placeholder="例：已完成清洗保養..." class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl text-xs font-bold text-slate-700 focus:bg-white focus:outline-sky-400"></textarea>
                </div>
                <div>
                    <label class="block text-[11px] font-bold text-slate-500 mb-1">現場實收金額 ($)</label>
                    <input type="number" id="detailFinalPrice" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm font-black text-emerald-600 focus:bg-white focus:outline-sky-400">
                </div>
            </div>

            <div class="space-y-2 pt-1">
                <button onclick="submitJobCompletion()" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-black py-3 rounded-2xl text-xs shadow-md transition-all flex items-center justify-center gap-1.5">
                    <span>✅</span> 確認完工、結案並同步回 CRM 客戶履歷
                </button>
                <button onclick="closeOrderDetailModal()" class="w-full bg-slate-100 text-slate-600 font-bold py-2.5 rounded-2xl text-xs">
                    返回行程看板
                </button>
            </div>

        </div>
    </div>

    <script>
        let currentNavAddress = "台北市";
        let currentActivePhone = null;
        let currentActiveLogId = null;

        // 初始化所有看板渲染與拖曳功能
        window.addEventListener('DOMContentLoaded', () => {
            renderAllKanbanViews();
            initSortableBoards();
        });

        // 綁定 SortableJS 長按拖曳功能
        function initSortableBoards() {
            const dragConfig = {
                animation: 150,
                delay: 300,
                delayOnTouchOnly: true,
                touchStartThreshold: 5,
                filter: '.is-completed',
                ghostClass: 'opacity-40',
                dragClass: 'sortable-drag',
                onEnd: function () {
                    updateCounts();
                }
            };

            // 每日視角欄位
            ['colToday', 'colTomorrow', 'colFuture'].forEach(id => {
                const el = document.getElementById(id);
                if (el) new Sortable(el, { ...dragConfig, group: 'kanban_days' });
            });

            // 每週視角欄位
            ['weekMon', 'weekTue', 'weekWed', 'weekThu', 'weekFri'].forEach(id => {
                const el = document.getElementById(id);
                if (el) new Sortable(el, { ...dragConfig, group: 'kanban_weeks' });
            });
        }

        // 從 CRM 讀取資料並全面渲染三種視角與總金額
        function renderAllKanbanViews() {
            const customers = JSON.parse(localStorage.getItem('airboss_customers')) || [];
            
            const colToday = document.getElementById('colToday');
            const colTomorrow = document.getElementById('colTomorrow');
            const colFuture = document.getElementById('colFuture');

            const weekMon = document.getElementById('weekMon');
            const weekTue = document.getElementById('weekTue');
            const weekWed = document.getElementById('weekWed');
            const weekThu = document.getElementById('weekThu');
            const weekFri = document.getElementById('weekFri');

            colToday.innerHTML = '';
            colTomorrow.innerHTML = '';
            colFuture.innerHTML = '';
            weekMon.innerHTML = '';
            weekTue.innerHTML = '';
            weekWed.innerHTML = '';
            weekThu.innerHTML = '';
            weekFri.innerHTML = '';

            let todayCount = 0, tomorrowCount = 0, futureCount = 0;
            let todayRevenue = 0, weekRevenue = 0, monthRevenue = 0;
            let dateCardCounts = {}; // 用於每月月曆小標籤

            const todayStr = new Date().toISOString().split('T')[0]; // 例如 2026-07-23

            customers.forEach(cust => {
                if (cust.logs && cust.logs.length > 0) {
                    cust.logs.forEach(log => {
                        const isCompleted = log.desc && log.desc.includes('[已完工結案]');
                        
                        // 計算金額
                        let priceVal = 3500;
                        const matchPrice = log.title.match(/\$(\d+)/);
                        if (matchPrice) priceVal = parseInt(matchPrice[1]);
                        const matchDescPrice = log.desc && log.desc.match(/實收 \$(\d+)/);
                        if (matchDescPrice) priceVal = parseInt(matchDescPrice[1]);

                        if (isCompleted) monthRevenue += priceVal;

                        // 統計月曆日期件數
                        const logDate = log.date || todayStr;
                        dateCardCounts[logDate] = (dateCardCounts[logDate] || 0) + 1;

                        // 建立卡片 HTML
                        const cardHtml = `
                            <div onclick="clickOpenModal('${cust.name}', '${cust.phone}', '${cust.address}', '${log.title}', '${log.id}', this)" 
                                 class="kanban-card bg-white p-3.5 rounded-2xl border ${isCompleted ? 'is-completed locked-card bg-emerald-50/80 border-emerald-200' : 'border-sky-100'} shadow-sm space-y-2 select-none cursor-pointer hover:border-sky-300 transition-all">
                                <div class="flex justify-between items-start">
                                    <div>
                                        <span class="text-[10px] ${isCompleted ? 'bg-emerald-100 text-emerald-800' : 'bg-sky-100 text-sky-800'} font-bold px-2 py-0.5 rounded-full">${log.date}</span>
                                        <h3 class="font-black text-xs text-slate-800 inline-block ml-1">${cust.name} ${isCompleted ? '🔒' : '📄'}</h3>
                                    </div>
                                    <span class="text-xs font-black ${isCompleted ? 'text-emerald-600' : 'text-sky-600'}">$${priceVal}</span>
                                </div>
                                <p class="text-[11px] text-slate-500 font-bold">📍 ${cust.address}</p>
                                <p class="text-[11px] text-slate-500">❄️ ${log.title}</p>
                                <div class="flex gap-1.5 pt-1">
                                    <div onclick="event.stopPropagation(); loadMap('${cust.name}', '${cust.address}')" class="no-drag flex-1 bg-sky-50 active:bg-sky-100 text-sky-600 font-bold py-2 rounded-xl text-[10px] text-center cursor-pointer">
                                        🗺️ 導航
                                    </div>
                                    <div class="no-drag flex-1 ${isCompleted ? 'bg-emerald-100 text-emerald-800' : 'bg-emerald-500 text-white'} font-black py-2 rounded-xl text-[10px] text-center shadow-sm">
                                        ${isCompleted ? '已結案' : '✅ 完工結案'}
                                    </div>
                                </div>
                            </div>
                        `;

                        // 依日期派發至每日視角
                        if (log.date === '2026-07-22' || log.date === todayStr) {
                            colToday.innerHTML += cardHtml;
                            todayCount++;
                            todayRevenue += priceVal;
                            weekRevenue += priceVal;
                            weekWed.innerHTML += cardHtml;
                        } else if (log.date === '2026-07-23' || log.date > todayStr) {
                            colTomorrow.innerHTML += cardHtml;
                            tomorrowCount++;
                            weekRevenue += priceVal;
                            weekThu.innerHTML += cardHtml;
                        } else {
                            colFuture.innerHTML += cardHtml;
                            futureCount++;
                            weekRevenue += priceVal;
                            weekMon.innerHTML += cardHtml;
                        }
                    });
                }
            });

            // 更新統計數字
            document.getElementById('countToday').innerText = todayCount;
            document.getElementById('countTomorrow').innerText = tomorrowCount;
            document.getElementById('countFuture').innerText = futureCount;

            document.getElementById('statToday').innerText = '$' + todayRevenue.toLocaleString();
            document.getElementById('statWeek').innerText = '$' + weekRevenue.toLocaleString();
            document.getElementById('statMonth').innerText = '$' + monthRevenue.toLocaleString();

            // 渲染每月月曆網格
            renderMonthCalendarGrid(dateCardCounts);
        }

        // 動態渲染 2026 年 7 月月曆
        function renderMonthCalendarGrid(counts) {
            const grid = document.getElementById('monthGrid');
            grid.innerHTML = '';

            // 7月前空白日 (2026年7月1日是星期三)
            for (let i = 0; i < 3; i++) {
                grid.innerHTML += `<div class="p-2 opacity-20 text-slate-300">--</div>`;
            }

            for (let day = 1; day <= 31; day++) {
                const dayStr = `2026-07-${day < 10 ? '0' + day : day}`;
                const hasEvent = counts[dayStr] > 0;
                const isToday = day === 22; // 假設今天為7/22或依實際

                let bgClass = "hover:bg-slate-50";
                let textClass = "text-slate-700";

                if (isToday) {
                    bgClass = "bg-amber-400 text-white font-black shadow-md";
                    textClass = "text-white";
                } else if (hasEvent) {
                    bgClass = "bg-sky-50 text-sky-700 font-bold";
                }

                grid.innerHTML += `
                    <div class="p-1.5 rounded-xl ${bgClass} ${textClass} transition-all">
                        ${day}
                        ${hasEvent ? `<span class="block text-[8px] text-sky-600 font-bold">${counts[dayStr]}件</span>` : ''}
                    </div>
                `;
            }
        }

        function updateCounts() {
            document.getElementById('countToday').innerText = document.getElementById('colToday').children.length;
            document.getElementById('countTomorrow').innerText = document.getElementById('colTomorrow').children.length;
            document.getElementById('countFuture').innerText = document.getElementById('colFuture').children.length;
        }

        function clickOpenModal(name, phone, address, device, logId, targetElement) {
            if (targetElement.classList.contains('is-completed')) return;

            currentActivePhone = phone;
            currentActiveLogId = logId;

            document.getElementById('detailCustName').innerText = name + " 先生/小姐";
            document.getElementById('detailPhoneCall').innerText = phone;
            document.getElementById('detailPhoneCall').href = "tel:" + phone;
            document.getElementById('detailAddress').innerText = address;
            document.getElementById('detailDevice').innerText = device || '標準分離式冷氣';
            document.getElementById('workNotes').value = "";
            document.getElementById('detailFinalPrice').value = "3500";

            document.getElementById('orderDetailModal').classList.remove('opacity-0', 'pointer-events-none');
        }

        function closeOrderDetailModal() {
            document.getElementById('orderDetailModal').classList.add('opacity-0', 'pointer-events-none');
        }

        // 完工結案並回寫 CRM
        function submitJobCompletion() {
            const price = document.getElementById('detailFinalPrice').value;
            const notes = document.getElementById('workNotes').value;

            let customers = JSON.parse(localStorage.getItem('airboss_customers')) || [];
            let targetCust = customers.find(c => c.phone === currentActivePhone);

            if (targetCust && targetCust.logs) {
                let targetLog = targetCust.logs.find(l => l.id === currentActiveLogId);
                if (targetLog) {
                    targetLog.desc = `[已完工結案] 實收 $${price}。備註：${notes || '無'}`;
                }
                localStorage.setItem('airboss_customers', JSON.stringify(customers));
            }

            alert('✅ 完工結案成功！資料已同步回寫至 CRM 客戶歷程！');
            closeOrderDetailModal();
            renderAllKanbanViews();
        }

        // 視角切換
        function switchPeriod(period) {
            document.getElementById('btnPeriodDay').className = period === 'day' ? "flex-1 py-2 rounded-xl bg-white text-sky-600 shadow-sm transition-all" : "flex-1 py-2 rounded-xl text-slate-500 hover:text-slate-800 transition-all";
            document.getElementById('btnPeriodWeek').className = period === 'week' ? "flex-1 py-2 rounded-xl bg-white text-sky-600 shadow-sm transition-all" : "flex-1 py-2 rounded-xl text-slate-500 hover:text-slate-800 transition-all";
            document.getElementById('btnPeriodMonth').className = period === 'month' ? "flex-1 py-2 rounded-xl bg-white text-sky-600 shadow-sm transition-all" : "flex-1 py-2 rounded-xl text-slate-500 hover:text-slate-800 transition-all";

            document.getElementById('viewDay').classList.toggle('hidden', period !== 'day');
            document.getElementById('viewWeek').classList.toggle('hidden', period !== 'week');
            document.getElementById('viewMonth').classList.toggle('hidden', period !== 'month');
        }

        function toggleMap() {
            const container = document.getElementById('mapContainer');
            const icon = document.getElementById('mapIcon');
            container.classList.toggle('hidden');
            icon.innerText = container.classList.contains('hidden') ? '▼' : '▲';
        }

        function loadMap(name, address) {
            currentNavAddress = address;
            document.getElementById('mapContainer').classList.remove('hidden');
            document.getElementById('mapIcon').innerText = '▲';
            document.getElementById('kanbanMap').src = `https://maps.google.com/maps?q=${encodeURIComponent(address)}&t=&z=15&ie=UTF8&iwloc=&output=embed`;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function openDirectNav() {
            window.open(`https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(currentNavAddress)}`, '_blank');
        }
    </script>
</body>
</html>
