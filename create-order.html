<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新增派工單 - AirBoss CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=MOPLUS+Rounded+1c:wght@500;700;800;900&family=Noto+Sans+TC:wght@500;700;900&display=swap" rel="stylesheet">
    <style> 
        body { font-family: 'MOPLUS Rounded 1c', 'Noto Sans TC', sans-serif; letter-spacing: 0.02em; } 
    </style>
</head>
<body class="bg-[#FFFDF9] min-h-screen text-slate-700 pb-16">

    <header class="bg-gradient-to-r from-sky-400 to-indigo-300 text-white p-4 shadow-sm sticky top-0 z-50 flex justify-between items-center rounded-b-2xl">
        <a href="index.html" class="text-xs bg-white/20 hover:bg-white/30 px-3 py-1.5 rounded-full font-bold transition-all">‹ 首頁</a>
        <h1 class="text-base font-black">✍️ 新增派工單與報價 🌸</h1>
        <div class="w-10"></div>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-4">
        <form id="orderForm" class="bg-white p-5 rounded-3xl shadow-sm border border-amber-100 space-y-3">
            <div>
                <label class="block text-[11px] font-bold text-slate-400 mb-1">客戶姓名</label>
                <input type="text" id="customerName" required placeholder="例：王小明" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl text-xs focus:outline-none focus:border-sky-400">
            </div>

            <div class="grid grid-cols-2 gap-2">
                <div>
                    <label class="block text-[11px] font-bold text-slate-400 mb-1">電話</label>
                    <input type="tel" id="phone" placeholder="0912345678" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl text-xs focus:outline-none focus:border-sky-400">
                </div>
                <div>
                    <label class="block text-[11px] font-bold text-slate-400 mb-1">預約時間</label>
                    <input type="time" id="time" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl text-xs focus:outline-none focus:border-sky-400">
                </div>
            </div>

            <div>
                <label class="block text-[11px] font-bold text-slate-400 mb-1">預約日期</label>
                <input type="date" id="date" required class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl text-xs focus:outline-none focus:border-sky-400">
            </div>

            <div>
                <label class="block text-[11px] font-bold text-slate-400 mb-1">地址</label>
                <input type="text" id="address" placeholder="新北市蘆洲區..." class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl text-xs focus:outline-none focus:border-sky-400">
            </div>

            <div class="grid grid-cols-2 gap-2">
                <div>
                    <label class="block text-[11px] font-bold text-slate-400 mb-1">服務項目</label>
                    <select id="serviceType" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl text-xs focus:outline-none focus:border-sky-400">
                        <option value="分離式冷氣清洗">分離式冷氣清洗</option>
                        <option value="窗型冷氣清洗">窗型冷氣清洗</option>
                        <option value="吊隱式冷氣保養">吊隱式冷氣保養</option>
                        <option value="冷氣維修 / 補冷媒">冷氣維修 / 補冷媒</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[11px] font-bold text-slate-400 mb-1">預估金額 (NT$)</label>
                    <input type="number" id="price" placeholder="2500" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl text-xs focus:outline-none focus:border-sky-400">
                </div>
            </div>

            <div>
                <label class="block text-[11px] font-bold text-slate-400 mb-1">報價項目說明 / 備註</label>
                <textarea id="notes" rows="2" placeholder="例：室內機高壓清洗 + 室外機保養" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl text-xs focus:outline-none focus:border-sky-400"></textarea>
            </div>

            <button type="submit" class="w-full bg-gradient-to-r from-sky-400 to-indigo-300 text-white font-black py-3 rounded-2xl text-xs shadow-sm hover:opacity-90 transition-all">
                ✨ 儲存並建立派工單 (進入看板)
            </button>
        </form>

        <!-- LINE 訊息發送區 (派工通知 & 報價單) -->
        <div class="bg-white p-4 rounded-3xl shadow-sm border border-amber-100 space-y-2">
            <p class="text-[11px] font-bold text-slate-400">📲 一鍵發送 LINE 訊息</p>
            <div class="grid grid-cols-2 gap-2">
                <button onclick="sendLineNotice()" class="bg-sky-50 text-sky-700 font-bold py-2 rounded-xl text-xs hover:bg-sky-100 transition-all">
                    🚗 發送到府預約通知
                </button>
                <button onclick="sendLineQuote()" class="bg-amber-50 text-amber-800 font-bold py-2 rounded-xl text-xs hover:bg-amber-100 transition-all">
                    📄 發送估價報價單
                </button>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCfy9ARrE9wp-bCrABsFVb-qM8_sp9_wqs",
            authDomain: "airboss-4f084.firebaseapp.com",
            projectId: "airboss-4f084",
            storageBucket: "airboss-4f084.firebasestorage.app",
            messagingSenderId: "1067344741307",
            appId: "1:1067344741307:web:15a54741a5bdb26e897a9e",
            measurementId: "G-P9ZGJH366L"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        document.getElementById('orderForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const orderData = {
                customerName: document.getElementById('customerName').value,
                phone: document.getElementById('phone').value,
                date: document.getElementById('date').value,
                time: document.getElementById('time').value,
                address: document.getElementById('address').value,
                serviceType: document.getElementById('serviceType').value,
                price: Number(document.getElementById('price').value || 0),
                notes: document.getElementById('notes').value,
                status: '待處理',
                createdAt: new Date().toISOString()
            };

            await addDoc(collection(db, "orders"), orderData);
            alert('✨ 派工單已成功儲存！即將前往派工看板');
            window.location.href = 'kanban.html';
        });

        window.sendLineNotice = function() {
            const name = document.getElementById('customerName').value || '客戶';
            const date = document.getElementById('date').value || '';
            const time = document.getElementById('time').value || '';
            const service = document.getElementById('serviceType').value || '';

            const msg = `🌸 AirBoss 冷氣服務預約通知 🌸\n------------------\n${name} 先生/小姐您好：\n為您確認預約服務資訊如下：\n\n🗓️ 時間：${date} ${time}\n🛠️ 項目：${service}\n\n我們的技師將準時前往，如有異動請提前通知，謝謝您！🐻❄️`;
            window.open(`https://line.me/R/msg/text/?${encodeURIComponent(msg)}`, '_blank');
        };

        window.sendLineQuote = function() {
            const name = document.getElementById('customerName').value || '客戶';
            const service = document.getElementById('serviceType').value || '';
            const price = document.getElementById('price').value || '0';
            const notes = document.getElementById('notes').value || '無';

            const msg = `📄 AirBoss 冷氣保養/維修服務報價單 📄\n------------------\n${name} 先生/小姐您好：\n為您提供預估保養費用如下：\n\n🛠️ 服務項目：${service}\n📝 項目細節：${notes}\n💰 預估金額：NT$ ${Number(price).toLocaleString()} 元\n\n如有任何問題，歡迎隨時回覆訊息與我們討論！🌸`;
            window.open(`https://line.me/R/msg/text/?${encodeURIComponent(msg)}`, '_blank');
        };
    </script>
</body>
</html>
