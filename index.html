<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AirBoss CRM - 冷氣保養管理系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen text-slate-800 pb-10">

    <!-- 頂部導覽列 -->
    <header class="bg-blue-600 text-white p-4 shadow-lg sticky top-0 z-50 flex justify-between items-center">
        <div>
            <h1 class="text-xl font-black tracking-wide">AirBoss CRM</h1>
            <p class="text-xs text-blue-200">冷氣工程保養管理系統</p>
        </div>
        <a href="add-customer.html" class="bg-blue-500 hover:bg-blue-400 text-white px-3 py-1.5 rounded-lg text-xs font-bold transition-all shadow">
            + 快速新增
        </a>
    </header>

    <!-- 主要內容區塊 -->
    <main class="max-w-md mx-auto p-4 space-y-5">

        <!-- 數據統計卡片區 -->
        <section class="grid grid-cols-3 gap-2">
            <div class="bg-white p-3 rounded-xl shadow-sm border border-slate-200 text-center">
                <p class="text-xs text-slate-500 font-medium">總客戶數</p>
                <p id="statCustomerCount" class="text-lg font-bold text-blue-600 mt-1">0</p>
            </div>
            <div class="bg-white p-3 rounded-xl shadow-sm border border-slate-200 text-center">
                <p class="text-xs text-slate-500 font-medium">待處理工單</p>
                <p id="statOrderCount" class="text-lg font-bold text-amber-500 mt-1">0</p>
            </div>
            <div class="bg-white p-3 rounded-xl shadow-sm border border-slate-200 text-center">
                <p class="text-xs text-slate-500 font-medium">預估營收</p>
                <p id="statTotalRevenue" class="text-sm font-bold text-emerald-600 mt-1">$0</p>
            </div>
        </section>

        <!-- 快捷功能按鈕區 -->
        <section class="grid grid-cols-2 gap-3">
            <a href="create-order.html" class="bg-gradient-to-r from-emerald-500 to-teal-600 text-white p-4 rounded-xl shadow-md flex items-center justify-between hover:opacity-95 transition-all">
                <div>
                    <p class="font-bold text-base">開立保養工單</p>
                    <p class="text-xs text-emerald-100 mt-0.5">新增預約與派工</p>
                </div>
                <span class="text-2xl">📝</span>
            </a>
            <a href="customers.html" class="bg-gradient-to-r from-blue-500 to-indigo-600 text-white p-4 rounded-xl shadow-md flex items-center justify-between hover:opacity-95 transition-all">
                <div>
                    <p class="font-bold text-base">客戶管理目錄</p>
                    <p class="text-xs text-blue-100 mt-0.5">檢視與搜尋客戶</p>
                </div>
                <span class="text-2xl">👥</span>
            </a>
        </section>

        <!-- 近期工單列表區 -->
        <section class="space-y-3">
            <div class="flex justify-between items-center">
                <h2 class="font-bold text-slate-800 text-base">最新工單動態</h2>
                <span class="text-xs text-slate-400">自動更新</span>
            </div>

            <div id="dashboardOrderList" class="space-y-3">
                <!-- 動態繪製工單列表 -->
            </div>
        </section>

    </main>

    <!-- 自動讀取 LocalStorage 資料並顯示統計 -->
    <script>
        function loadDashboardData() {
            const customers = JSON.parse(localStorage.getItem('airboss_customers')) || [];
            const orders = JSON.parse(localStorage.getItem('airboss_orders')) || [];

            // 1. 更新統計數字
            document.getElementById('statCustomerCount').textContent = customers.length;
            document.getElementById('statOrderCount').textContent = orders.length;

            const totalRevenue = orders.reduce((sum, order) => sum + (Number(order.price) || 0), 0);
            document.getElementById('statTotalRevenue').textContent = '$' + totalRevenue.toLocaleString();

            // 2. 渲染近期工單列表
            const orderContainer = document.getElementById('dashboardOrderList');

            if (orders.length === 0) {
                orderContainer.innerHTML = `
                    <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 text-center">
                        <p class="text-slate-400 text-xs font-medium mb-2">目前沒有未完成的工單</p>
                        <a href="create-order.html" class="inline-block bg-emerald-600 text-white text-xs px-3 py-1.5 rounded-lg font-bold">
                            + 開立第一筆工單
                        </a>
                    </div>
                `;
                return;
            }

            orderContainer.innerHTML = orders.map(order => `
                <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200 space-y-2">
                    <div class="flex justify-between items-start">
                        <div>
                            <div class="flex items-center gap-2">
                                <h3 class="font-bold text-slate-900 text-base">${order.customerName}</h3>
                                <span class="bg-amber-100 text-amber-700 text-xs px-2 py-0.5 rounded font-medium">${order.status || '待處理'}</span>
                            </div>
                            <p class="text-xs text-blue-600 font-bold mt-1">🔧 ${order.serviceType}</p>
                        </div>
                        <span class="text-emerald-600 font-bold text-base">NT$ ${Number(order.price).toLocaleString()}</span>
                    </div>

                    <div class="pt-2 border-t border-slate-100 flex justify-between items-center text-xs text-slate-500">
                        <span>📅 預約日期：${order.date}</span>
                        <span class="text-slate-400 truncate max-w-[140px]">${order.note ? order.note : '無備註'}</span>
                    </div>
                </div>
            `).join('');
        }

        // 頁面載入時執行
        document.addEventListener('DOMContentLoaded', loadDashboardData);
    </script>

</body>
</html>
