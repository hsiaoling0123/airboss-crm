<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AirBoss CRM - 冷氣保養管理系統</title>
    <!-- 載入漂亮的 UI 樣式庫 (Tailwind CSS) -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen text-slate-800">

    <!-- 頂部導覽列 -->
    <header class="bg-blue-600 text-white p-4 shadow-lg sticky top-0 z-50">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold flex items-center gap-2">
                ❄️ AirBoss CRM
            </h1>
            <span class="text-xs bg-blue-700 px-2 py-1 rounded">外勤版</span>
        </div>
    </header>

    <!-- 主要內容區 -->
    <main class="max-w-md mx-auto p-4 space-y-4">
        
        <!-- 今日概況卡片 -->
        <div class="grid grid-cols-2 gap-3">
            <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200 text-center">
                <p class="text-xs text-slate-500 font-medium">今日預約行程</p>
                <p class="text-2xl font-black text-blue-600 mt-1">3 件</p>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200 text-center">
                <p class="text-xs text-slate-500 font-medium">本月保養提醒</p>
                <p class="text-2xl font-black text-orange-500 mt-1">12 件</p>
            </div>
        </div>

        <!-- 快捷功能按鈕區 -->
        <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
            <h2 class="text-sm font-bold text-slate-700 mb-3">快速操作</h2>
            <div class="grid grid-cols-2 gap-2">
                <a href="add-customer.html" class="bg-blue-50 text-blue-700 py-3 rounded-lg text-sm font-bold shadow-sm flex items-center justify-center gap-1 hover:bg-blue-100 transition-colors">
    ➕ 新增客戶資料
</a>

                <button class="bg-emerald-50 hover:bg-emerald-100 text-emerald-600 font-bold py-3 rounded-lg text-sm text-center">
                    📋 開立保養工單
                </button>
            </div>
        </div>

        <!-- 今日派工清單 -->
        <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
            <h2 class="text-sm font-bold text-slate-700 mb-3">今日派工行程 (範例)</h2>
            <div class="space-y-3">
                
                <!-- 行程 1 -->
                <div class="p-3 bg-slate-50 rounded-lg border-l-4 border-blue-500">
                    <div class="flex justify-between items-start">
                        <span class="font-bold text-sm">陳先生 (分離式保養)</span>
                        <span class="text-xs bg-blue-100 text-blue-700 px-2 py-0.5 rounded">09:00</span>
                    </div>
                    <p class="text-xs text-slate-500 mt-1">📍 新北市板橋區文化路一段...</p>
                    <p class="text-xs text-slate-400 mt-0.5">備註：客廳 1 台 / 有開車位</p>
                </div>

                <!-- 行程 2 -->
                <div class="p-3 bg-slate-50 rounded-lg border-l-4 border-amber-500">
                    <div class="flex justify-between items-start">
                        <span class="font-bold text-sm">林小姐 (冷氣不冷檢修)</span>
                        <span class="text-xs bg-amber-100 text-amber-700 px-2 py-0.5 rounded">14:00</span>
                    </div>
                    <p class="text-xs text-slate-500 mt-1">📍 台北市大安區信義路四段...</p>
                    <p class="text-xs text-slate-400 mt-0.5">備註：主臥室漏水檢查</p>
                </div>

            </div>
        </div>

    </main>

</body>
</html>
