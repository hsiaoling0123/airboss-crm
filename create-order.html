<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>開立工單 - AirBoss CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen text-slate-800">

    <!-- 頂部導覽列 -->
    <header class="bg-blue-600 text-white p-4 shadow-lg sticky top-0 z-50 flex items-center justify-between">
        <a href="index.html" class="text-sm bg-blue-700 px-3 py-1.5 rounded-lg flex items-center gap-1 font-medium">
            ‹ 返回首頁
        </a>
        <h1 class="text-lg font-bold">開立保養維修工單</h1>
        <div class="w-16"></div>
    </header>

    <!-- 主要內容 -->
    <main class="max-w-md mx-auto p-4">
        <form class="bg-white p-5 rounded-xl shadow-sm border border-slate-200 space-y-4">
            
            <!-- 選擇客戶 -->
            <div>
                <label class="block text-xs font-bold text-slate-700 mb-1">選擇客戶 *</label>
                <select class="w-full p-2.5 bg-slate-50 border border-slate-300 rounded-lg text-sm text-slate-700 focus:outline-none focus:border-blue-500">
                    <option value="">-- 請選擇客戶 --</option>
                    <option value="1">陳先生 (新北市板橋區文化路)</option>
                    <option value="2">林小姐 (台北市大安區信義路)</option>
                    <option value="3">鼎泰豐板橋店 (新北市板橋區新站路)</option>
                </select>
            </div>

            <!-- 工單類別 -->
            <div>
                <label class="block text-xs font-bold text-slate-700 mb-1">服務項目 *</label>
                <div class="grid grid-cols-2 gap-2 text-sm">
                    <label class="flex items-center p-2.5 border rounded-lg bg-slate-50 cursor-pointer">
                        <input type="checkbox" name="service" value="分離式清洗" class="rounded text-blue-600 mr-2" checked>
                        分離式清洗
                    </label>
                    <label class="flex items-center p-2.5 border rounded-lg bg-slate-50 cursor-pointer">
                        <input type="checkbox" name="service" value="吊隱式清洗" class="rounded text-blue-600 mr-2">
                        吊隱式清洗
                    </label>
                    <label class="flex items-center p-2.5 border rounded-lg bg-slate-50 cursor-pointer">
                        <input type="checkbox" name="service" value="冷媒充填" class="rounded text-blue-600 mr-2">
                        冷媒充填
                    </label>
                    <label class="flex items-center p-2.5 border rounded-lg bg-slate-50 cursor-pointer">
                        <input type="checkbox" name="service" value="故障檢修" class="rounded text-blue-600 mr-2">
                        故障檢修
                    </label>
                </div>
            </div>

            <!-- 設備台數與金額 -->
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-xs font-bold text-slate-700 mb-1">施工台數</label>
                    <input type="number" value="1" min="1" class="w-full p-2.5 bg-slate-50 border border-slate-300 rounded-lg text-sm focus:outline-none focus:border-blue-500">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-700 mb-1">本次實收金額 ($)</label>
                    <input type="number" placeholder="2500" class="w-full p-2.5 bg-slate-50 border border-slate-300 rounded-lg text-sm focus:outline-none focus:border-blue-500">
                </div>
            </div>

            <!-- 下次預計保養提醒 -->
            <div>
                <label class="block text-xs font-bold text-slate-700 mb-1">下次保養提醒週期</label>
                <select class="w-full p-2.5 bg-slate-50 border border-slate-300 rounded-lg text-sm text-slate-700 focus:outline-none focus:border-blue-500">
                    <option value="12">1 年後（標準家用週期）</option>
                    <option value="6">6 個月後（營業場所/高頻率）</option>
                    <option value="24">2 年後</option>
                    <option value="0">不需要提醒</option>
                </select>
            </div>

            <!-- 施工現場紀錄/備註 -->
            <div>
                <label class="block text-xs font-bold text-slate-700 mb-1">現場施工紀錄/故障說明</label>
                <textarea rows="3" placeholder="例：已更換排水管、風輪清洗完畢，測量出風口溫度 8 度正常。" class="w-full p-2.5 bg-slate-50 border border-slate-300 rounded-lg text-sm focus:outline-none focus:border-blue-500"></textarea>
            </div>

            <!-- 按鈕組 -->
            <button type="button" onclick="alert('保養工單已順利開立並完成派工儲存！')" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 rounded-lg text-sm transition-colors shadow-md mt-2 flex justify-center items-center gap-1">
                📋 送出並開立工單
            </button>

        </form>
    </main>

</body>
</html>
