<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>快速報價單系統 - AirBoss CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=MOPLUS+Rounded+1c:wght@500;700;800;900&family=Noto+Sans+TC:wght@500;700;900&display=swap" rel="stylesheet">
    <style> 
        body { 
            font-family: 'MOPLUS Rounded 1c', 'Noto Sans TC', sans-serif; 
            letter-spacing: 0.02em;
        } 
    </style>
</head>
<body class="bg-[#FFFDF9] min-h-screen text-slate-700 pb-12">

    <!-- 頂部導覽列 -->
    <header class="bg-gradient-to-r from-sky-400 to-indigo-300 text-white p-4 shadow-sm sticky top-0 z-50 flex justify-between items-center rounded-b-2xl">
        <a href="index.html" class="text-xs bg-white/20 hover:bg-white/30 px-3 py-1.5 rounded-full font-bold transition-all">
            ‹ 首頁
        </a>
        <h1 class="text-base font-black">📄 快速報價單系統 🌸</h1>
        <div class="w-10"></div>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-4">

        <!-- 報價單輸入表單 -->
        <div class="bg-white p-4.5 rounded-3xl shadow-sm border border-amber-100 space-y-4">
            <h2 class="font-black text-slate-800 text-xs border-b border-amber-50 pb-2 flex items-center gap-1.5">
                <span class="text-sky-500">✏️</span> 填寫報價內容
            </h2>

            <div class="space-y-2.5">
                <div>
                    <label class="block text-[11px] font-bold text-slate-500 mb-1">客戶姓名 *</label>
                    <input type="text" id="custName" placeholder="例：王先生" class="w-full p-2.5 bg-amber-50/30 border border-amber-100 rounded-xl text-xs focus:outline-none focus:border-sky-400">
                </div>

                <div>
                    <label class="block text-[11px] font-bold text-slate-500 mb-1">客戶 LINE / 電話 (選填)</label>
                    <input type="text" id="custPhone" placeholder="0912345678" class="w-full p-2.5 bg-amber-50/30 border border-amber-100 rounded-xl text-xs focus:outline-none focus:border-sky-400">
                </div>
            </div>

            <!-- 報價細項列表 -->
            <div class="space-y-2.5">
                <div class="flex justify-between items-center">
                    <label class="block text-[11px] font-bold text-slate-500">服務施作項目與金額 *</label>
                    <button type="button" onclick="addItemRow()" class="text-[11px] text-sky-600 font-bold hover:underline">
                        + 新增項目
                    </button>
                </div>

                <div id="itemsContainer" class="space-y-2">
                    <!-- 動態細項放置區 -->
                </div>
            </div>

            <!-- 總價試算卡片 -->
            <div class="bg-gradient-to-r from-sky-50 to-indigo-50 p-3.5 rounded-2xl border border-sky-100/80 flex justify-between items-center">
                <span class="text-xs font-bold text-sky-900">預估總金額：</span>
                <span id="totalAmountText" class="text-lg font-black text-emerald-600">NT$ 0</span>
            </div>

            <div class="grid grid-cols-2 gap-2 pt-1">
                <button type="button" onclick="downloadPDF()" class="bg-gradient-to-r from-sky-400 to-indigo-400 hover:opacity-90 text-white font-black py-3 rounded-2xl text-xs shadow-sm transition-all flex items-center justify-center gap-1">
                    <span>📄 生成 PDF 報價單</span>
                </button>
                <button type="button" onclick="sendToLine()" class="bg-gradient-to-r from-emerald-400 to-teal-400 hover:opacity-90 text-white font-black py-3 rounded-2xl text-xs shadow-sm transition-all flex items-center justify-center gap-1">
                    <span>💬 一鍵 LINE 給客戶</span>
                </button>
            </div>
        </div>

        <!-- 🌸 PDF 預覽與列印版面 (隱藏或預覽用) -->
        <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-200 space-y-4" id="quotePaper">
            <div class="border-b-2 border-sky-300 pb-3 flex justify-between items-end">
                <div>
                    <h1 class="text-lg font-black text-sky-900">❄️ AirBoss 專業冷氣服務</h1>
                    <p class="text-[10px] text-slate-400 font-bold">服務專線：0912-345-678 | 估價單 / 報價單</p>
                </div>
                <div class="text-right">
                    <p class="text-[10px] text-slate-400 font-bold" id="quoteDate">日期：2026-07-22</p>
                </div>
            </div>

            <div class="text-xs space-y-1">
                <p class="font-bold text-slate-800">寶號 / 客戶名稱：<span id="paperName" class="text-sky-600 font-black">王先生</span> 台照</p>
            </div>

            <table class="w-full text-xs text-left border-collapse">
                <thead>
                    <tr class="bg-sky-50 text-sky-900 border-b border-sky-200">
                        <th class="p-2 font-bold">項目 / 服務內容</th>
                        <th class="p-2 font-bold text-right">小計 (NT$)</th>
                    </tr>
                </thead>
                <tbody id="paperItems">
                    <!-- 動態渲染到 PDF 版面 -->
                </tbody>
            </table>

            <div class="border-t border-slate-200 pt-3 flex justify-between items-center">
                <span class="text-xs font-bold text-slate-500">備註：保固期內免費維修檢測，感謝您的支持！</span>
                <div class="text-right">
                    <span class="text-xs font-bold text-slate-600">報價總計：</span>
                    <span id="paperTotal" class="text-base font-black text-emerald-600">NT$ 0</span>
                </div>
            </div>
        </div>

    </main>

    <script>
        let itemIndex = 0;

        function addItemRow(name = '', price = '') {
            itemIndex++;
            const container = document.getElementById('itemsContainer');
            const rowHtml = `
                <div id="row-${itemIndex}" class="flex items-center gap-2">
                    <input type="text" placeholder="品項 (例: 洗兩台冷氣)" value="${name}" oninput="calculateTotal()" class="item-name flex-1 p-2 bg-amber-50/20 border border-amber-100 rounded-xl text-xs focus:outline-none focus:border-sky-400">
                    <input type="number" placeholder="金額" value="${price}" oninput="calculateTotal()" class="item-price w-24 p-2 bg-amber-50/20 border border-amber-100 rounded-xl text-xs focus:outline-none focus:border-sky-400">
                    <button type="button" onclick="removeRow(${itemIndex})" class="text-rose-500 font-bold text-xs px-1">✕</button>
                </div>
            `;
            container.insertAdjacentHTML('beforeend', rowHtml);
            calculateTotal();
        }

        function removeRow(idx) {
            const row = document.getElementById(`row-${idx}`);
            if (row) row.remove();
            calculateTotal();
        }

        function calculateTotal() {
            let total = 0;
            const itemRows = document.querySelectorAll('#itemsContainer > div');
            const paperBody = document.getElementById('paperItems');
            paperBody.innerHTML = '';

            itemRows.forEach(row => {
                const name = row.querySelector('.item-name').value || '未命名項目';
                const price = Number(row.querySelector('.item-price').value || 0);
                total += price;

                paperBody.innerHTML += `
                    <tr class="border-b border-slate-100">
                        <td class="p-2 font-bold text-slate-700">${name}</td>
                        <td class="p-2 font-black text-slate-800 text-right">NT$ ${price.toLocaleString()}</td>
                    </tr>
                `;
            });

            document.getElementById('totalAmountText').textContent = `NT$ ${total.toLocaleString()}`;
            document.getElementById('paperTotal').textContent = `NT$ ${total.toLocaleString()}`;
            document.getElementById('paperName').textContent = document.getElementById('custName').value || '貴客戶';
        }

        // 下載 PDF 檔案
        function downloadPDF() {
            calculateTotal();
            const element = document.getElementById('quotePaper');
            const name = document.getElementById('custName').value || '客戶';
            
            const opt = {
                margin:       10,
                filename:     `AirBoss冷氣服務報價單_${name}.pdf`,
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2 },
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            html2pdf().set(opt).from(element).save();
        }

        // 一鍵整理文字訊息傳送到 LINE
        function sendToLine() {
            calculateTotal();
            const name = document.getElementById('custName').value || '客戶';
            let total = 0;
            let textMsg = `🌸 AirBoss 冷氣服務報價單 🌸\n------------------\n👤 客戶：${name} 台照\n\n項 目 明 細：\n`;

            const itemRows = document.querySelectorAll('#itemsContainer > div');
            itemRows.forEach((row, i) => {
                const item = row.querySelector('.item-name').value || '備註服務';
                const price = Number(row.querySelector('.item-price').value || 0);
                total += price;
                textMsg += `${i + 1}. ${item}：NT$ ${price.toLocaleString()}\n`;
            });

            textMsg += `------------------\n💰 報價總計：NT$ ${total.toLocaleString()}\n\n如有任何問題，歡迎隨時回覆訊息！😊`;

            // 開啟 LINE 文字分享
            const lineUrl = `https://line.me/R/msg/text/?${encodeURIComponent(textMsg)}`;
            window.open(lineUrl, '_blank');
        }

        // 預設預載兩個範例項目
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('quoteDate').textContent = `日期：${new Date().toISOString().split('T')[0]}`;
            addItemRow('洗兩台冷氣', 4200);
            addItemRow('加冷媒', 1500);
        });
    </script>
</body>
</html>
