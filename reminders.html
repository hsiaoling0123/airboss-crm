<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>定期保養回訪提醒 - AirBoss CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=MOPLUS+Rounded+1c:wght@500;700;800;900&family=Noto+Sans+TC:wght@500;700;900&display=swap" rel="stylesheet">
    <style> 
        body { 
            font-family: 'MOPLUS Rounded 1c', 'Noto Sans TC', sans-serif; 
            letter-spacing: 0.02em;
        } 
    </style>
</head>
<body class="bg-[#FFFDF9] min-h-screen text-slate-700 pb-16">

    <header class="bg-gradient-to-r from-sky-400 to-indigo-300 text-white p-4 shadow-sm sticky top-0 z-50 flex justify-between items-center rounded-b-2xl">
        <a href="index.html" class="text-xs bg-white/20 hover:bg-white/30 px-3 py-1.5 rounded-full font-bold transition-all">
            ‹ 首頁
        </a>
        <h1 class="text-base font-black">🗓️ 定期保養回訪提醒 🌸</h1>
        <div class="w-10"></div>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-4">

        <div class="bg-gradient-to-br from-amber-50 to-orange-50 p-4 rounded-3xl border border-amber-100 flex items-center gap-3">
            <div class="text-3xl">❄️</div>
            <div>
                <h2 class="font-black text-xs text-amber-900">智慧 CRM 舊客關懷</h2>
                <p class="text-[10px] text-amber-700 font-bold mt-0.5">系統會自動列出距離上次洗冷氣已超過 10 個月的客戶，方便你一鍵發送 LINE 保養提醒！</p>
            </div>
        </div>

        <div class="space-y-3">
            <p class="text-xs font-bold text-slate-400 px-2 flex items-center gap-1">
                <span>🔔</span> 建議回訪與關懷名單
            </p>
            <div id="reminderList" class="space-y-3">
                <div class="text-center py-10 text-xs text-slate-400">
                    ☁️ 正在分析歷史保養紀錄...
                </div>
            </div>
        </div>

    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCfy9ARrE9wp-bCrABsFVb-qM8_sp9_wqs",
            authDomain: "airboss-4f084.firebaseapp.com",
            projectId: "airboss-4f084",
            storageBucket: "airboss-4f084.firebasestorage.app",
            messagingSenderId: "1067344741307",
            appId: "1:1067344741307:web:15a54741a5bdb26e897a9e",
            measurementId: "G-P9ZGJH366L"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 即時監聽工單紀錄
        onSnapshot(collection(db, "orders"), (snapshot) => {
            const orders = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            analyzeReminders(orders);
        });

        function analyzeReminders(orders) {
            const listEl = document.getElementById('reminderList');
            const now = new Date();

            // 整理出每個客戶最新的完工日期
            const customerLastDates = {};

            orders.forEach(order => {
                if (order.customerName && order.date) {
                    const orderDate = new Date(order.date);
                    if (!customerLastDates[order.customerName] || orderDate > customerLastDates[order.customerName].date) {
                        customerLastDates[order.customerName] = {
                            name: order.customerName,
                            phone: order.phone || '',
                            address: order.address || '',
                            service: order.serviceType || '冷氣保養',
                            date: orderDate,
                            dateStr: order.date
                        };
                    }
                }
            });

            // 篩選出距離上次超過 10 個月 (約 300 天) 的客戶
            const needReminderList = Object.values(customerLastDates).filter(c => {
                const diffTime = Math.abs(now - c.date);
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                return diffDays >= 300; // 300 天以上
            });

            if (needReminderList.length === 0) {
                listEl.innerHTML = `
                    <div class="bg-white p-8 rounded-3xl text-center text-xs text-slate-400 space-y-1">
                        <div class="text-2xl">🎉</div>
                        <div>目前沒有需要回訪的舊客戶！</div>
                        <div class="text-[10px] text-slate-300">所有客戶近期都有進行過保養喔！</div>
                    </div>`;
                return;
            }

            listEl.innerHTML = needReminderList.map(c => {
                const diffMonths = Math.floor((now - c.date) / (1000 * 60 * 60 * 24 * 30));
                return `
                    <div class="bg-white p-4 rounded-3xl shadow-sm border border-amber-100 space-y-2">
                        <div class="flex justify-between items-center border-b border-slate-50 pb-2">
                            <span class="font-black text-sm text-slate-800">👤 ${c.name}</span>
                            <span class="text-[10px] bg-rose-100 text-rose-800 font-bold px-2 py-0.5 rounded-full">
                                已過 ${diffMonths} 個月未保養
                            </span>
                        </div>

                        <div class="text-xs text-slate-600 space-y-1">
                            <p>🗓️ <strong>上次保養：</strong>${c.dateStr}</p>
                            <p>🛠️ <strong>上次項目：</strong>${c.service}</p>
                            <p>📍 <strong>地址：</strong>${c.address || '未填寫'}</p>
                        </div>

                        <div class="pt-2 border-t border-slate-50">
                            <button onclick="sendRecallLine('${c.name}', '${c.dateStr}')" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-2 rounded-xl text-xs shadow-sm transition-all flex items-center justify-center gap-1">
                                💬 發送 LINE 舊客優惠關懷訊息
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        window.sendRecallLine = function(name, lastDate) {
            const msg = `🌸 AirBoss 冷氣定期保養關懷 🌸\n------------------\n${name} 先生/小姐您好：\n貼心提醒您，距離上次 ${lastDate} 給冷氣做健康檢查已經過了一年囉！\n\n定期清洗冷氣能【省電 15~20%】並防止黴菌吹出 🍃\n我們目前提供舊客回饋『早鳥保養 9 折優惠』，如需預約保養歡迎隨時回覆訊息給我們喔！🐻❄️`;

            window.open(`https://line.me/R/msg/text/?${encodeURIComponent(msg)}`, '_blank');
        };
    </script>
</body>
</html>
