<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新增客戶 - AirBoss CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&display=swap" rel="stylesheet">
    <style> body { font-family: 'Zen Maru Gothic', sans-serif; } </style>
</head>
<body class="bg-[#FFFDF9] min-h-screen text-slate-700 pb-12">

    <!-- 頂部導覽列 -->
    <header class="bg-gradient-to-r from-sky-400 to-indigo-300 text-white p-4 shadow-sm sticky top-0 z-50 flex justify-between items-center rounded-b-2xl">
        <button type="button" onclick="window.goBack()" class="text-xs bg-white/20 hover:bg-white/30 px-3 py-1.5 rounded-full font-bold transition-all cursor-pointer">
            ‹ 返回
        </button>
        <h1 class="text-base font-black">建立新客戶小檔案 🌸</h1>
        <div class="w-12"></div>
    </header>

    <main class="max-w-xl mx-auto p-4 space-y-5">
        <form id="customerForm" class="space-y-4">

            <!-- 1. 基本聯絡資料 -->
            <div class="bg-white p-4.5 rounded-3xl shadow-sm border border-amber-100 space-y-3">
                <h2 class="font-bold text-slate-800 text-xs border-b border-amber-50 pb-2 flex items-center gap-1.5">
                    <span class="text-sky-400 text-sm">👤</span> 基本聯絡資訊
                </h2>
                <div class="grid grid-cols-2 gap-2.5">
                    <div>
                        <label class="block text-[11px] font-bold text-slate-500 mb-1">姓名 *</label>
                        <input type="text" id="name" required class="w-full p-2.5 bg-amber-50/30 border border-amber-100 rounded-xl text-xs focus:outline-none focus:border-sky-400">
                    </div>
                    <div>
                        <label class="block text-[11px] font-bold text-slate-500 mb-1">電話 (主鍵) *</label>
                        <input type="tel" id="phone" required class="w-full p-2.5 bg-amber-50/30 border border-amber-100 rounded-xl text-xs focus:outline-none focus:border-sky-400">
                    </div>
                    <div>
                        <label class="block text-[11px] font-bold text-slate-500 mb-1">LINE ID</label>
                        <input type="text" id="lineId" class="w-full p-2.5 bg-amber-50/30 border border-amber-100 rounded-xl text-xs focus:outline-none focus:border-sky-400">
                    </div>
                    <div>
                        <label class="block text-[11px] font-bold text-slate-500 mb-1">Email</label>
                        <input type="email" id="email" class="w-full p-2.5 bg-amber-50/30 border border-amber-100 rounded-xl text-xs focus:outline-none focus:border-sky-400">
                    </div>
                </div>
            </div>

            <!-- 2. 地址與現場資訊 -->
            <div class="bg-white p-4.5 rounded-3xl shadow-sm border border-amber-100 space-y-3">
                <h2 class="font-bold text-slate-800 text-xs border-b border-amber-50 pb-2 flex items-center gap-1.5">
                    <span class="text-rose-400 text-sm">📍</span> 地址與現場資訊
                </h2>
                <div class="space-y-2.5">
                    <div>
                        <label class="block text-[11px] font-bold text-slate-500 mb-1">完整地址 *</label>
                        <input type="text" id="address" required placeholder="例：新北市板橋區文化路一段100號" class="w-full p-2.5 bg-amber-50/30 border border-amber-100 rounded-xl text-xs focus:outline-none focus:border-sky-400">
                    </div>
                    <div class="grid grid-cols-2 gap-2.5">
                        <div>
                            <label class="block text-[11px] font-bold text-slate-500 mb-1">停車資訊</label>
                            <input type="text" id="parkingNote" placeholder="例：地下室B2-15號位" class="w-full p-2.5 bg-amber-50/30 border border-amber-100 rounded-xl text-xs focus:outline-none focus:border-sky-400">
                        </div>
                        <div>
                            <label class="block text-[11px] font-bold text-slate-500 mb-1">管理員電話</label>
                            <input type="tel" id="guardPhone" placeholder="例：02-22500000" class="w-full p-2.5 bg-amber-50/30 border border-amber-100 rounded-xl text-xs focus:outline-none focus:border-sky-400">
                        </div>
                    </div>
                </div>
            </div>

            <!-- 3. 冷氣設備區 -->
            <div class="bg-white p-4.5 rounded-3xl shadow-sm border border-amber-100 space-y-3">
                <div class="flex justify-between items-center border-b border-amber-50 pb-2">
                    <h2 class="font-bold text-slate-800 text-xs flex items-center gap-1.5">
                        <span class="text-sky-400 text-sm">❄️</span> 冷氣設備資料
                    </h2>
                    <button type="button" onclick="window.addACRow()" class="text-xs bg-sky-100 text-sky-700 hover:bg-sky-200 font-bold px-3 py-1 rounded-full cursor-pointer">
                        + 新增一台冷氣
                    </button>
                </div>
                <div id="acContainer" class="space-y-3"></div>
            </div>

            <!-- 提交按鈕 -->
            <button type="submit" class="w-full bg-gradient-to-r from-sky-400 to-indigo-400 hover:opacity-90 text-white font-black py-3.5 rounded-2xl text-sm shadow-sm transition-all cursor-pointer">
                ✨ 儲存客戶資料至雲端
            </button>

        </form>
    </main>

    <script type="module">
        import { addCustomerToCloud } from './firebase-config.js';

        let acCount = 0;

        window.goBack = function() {
            window.location.href = document.referrer || 'index.html';
        };

        window.addACRow = function() {
            acCount++;
            const container = document.getElementById('acContainer');
            container.insertAdjacentHTML('beforeend', `
                <div id="ac-card-${acCount}" class="p-3 bg-amber-50/40 border border-amber-100 rounded-2xl space-y-2">
                    <div class="flex justify-between items-center">
                        <span class="font-bold text-xs text-sky-800">冷氣 #${acCount}</span>
                        <button type="button" onclick="document.getElementById('ac-card-${acCount}').remove()" class="text-[10px] text-rose-500 font-bold cursor-pointer">刪除</button>
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <input type="text" placeholder="品牌 (日立/大金)" class="ac-brand p-2 text-xs border border-amber-100 rounded-xl bg-white focus:outline-none">
                        <input type="text" placeholder="型號 (RAS-28YB)" class="ac-model p-2 text-xs border border-amber-100 rounded-xl bg-white focus:outline-none">
                        <input type="text" placeholder="匹數 (2.8kW)" class="ac-power p-2 text-xs border border-amber-100 rounded-xl bg-white focus:outline-none">
                        <input type="text" placeholder="冷媒 (R32)" class="ac-gas p-2 text-xs border border-amber-100 rounded-xl bg-white focus:outline-none">
                    </div>
                </div>
            `);
        };

        document.addEventListener('DOMContentLoaded', () => {
            window.addACRow();
        });

        document.getElementById('customerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const name = document.getElementById('name').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const address = document.getElementById('address').value.trim();

            if (!name || !phone || !address) {
                alert('請填寫必要的姓名、電話與地址！');
                return;
            }

            const acList = [];
            document.querySelectorAll('#acContainer > div').forEach(card => {
                acList.push({
                    brand: card.querySelector('.ac-brand').value || '',
                    model: card.querySelector('.ac-model').value || '',
                    power: card.querySelector('.ac-power').value || '',
                    gas: card.querySelector('.ac-gas').value || ''
                });
            });

            const newCustomer = {
                name: name,
                phone: phone,
                lineId: document.getElementById('lineId').value.trim(),
                email: document.getElementById('email').value.trim(),
                address: address,
                parkingNote: document.getElementById('parkingNote').value.trim(),
                guardPhone: document.getElementById('guardPhone').value.trim(),
                acList: acList,
                createdAt: new Date().toISOString()
            };

            try {
                await addCustomerToCloud(newCustomer);
                alert('🎉 新增客戶成功，已同步至雲端 CRM！');
                window.location.href = 'customers.html';
            } catch (error) {
                console.error("寫入雲端失敗：", error);
                alert('❌ 儲存至雲端失敗，請檢查網路連線。');
            }
        });
    </script>
</body>
</html>
