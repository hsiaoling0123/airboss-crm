<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>客戶與派工地圖 - AirBoss CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=MOPLUS+Rounded+1c:wght@500;700;800;900&family=Noto+Sans+TC:wght@500;700;900&display=swap" rel="stylesheet">
    <style> 
        body { 
            font-family: 'MOPLUS Rounded 1c', 'Noto Sans TC', sans-serif; 
            letter-spacing: 0.02em;
        }
        #map { height: 320px; width: 100%; border-radius: 1.5rem; z-index: 10; }
    </style>
</head>
<body class="bg-[#FFFDF9] min-h-screen text-slate-700 pb-12">

    <header class="bg-gradient-to-r from-sky-400 to-indigo-300 text-white p-4 shadow-sm sticky top-0 z-50 flex justify-between items-center rounded-b-2xl">
        <a href="index.html" class="text-xs bg-white/20 hover:bg-white/30 px-3 py-1.5 rounded-full font-bold transition-all">
            ‹ 首頁
        </a>
        <h1 class="text-base font-black">🗺️ 客戶與派工地圖 🌸</h1>
        <div class="w-10"></div>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-4">

        <div class="bg-slate-100 p-1 rounded-2xl flex gap-1">
            <button onclick="switchMapMode('today')" id="btn-today" class="flex-1 py-2 text-xs font-bold rounded-xl transition-all bg-sky-400 text-white shadow-sm">
                📍 今日行程規劃 (${new Date().getMonth()+1}/${new Date().getDate()})
            </button>
            <button onclick="switchMapMode('all')" id="btn-all" class="flex-1 py-2 text-xs font-bold rounded-xl transition-all text-slate-500">
                👥 全部客戶地圖
            </button>
        </div>

        <div class="bg-white p-2 rounded-3xl shadow-sm border border-amber-100 relative">
            <div id="map"></div>
        </div>

        <div id="routeSection" class="bg-white p-4 rounded-3xl shadow-sm border border-amber-100 space-y-3">
            <div class="flex justify-between items-center border-b border-amber-50 pb-2">
                <h2 class="font-bold text-slate-800 text-xs flex items-center gap-1.5">
                    <span class="text-sky-500">🚚</span> 師傅今日最佳派工路線
                </h2>
                <span id="orderCountTag" class="text-[10px] bg-sky-100 text-sky-800 font-bold px-2.5 py-0.5 rounded-full">0 處行程</span>
            </div>

            <div id="todayRouteList" class="space-y-2">
                </div>

            <button onclick="openGoogleMapsNavigation()" class="w-full bg-gradient-to-r from-emerald-400 to-teal-400 hover:opacity-90 text-white font-black py-3 rounded-2xl text-xs shadow-sm transition-all flex items-center justify-center gap-1.5">
                <span>🧭 開啟 Google Maps 開始全天導航</span>
            </button>
        </div>

    </main>

    <script>
        let map;
        let markersLayer = L.layerGroup();
        let currentMode = 'today';

        // 預設地圖中心 (台北地區)
        const DEFAULT_LAT = 25.0330;
        const DEFAULT_LNG = 121.5654;

        function initMap() {
            map = L.map('map').setView([DEFAULT_LAT, DEFAULT_LNG], 12);

            // 載入 OpenStreetMap 免費圖資
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                maxZoom: 19,
                attribution: '© OpenStreetMap'
            }).addTo(map);

            markersLayer.addTo(map);
            renderMap();
        }

        function switchMapMode(mode) {
            currentMode = mode;
            document.getElementById('btn-today').className = mode === 'today' ? "flex-1 py-2 text-xs font-bold rounded-xl transition-all bg-sky-400 text-white shadow-sm" : "flex-1 py-2 text-xs font-bold rounded-xl transition-all text-slate-500";
            document.getElementById('btn-all').className = mode === 'all' ? "flex-1 py-2 text-xs font-bold rounded-xl transition-all bg-sky-400 text-white shadow-sm" : "flex-1 py-2 text-xs font-bold rounded-xl transition-all text-slate-500";
            renderMap();
        }

        function formatDate(d) {
            const year = d.getFullYear();
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const date = String(d.getDate()).padStart(2, '0');
            return `${year}-${month}-${date}`;
        }

        function renderMap() {
            markersLayer.clearLayers();
            const todayStr = formatDate(new Date());

            const customers = JSON.parse(localStorage.getItem('airboss_customers')) || [];
            const orders = JSON.parse(localStorage.getItem('airboss_orders')) || [];

            if (currentMode === 'today') {
                // 抓取今天的工單
                const todayOrders = orders.filter(o => o.date === todayStr);
                document.getElementById('orderCountTag').textContent = `${todayOrders.length} 處行程`;

                const routeListEl = document.getElementById('todayRouteList');
                if (todayOrders.length === 0) {
                    routeListEl.innerHTML = `<div class="text-center text-slate-400 text-xs py-4">今天沒有排定的派工行程喔！☕</div>`;
                    return;
                }

                // 排序時間 (例: 09:00 -> 14:00)
                todayOrders.sort((a,b) => (a.time || '00:00').localeCompare(b.time || '00:00'));

                let bounds = [];
                routeListEl.innerHTML = '';

                todayOrders.forEach((o, index) => {
                    // 尋找對應的客戶地址
                    const cust = customers.find(c => c.name === o.customerName) || {};
                    const address = cust.address || '地址待確認';

                    routeListEl.innerHTML += `
                        <div class="flex items-center gap-3 bg-amber-50/40 p-3 rounded-2xl border border-amber-100">
                            <span class="w-6 h-6 rounded-full bg-sky-400 text-white text-xs font-black flex items-center justify-center flex-shrink-0">
                                ${index + 1}
                            </span>
                            <div class="flex-1 min-w-0">
                                <div class="flex justify-between items-center">
                                    <p class="font-bold text-xs text-slate-800 truncate">${o.customerName}</p>
                                    <span class="text-[10px] bg-amber-100 text-amber-800 px-2 py-0.5 rounded-full font-bold">⏰ ${o.time || '全天'}</span>
                                </div>
                                <p class="text-[11px] text-slate-500 font-medium truncate mt-0.5">📍 ${address}</p>
                            </div>
                        </div>
                    `;

                    // 簡化模擬地圖標記點 (實務上輸入地址可自動定位)
                    const mockLat = DEFAULT_LAT + (Math.sin(index + 1) * 0.03);
                    const mockLng = DEFAULT_LNG + (Math.cos(index + 1) * 0.03);
                    bounds.push([mockLat, mockLng]);

                    const marker = L.marker([mockLat, mockLng]).addTo(markersLayer);
                    marker.bindPopup(`<b>第 ${index + 1} 站：${o.customerName}</b><br>⏰ ${o.time || '全天'}<br>🔧 ${o.serviceType}<br>📍 ${address}`);
                });

                if (bounds.length > 0) map.fitBounds(bounds, { padding: [30, 30] });

            } else {
                // 全部客戶模式
                document.getElementById('orderCountTag').textContent = `共 ${customers.length} 位客戶`;
                document.getElementById('todayRouteList').innerHTML = `<div class="text-center text-slate-400 text-xs py-2">已在地圖上顯示所有客戶位置 📍</div>`;

                let bounds = [];
                customers.forEach((c, index) => {
                    const mockLat = DEFAULT_LAT + (Math.sin(index + 1) * 0.04);
                    const mockLng = DEFAULT_LNG + (Math.cos(index + 1) * 0.04);
                    bounds.push([mockLat, mockLng]);

                    const marker = L.marker([mockLat, mockLng]).addTo(markersLayer);
                    marker.bindPopup(`<b>👤 ${c.name}</b><br>📞 ${c.phone}<br>📍 ${c.address || '無地址'}`);
                });

                if (bounds.length > 0) map.fitBounds(bounds, { padding: [30, 30] });
            }
        }

        // 開啟 Google Maps 進行全天多點導航
        function openGoogleMapsNavigation() {
            const todayStr = formatDate(new Date());
            const orders = JSON.parse(localStorage.getItem('airboss_orders')) || [];
            const customers = JSON.parse(localStorage.getItem('airboss_customers')) || [];

            const todayOrders = orders.filter(o => o.date === todayStr).sort((a,b) => (a.time || '00:00').localeCompare(b.time || '00:00'));

            if (todayOrders.length === 0) {
                alert('今天沒有排定的派工行程喔！');
                return;
            }

            // 組合地址列表
            const addresses = todayOrders.map(o => {
                const cust = customers.find(c => c.name === o.customerName) || {};
                return cust.address || o.customerName;
            });

            // Google Maps 路線網址語法
            const origin = encodeURIComponent(addresses[0]);
            const destination = encodeURIComponent(addresses[addresses.length - 1]);
            const waypoints = addresses.slice(1, -1).map(addr => encodeURIComponent(addr)).join('|');

            let googleMapsUrl = `https://www.google.com/maps/dir/?api=1&origin=${origin}&destination=${destination}`;
            if (waypoints) {
                googleMapsUrl += `&waypoints=${waypoints}`;
            }

            window.open(googleMapsUrl, '_blank');
        }

        document.addEventListener('DOMContentLoaded', initMap);
    </script>
</body>
</html>
