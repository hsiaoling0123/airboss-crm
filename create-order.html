<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新增工單 - AirBoss CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&display=swap" rel="stylesheet">
    <style> body { font-family: 'Zen Maru Gothic', sans-serif; } </style>
</head>
<body class="bg-[#FFFDF9] min-h-screen text-slate-700 pb-12">

    <header class="bg-gradient-to-r from-sky-400 to-indigo-300 text-white p-4 shadow-sm sticky top-0 z-50 flex justify-between items-center rounded-b-2xl">
        <button type="button" onclick="goBack()" class="text-xs bg-white/20 hover:bg-white/30 px-3 py-1.5 rounded-full font-bold transition-all">
            ‹ 返回
        </button>
        <h1 class="text-base font-black">快速建立工單 📝</h1>
        <div class="w-10"></div>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-4">
        <form id="orderForm" class="bg-white p-4.5 rounded-3xl shadow-sm border border-amber-100 space-y-3.5">
            <div>
                <label class="block text-[11px] font-bold text-slate-500 mb-1">客戶姓名 *</label>
                <input type="text" id="customerName" required placeholder="例：陳先生" class="w-full p-2.5 bg-amber-50/30 border border-amber-100 rounded-xl text-xs focus:outline-none focus:border-sky-400">
            </div>

            <div>
                <label class="block text-[11px] font-bold text-slate-500 mb-1">服務項目 *</label>
                <input type="text" id="serviceType" required placeholder="例：分離式冷氣深度清洗 x2" class="w-full p-2.5 bg-amber-50/30 border border-amber-100 rounded-xl text-xs focus:outline-none focus:border-sky-400">
            </div>

            <div class="grid grid-cols-2 gap-2.5">
                <div>
                    <label class="block text-[11px] font-bold text-slate-500 mb-1">預估金額 (NT$) *</label>
                    <input type="number" id="price" required placeholder="3500" class="w-full p-2.5 bg-amber-50/30 border border-amber-100 rounded-xl text-xs focus:outline-none focus:border-sky-400">
                </div>
                <div>
                    <!-- 💡 亮點：新增客源選擇欄位 -->
                    <label class="block text-[11px] font-bold text-slate-500 mb-1">工單客源來源 *</label>
                    <select id="source" required class="w-full p-2.5 bg-amber-50/30 border border-amber-100 rounded-xl text-xs focus:outline-none focus:border-sky-400 font-bold text-sky-800">
                        <option value="Google搜尋">Google搜尋</option>
                        <option value="LINE官方帳號">LINE官方帳號</option>
                        <option value="FB社團/粉專">FB社團/粉專</option>
                        <option value="IG/Threads">IG/Threads</option>
                        <option value="舊客介紹/回訪">舊客介紹/回訪</option>
                        <option value="社區住戶">社區住戶</option>
                        <option value="傳單/廣告">傳單/廣告</option>
                        <option value="其他">其他</option>
                    </select>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-2.5">
                <div>
                    <label class="block text-[11px] font-bold text-slate-500 mb-1">施工日期</label>
                    <input type="date" id="date" class="w-full p-2.5 bg-amber-50/30 border border-amber-100 rounded-xl text-xs focus:outline-none focus:border-sky-400">
                </div>
                <div>
                    <label class="block text-[11px] font-bold text-slate-500 mb-1">預約時間</label>
                    <input type="time" id="time" class="w-full p-2.5 bg-amber-50/30 border border-amber-100 rounded-xl text-xs focus:outline-none focus:border-sky-400">
                </div>
            </div>

            <div>
                <label class="block text-[11px] font-bold text-slate-500 mb-1">備註說明</label>
                <textarea id="note" rows="2" placeholder="特殊指示或施工注意事項..." class="w-full p-2.5 bg-amber-50/30 border border-amber-100 rounded-xl text-xs focus:outline-none focus:border-sky-400"></textarea>
            </div>

            <button type="submit" class="w-full bg-gradient-to-r from-emerald-400 to-teal-400 text-white font-black py-3 rounded-2xl text-xs shadow-sm hover:opacity-90 transition-all">
                ✨ 儲存並建立工單
            </button>
        </form>
    </main>

    <script>
        function goBack() { window.location.href = document.referrer || 'index.html'; }

        document.getElementById('orderForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const newOrder = {
                id: Date.now(),
                customerName: document.getElementById('customerName').value,
                serviceType: document.getElementById('serviceType').value,
                price: Number(document.getElementById('price').value || 0),
                source: document.getElementById('source').value,
                date: document.getElementById('date').value,
                time: document.getElementById('time').value,
                note: document.getElementById('note').value,
                status: document.getElementById('date').value ? '待處理' : '未排程',
                createdAt: new Date().toISOString()
            };

            let orders = JSON.parse(localStorage.getItem('airboss_orders')) || [];
            orders.unshift(newOrder);
            localStorage.setItem('airboss_orders', JSON.stringify(orders));

            alert('🎉 工單建立成功！');
            window.location.href = 'kanban.html';
        });
    </script>
</body>
</html>
