<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>派工行程看板 - AirBoss CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@500;700;900&display=swap" rel="stylesheet">
    <style> body { font-family: 'Noto Sans TC', sans-serif; } </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-700 pb-16">

    <header class="bg-sky-500 text-white p-4 shadow-sm sticky top-0 z-40 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <a href="index.html" class="text-xl font-bold bg-white/20 p-1.5 rounded-xl">⬅️</a>
            <div>
                <h1 class="text-base font-black">📅 派工行程看板 (強制修復版)</h1>
            </div>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-4">

        <div class="flex bg-slate-200 p-1 rounded-2xl text-xs font-black">
            <button onclick="switchView('day')" id="tabDay" class="flex-1 py-2.5 rounded-xl bg-white text-sky-600 shadow-sm transition-all">📅 每日視角</button>
            <button onclick="switchView('week')" id="tabWeek" class="flex-1 py-2.5 rounded-xl text-slate-500 transition-all">🗓️ 每週總覽</button>
            <button onclick="switchView('month')" id="tabMonth" class="flex-1 py-2.5 rounded-xl text-slate-500 transition-all">📊 每月月曆</button>
        </div>

        <div id="contentDay" class="space-y-3 bg-white p-4 rounded-3xl shadow-sm border border-slate-100">
            <h3 class="font-black text-sm text-sky-800">📌 每日視角內容區</h3>
            <p class="text-xs text-slate-500">如果這個畫面會隨著你的點擊切換，代表按鈕已經完全修復！</p>
        </div>

        <div id="contentWeek" class="hidden space-y-3 bg-white p-4 rounded-3xl shadow-sm border border-slate-100">
            <h3 class="font-black text-sm text-indigo-800">🗓️ 每週總覽內容區 (成功切換！)</h3>
            <p class="text-xs text-slate-500">這裡會顯示本週的所有排程總覽。</p>
        </div>

        <div id="contentMonth" class="hidden space-y-3 bg-white p-4 rounded-3xl shadow-sm border border-slate-100">
            <h3 class="font-black text-sm text-emerald-800">📊 每月月曆內容區 (成功切換！)</h3>
            <p class="text-xs text-slate-500">這裡會顯示整個月份的日曆。</p>
        </div>

    </main>

    <script>
        function switchView(type) {
            // 切換按鈕樣式
            document.getElementById('tabDay').className = type === 'day' ? "flex-1 py-2.5 rounded-xl bg-white text-sky-600 shadow-sm transition-all" : "flex-1 py-2.5 rounded-xl text-slate-500 transition-all";
            document.getElementById('tabWeek').className = type === 'week' ? "flex-1 py-2.5 rounded-xl bg-white text-sky-600 shadow-sm transition-all" : "flex-1 py-2.5 rounded-xl text-slate-500 transition-all";
            document.getElementById('tabMonth').className = type === 'month' ? "flex-1 py-2.5 rounded-xl bg-white text-sky-600 shadow-sm transition-all" : "flex-1 py-2.5 rounded-xl text-slate-500 transition-all";

            // 切換內容顯示
            document.getElementById('contentDay').classList.toggle('hidden', type !== 'day');
            document.getElementById('contentWeek').classList.toggle('hidden', type !== 'week');
            document.getElementById('contentMonth').classList.toggle('hidden', type !== 'month');
        }
    </script>
</body>
</html>
